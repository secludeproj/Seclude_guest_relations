<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Seclude — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0F5C4C;--g2:#1B7A5E;--g3:#091f17;--gl:#E8F3F0;--gxl:#F4FAF8;
  --stone:#FAF8F4;--sm:#F0EBE3;--sd:#E0D5C8;
  --ink:#18181B;--ink2:#52525B;--ink3:#A1A1AA;
  --line:#E4E4E7;--ld:#D4D4D8;--white:#fff;
  --ff:"Inter",system-ui,sans-serif;
  --fh:"Cormorant Garamond",Georgia,serif;
  --fm:"DM Mono",monospace;
}
html,body,#root{height:100%;font-family:var(--ff);font-size:15px;color:var(--ink);background:var(--stone)}
button{cursor:pointer;font-family:var(--ff)}
input,select,textarea{font-family:var(--ff);font-size:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}

.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#060f0c,#0d3528)}
.login-box{background:var(--white);border-radius:20px;padding:42px 44px;width:420px;max-width:94vw;box-shadow:0 32px 80px -16px rgba(0,0,0,.55)}
.login-logo{display:block;height:36px;margin:0 auto 28px}
.login-h{font-family:var(--fh);font-size:1.55rem;font-weight:600;text-align:center;margin-bottom:4px;letter-spacing:.01em}
.login-s{font-size:.8rem;color:var(--ink3);text-align:center;margin-bottom:22px}
.modetabs{display:flex;gap:3px;background:var(--sm);border-radius:10px;padding:3px;margin-bottom:20px}
.modetab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:.82rem;font-weight:500;transition:.15s;font-family:var(--ff)}
.modetab.on{background:var(--white);color:var(--g);font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.modetab:not(.on){color:var(--ink2)}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:.65rem;font-weight:600;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.09em}
.fi input,.fi select{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:1rem;outline:none;transition:.15s;color:var(--ink)}
.fi input:focus,.fi select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(15,92,76,.08)}
.btn-main{width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:.9rem;transition:.15s;margin-top:6px;letter-spacing:.01em}
.btn-main:hover{background:var(--g2)}
.err{color:#b91c1c;font-size:.78rem;text-align:center;margin-top:8px}

#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#side{width:256px;min-width:256px;background:var(--g3);display:flex;flex-direction:column;overflow-y:auto;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.shead{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:12px}
.slogo{height:30px;filter:brightness(0) invert(1) opacity(.88)}
.slogo-text{font-family:var(--fh);font-size:1.3rem;font-weight:600;color:rgba(255,255,255,.88);letter-spacing:.02em}
.s-logout{border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:.7rem;cursor:pointer;padding:5px 10px;border-radius:6px;transition:.15s;font-family:var(--ff);white-space:nowrap}
.s-logout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.snav{padding:12px 10px;flex:1}
.snav-section{font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.2);padding:14px 12px 6px;font-family:var(--fm)}
.si{display:block;width:100%;padding:10px 14px;border:none;border-radius:8px;background:none;color:rgba(255,255,255,.45);font-size:.875rem;font-weight:500;text-align:left;letter-spacing:.01em;transition:.15s;margin-bottom:1px;cursor:pointer;font-family:var(--ff);position:relative}
.si:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.si.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.si-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#c2410c;color:#fff;font-size:.58rem;padding:1px 6px;border-radius:8px;font-family:var(--fm)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:rgba(250,248,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.mbtn{display:none;padding:6px;border:none;background:none;color:var(--ink2);border-radius:7px;align-items:center;cursor:pointer}
.mbtn:hover{background:var(--sm)}
.topbar-logo{height:24px;display:none;flex-shrink:0}
.crumb{font-family:var(--fm);font-size:.7rem;color:var(--ink3);display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.crumb b{color:var(--ink2)}
.crumb .lk{cursor:pointer}
.crumb .lk:hover{color:var(--g)}
#content{flex:1;overflow-y:auto;padding:26px 30px}

.btn{padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;border:none;transition:.13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.01em}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--g2)}
.btn-out{background:transparent;color:var(--g);border:1.5px solid rgba(15,92,76,.3)}.btn-out:hover{background:var(--gl)}
.btn-dk{background:var(--ink);color:#fff}.btn-dk:hover{opacity:.85}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-warn{background:#c2410c;color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:.74rem;font-weight:600}
.btn-req{background:#c2410c;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:.84rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.13s}
.btn-req:hover{background:#9a3412}
.btn-edit{background:var(--gl);color:var(--g);border:1px solid rgba(15,92,76,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer;transition:.12s}
.btn-edit:hover{background:var(--g);color:#fff}
.btn-save{background:var(--g);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer}
.btn-cancel{background:#f4f4f5;color:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer}

.card{background:var(--white);border-radius:12px;border:1px solid var(--line);overflow:hidden}
.pg-title{font-family:var(--fh);font-size:1.8rem;font-weight:600;color:var(--ink);margin-bottom:4px;letter-spacing:.01em}
.pg-sub{font-size:.82rem;color:var(--ink3);margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.stat{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:20px 22px;border-left:3px solid var(--g);transition:.2s}
.stat:hover{box-shadow:0 4px 20px -6px rgba(0,0,0,.1)}
.stat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:var(--ink3);font-weight:600;margin-bottom:8px}
.stat-v{font-family:var(--fh);font-size:2.8rem;font-weight:600;color:var(--g);line-height:1;margin-bottom:4px}
.stat-h{font-size:.76rem;color:var(--ink3)}

.atabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--line);overflow-x:auto}
.atab{padding:9px 16px;border:none;background:none;color:var(--ink2);font-size:.84rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.13s;font-family:var(--ff)}
.atab.on{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.atab:hover:not(.on){color:var(--ink)}

.prop-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.prop-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:.76rem;transition:.13s;color:var(--ink2);font-family:var(--ff)}
.prop-tab.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:600}
.prop-tab:hover:not(.on){border-color:var(--g);color:var(--g)}

#pm-wrap{min-height:100vh;background:var(--stone);display:flex;flex-direction:column}
.pm-header{background:var(--g3);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pm-logo{height:28px;filter:brightness(0) invert(1) opacity(.88)}
.pm-exit{border:none;background:none;color:rgba(255,255,255,.4);font-size:.76rem;cursor:pointer;font-family:var(--ff)}
.pm-body{flex:1;padding:16px;max-width:100%;margin:0 auto;width:100%}
.mon-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mon-nav button{padding:5px 12px;border:1.5px solid var(--line);border-radius:7px;background:var(--white);font-size:.8rem;font-weight:600;font-family:var(--ff)}
.mon-nav button:hover{border-color:var(--g);color:var(--g)}
.mon-label{font-family:var(--fh);font-size:1rem;font-weight:600;min-width:140px;text-align:center}

.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.xl-wrap{overflow-x:auto;overflow-y:auto;border-radius:11px;border:1px solid var(--ld);background:var(--white);max-height:70vh;width:100%;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.xl-wrap::-webkit-scrollbar{width:7px;height:7px}
.xl-wrap::-webkit-scrollbar-thumb{background:#c5d0dc;border-radius:5px}
.xl-tbl{border-collapse:collapse;font-size:.78rem;white-space:nowrap;table-layout:auto}
.xl-tbl th,.xl-tbl td{border:1px solid #e2e8ef;padding:0;vertical-align:middle}
.xl-tbl tbody tr:nth-child(even) td:not(.item-col):not(.subcat-row td){background:#FAFCFB}
.xl-tbl .item-col{position:sticky;left:0;background:var(--stone);z-index:2;min-width:120px;max-width:130px;width:120px;padding:5px 8px;font-weight:600;font-size:.74rem;border-right:2px solid var(--g);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xl-tbl .item-col-head{position:sticky;left:0;top:0;background:var(--g3);z-index:5;padding:6px 8px;color:rgba(255,255,255,.65);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border-right:2px solid var(--g)}
.xl-tbl thead th{position:sticky;top:0;z-index:4}
.xl-tbl .room-hd{background:var(--g);color:#fff;text-align:center;padding:5px 4px;font-size:.66rem;font-weight:700;letter-spacing:.02em;border-bottom:2px solid rgba(255,255,255,.15);min-width:160px}
.xl-tbl .sub-hd{background:#1B7A5E;color:rgba(255,255,255,.88);text-align:center;padding:4px 3px;font-size:.58rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.xl-tbl .prop-hd{background:#234e3a;color:rgba(255,255,255,.7);text-align:center;padding:4px 8px;font-size:.6rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.xl-tbl .subcat-row td{background:#F0EDE8;font-size:.6rem;font-weight:700;padding:5px 8px;text-transform:uppercase;letter-spacing:.08em;color:#0F5C4C;border-top:2px solid var(--sd);border-bottom:1px solid #d9cfc4}
.xl-tbl .subcat-row .item-col{background:#E8E2DA;color:#0F5C4C}
.xl-tbl tr:hover .item-col{background:#edf7f4}
.xl-tbl tr:not(.subcat-row):hover td:not(.item-col):not(.room-hd):not(.sub-hd):not(.prop-hd){background:#e8f6f2!important}
.xl-tbl .subcat-row:hover td{background:#E8E2DA!important}
.dmg-cell{cursor:pointer;text-align:center;min-width:72px;padding:5px 3px;user-select:none;transition:.1s;font-size:.71rem}
.dmg-cell:hover{filter:brightness(.9)}
.qty-cell{min-width:46px;padding:2px 2px;text-align:center}
.qty-inp{width:100%;border:none;background:transparent;text-align:center;font-size:.76rem;font-family:var(--fm);padding:3px 2px;outline:none;color:var(--ink)}
.qty-inp:focus{background:#fff;border:1.5px solid var(--g);border-radius:4px}
.photo-cell{text-align:center;padding:3px 3px;min-width:46px}
.photo-thumb{width:32px;height:32px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid var(--gl);transition:.13s}
.photo-thumb:hover{border-color:var(--g);transform:scale(1.1)}
.photo-add{background:none;border:1.5px dashed #d4d4d8;border-radius:5px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:.13s;color:#a1a1aa}
.photo-add:hover{border-color:var(--g);color:var(--g);background:var(--gl)}
/* back button for property detail */
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid var(--line);border-radius:8px;background:var(--white);color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;transition:.13s;font-family:var(--ff);margin-bottom:14px}
.back-btn:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

.form-inline{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:20px 22px;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.t3{grid-template-columns:repeat(3,1fr)}
.fg.t4{grid-template-columns:repeat(4,1fr)}
.fg.t5{grid-template-columns:repeat(5,1fr)}
.ff2{display:flex;flex-direction:column;gap:4px}
.ff2 label{font-size:.63rem;font-family:var(--fm);font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.ff2 input,.ff2 select,.ff2 textarea{padding:8px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:.84rem;color:var(--ink);outline:none;transition:.13s}
.ff2 input:focus,.ff2 select:focus,.ff2 textarea:focus{border-color:var(--g)}
.tbl-inp{width:100%;border:1.5px solid var(--g);border-radius:5px;padding:4px 7px;font-size:.79rem;font-family:var(--ff);outline:none;background:#fff;color:var(--ink)}

.ltbl{width:100%;border-collapse:collapse}
.ltbl th{padding:10px 14px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-family:var(--fm);background:var(--stone);border-bottom:1px solid var(--line);white-space:nowrap}
.ltbl td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:.84rem;vertical-align:middle}
.ltbl tr:last-child td{border-bottom:none}
.ltbl tr:hover td{background:var(--gxl)}
.ltbl .edit-row td{background:#FAFFF8!important}
.tag{font-size:.65rem;padding:2px 7px;border-radius:5px;font-family:var(--fm);font-weight:600;display:inline-block}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-box{background:var(--white);border-radius:18px;padding:28px;width:530px;max-width:100%;box-shadow:0 24px 64px -16px rgba(0,0,0,.5)}
.modal-title{font-family:var(--fh);font-size:1.25rem;font-weight:600;margin-bottom:18px}
.req-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:5px;font-size:.65rem;font-family:var(--fm);font-weight:600}
.lightbox-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox-img{max-width:92vw;max-height:92vh;border-radius:10px;box-shadow:0 8px 60px rgba(0,0,0,.7);object-fit:contain}
.lightbox-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.3rem;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.empty{text-align:center;padding:52px 20px;color:var(--ink3)}
.empty strong{display:block;font-family:var(--fh);font-size:1.15rem;color:var(--ink2);margin-bottom:4px}
.divider{height:1px;background:var(--line);margin:18px 0}
.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:20px}
.dl-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:9px}
.inv-file-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:.67rem;font-family:var(--fm);font-weight:600;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:var(--stone);color:var(--ink2);transition:.12s}
.inv-file-btn:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

/* ── PROPERTY CARDS ───────────────────────────────── */
.loc-section{margin-bottom:32px}
.loc-heading{font-family:var(--fh);font-size:1.25rem;font-weight:600;color:var(--ink);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px}
.loc-state{font-size:.72rem;color:var(--ink3);font-family:var(--fm);font-weight:400;letter-spacing:.04em}
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prop-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px 20px;cursor:pointer;transition:.2s;position:relative}
.prop-card:hover{border-color:var(--g);box-shadow:0 6px 28px -6px rgba(15,92,76,.14);transform:translateY(-2px)}
.prop-card-name{font-family:var(--fh);font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.2}
.prop-card-type{font-size:.74rem;color:var(--ink2);margin-bottom:12px}
.prop-card-rooms{font-size:.7rem;color:var(--ink3);font-family:var(--fm);padding-top:10px;border-top:1px solid var(--line)}
.prop-card-no-rooms{opacity:.5;cursor:default}
.prop-card-no-rooms:hover{transform:none;box-shadow:none;border-color:var(--line)}

/* ── DASHBOARD ────────────────────────────────────── */
.dash-section-title{font-family:var(--fh);font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:14px;margin-top:6px}
.dash-props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:28px}
.dash-grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
.dash-prop-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:16px 18px;cursor:pointer;transition:.2s}
.dash-prop-card:hover{border-color:var(--g);box-shadow:0 4px 20px -4px rgba(15,92,76,.12);transform:translateY(-1px)}
.dash-prop-loc{font-size:.62rem;color:var(--g);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:var(--fm)}
.dash-prop-name{font-family:var(--fh);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:2px}
.dash-prop-type{font-size:.72rem;color:var(--ink2);margin-bottom:8px}
.dash-prop-rooms{font-size:.68rem;color:var(--ink3);font-family:var(--fm)}
.dash-requests{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.dash-req-card{background:var(--white);border-radius:10px;border:1px solid var(--line);padding:12px 15px}
.dash-req-empty{color:var(--ink3);font-size:.84rem;padding:20px 0}

/* ── BOTTOM NAV (mobile only) ─────────────────────── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);z-index:150;padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-nav-inner{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px;border:none;background:none;color:var(--ink3);font-size:.58rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:.13s;font-family:var(--ff);position:relative}
.bn-item.on{color:var(--g)}
.bn-item.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--g);border-radius:0 0 2px 2px}
.bn-badge{position:absolute;top:5px;right:calc(50% - 18px);background:#c2410c;color:#fff;font-size:.52rem;padding:0 4px;border-radius:7px;font-family:var(--fm);min-width:14px;text-align:center;line-height:1.6}
.bn-icon{font-size:.95rem;line-height:1}

/* mobile back button in topbar (hidden on desktop, shown on mobile when in property) */

  .qty-inp{font-size:16px}
}

  const csv=[cols.join(","),...rows.map(r=>cols.map(c=>esc(r[c])).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));a.download=fname;a.click();
}
function readFileAsDataURL(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}
function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}catch{return typeof init==="function"?init():init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[v,key]);
  return[v,setV];
}

/* ══ PM EXCEL TABLE ════════════════════════════════════════ */
function useIsMobile(){
  const[mob,setMob]=useState(()=>window.innerWidth<641);
  useEffect(()=>{
    const h=()=>setMob(window.innerWidth<641);
    window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);
  },[]);
  return mob;
}
function PMExcelTable({propId,area,yr,mn,checks,setChecks,photos,setPhotos,readOnly}){
  const[lightbox,setLightbox]=useState(null);
  const isMobile=useIsMobile();
  const mk=monthKey(yr,mn);
  const propInv=INV[propId]||{};
  const areaData=propInv[area]||{};
  const isRoom=area==="Room Inventory";
  const rooms=isRoom?(areaData.rooms||[]):[];
  const items=isRoom?(areaData.items||[]):[];
  const subcats=isRoom?null:(areaData.subcats||{});
  const allItems=subcats?Object.values(subcats).flat():items;

  function getV(item,room,field){
    const rk=isRoom?room:"property";
    try{const c=checks&&checks[propId]&&checks[propId][area]&&checks[propId][area][rk]&&checks[propId][area][rk][mk]&&checks[propId][area][rk][mk][item];return(c&&c[field])||"";}catch{return"";}
  }
  function setV(item,room,field,val){
    if(readOnly)return;
    setChecks(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=isRoom?room:"property";
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};if(!n[propId][area][rk])n[propId][area][rk]={};
      if(!n[propId][area][rk][mk])n[propId][area][rk][mk]={};if(!n[propId][area][rk][mk][item])n[propId][area][rk][mk][item]={};
      n[propId][area][rk][mk][item][field]=val;return n;
    });
  }
  function cycleD(item,room){if(!readOnly)setV(item,room,"damage",nxtDmg(getV(item,room,"damage")));}

  function getPhoto(item,room){
    try{return photos&&photos[propId]&&photos[propId][room||"_"]&&photos[propId][room||"_"][item]||null;}catch{return null;}
  }
  async function handlePhoto(e,item,room){
    const file=e.target.files[0];if(!file)return;
    const dataUrl=await readFileAsDataURL(file);
    if(setPhotos)setPhotos(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=room||"_";
      if(!n[propId])n[propId]={};if(!n[propId][rk])n[propId][rk]={};
      n[propId][rk][item]=dataUrl;return n;
    });
  }
  function removePhoto(item,room){
    if(setPhotos)setPhotos(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=room||"_";
      try{delete n[propId][rk][item];}catch{}return n;
    });
  }

  if(isRoom&&rooms.length===0)return<div className="empty"><strong>No rooms configured</strong>for this property.</div>;

  function PhotoCell({item,room}){
    const src=getPhoto(item,room);
    const fid=`ph-${propId}-${room||"_"}-${item}`.replace(/\s/g,"_");
    if(src)return(
      <td className="photo-cell">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <img className="photo-thumb" src={src} alt={item} onClick={()=>setLightbox(src)}/>
          {setPhotos&&<button style={{background:"none",border:"none",fontSize:".58rem",color:"#9CA3AF",cursor:"pointer",padding:0}} onClick={()=>removePhoto(item,room)}>remove</button>}
        </div>
      </td>
    );
    if(!setPhotos)return<td className="photo-cell"><span style={{color:"#d1d5db",fontSize:".7rem"}}>—</span></td>;
    return(
      <td className="photo-cell">
        <label htmlFor={fid} className="photo-add" title="Add photo">📷
          <input id={fid} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handlePhoto(e,item,room)}/>
        </label>
      </td>
    );
  }

  return(
    <>
    {lightbox&&<Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
    <div className="xl-wrap">
      <table className="xl-tbl">
        <thead>
          {isRoom&&<tr>
            <th className="item-col-head" rowSpan={2}>Item</th>
            {rooms.map(r=><th key={r} className="room-hd" colSpan={isMobile?2:3}>{r}</th>)}
          </tr>}
          {isRoom&&<tr>
            {rooms.map(r=><React.Fragment key={r}>
              <th className="sub-hd" style={{minWidth:62}}>Condition</th>
              <th className="sub-hd" style={{minWidth:40}}>Qty</th>
              {!isMobile&&<th className="sub-hd" style={{minWidth:36}}>Photo</th>}
            </React.Fragment>)}
          </tr>}
          {!isRoom&&<tr>
            <th className="item-col-head">Item</th>
            <th className="prop-hd" style={{minWidth:62}}>Condition</th>
            <th className="prop-hd" style={{minWidth:40}}>Quantity</th>
            <th className="prop-hd" style={{minWidth:36}}>Photo</th>
          </tr>}
        </thead>
        <tbody>
          {isRoom
            ?items.map(item=><tr key={item}>
              <td className="item-col">{item}</td>
              {rooms.map(room=>{
                const dmg=getV(item,room,"damage");const qty=getV(item,room,"qty");const dcfg=DMG[dmg]||DMG[""];
                return<React.Fragment key={room}>
                  <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,room)} title={readOnly?"":"Click to change"}>
                    <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                  </td>
                  <td className="qty-cell">
                    <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,room,"qty",e.target.value)}/>
                  </td>
                  {!isMobile&&<PhotoCell item={item} room={room}/>}
                </React.Fragment>;
              })}
            </tr>)
            :subcats
              ?Object.entries(subcats).flatMap(([sub,sitems])=>[
                <tr key={"sub-"+sub} className="subcat-row">
                  <td className="item-col" style={{color:"#0F5C4C",fontWeight:700}}>{sub}</td>
                  <td style={{background:"#F8F4EF"}}/><td style={{background:"#F8F4EF"}}/><td style={{background:"#F8F4EF"}}/>
                </tr>,
                ...sitems.map(item=>{
                  const dmg=getV(item,null,"damage");const qty=getV(item,null,"qty");const dcfg=DMG[dmg]||DMG[""];
                  return<tr key={item}>
                    <td className="item-col">{item}</td>
                    <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,null)} title={readOnly?"":"Click to change"}>
                      <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                    </td>
                    <td className="qty-cell">
                      <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,null,"qty",e.target.value)}/>
                    </td>
                    <PhotoCell item={item} room={null}/>
                  </tr>;
                })
              ])
              :allItems.map(item=>{
                const dmg=getV(item,null,"damage");const qty=getV(item,null,"qty");const dcfg=DMG[dmg]||DMG[""];
                return<tr key={item}>
                  <td className="item-col">{item}</td>
                  <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,null)} title={readOnly?"":"Click to change"}>
                    <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                  </td>
                  <td className="qty-cell">
                    <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,null,"qty",e.target.value)}/>
                  </td>
                  <PhotoCell item={item} room={null}/>
                </tr>;
              })
          }
        </tbody>
      </table>
    </div>
    </>
  );
}

/* ══ PM REQUEST FORM ════════════════════════════════════════ */
function PMRequestForm({session,onClose,onSubmit}){
  const[form,setForm]=useState({type:"Damage Report",area:"Room Inventory",room:"",item:"",description:"",qty:"",urgency:"Normal"});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const propInv=INV[session.propId]||{};
  const areaData=propInv[form.area]||{};
  const isRoom=form.area==="Room Inventory";
  const rooms=isRoom?(areaData.rooms||[]):[];
  const allItems=areaData.subcats?Object.values(areaData.subcats).flat():(areaData.items||[]);
  function submit(e){
    e.preventDefault();
    onSubmit({...form,id:Date.now(),ts:Date.now(),propId:session.propId,propName:session.propName,submitter:session.submitter,date:new Date().toLocaleDateString("en-IN"),status:"Pending"});
    onClose();

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">📮 Send Request to Head Office</div>

            <div className="ff2"><label>Request Type</label><select value={form.type} onChange={e=>upd("type",e.target.value)}><option>Damage Report</option><option>Item Needed</option></select></div>
            <div className="ff2"><label>Urgency</label><select value={form.urgency} onChange={e=>upd("urgency",e.target.value)}><option>Normal</option><option>Urgent</option><option>Critical</option></select></div>
          </div>
          <div className="fg" style={{marginBottom:10}}>
            <div className="ff2"><label>Area</label><select value={form.area} onChange={e=>upd("area",e.target.value)}>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
            {isRoom&&<div className="ff2"><label>Room</label><select value={form.room} onChange={e=>upd("room",e.target.value)}><option value="">— Select room —</option>{rooms.map(r=><option key={r}>{r}</option>)}<option>Common Area</option></select></div>}
          </div>
          <div className="ff2" style={{marginBottom:10}}><label>Item</label>
            <input value={form.item} onChange={e=>upd("item",e.target.value)} placeholder="Item name" list="item-list" required/>

          </div>
        </form>
      </div>
    </div>
  );
}

        <div>
          <div style={{fontWeight:700,fontSize:"1.15rem",marginBottom:2}}>{prop.name}</div>

        HQ view · Conditions &amp; quantities are read-only · Click 📷 to upload photos · Click thumbnails to enlarge

/* ══ HQ REQUESTS ════════════════════════════════════════════ */
function HQRequests({requests,setRequests}){
  const[filter,setFilter]=useState("All");
  const statuses=["All","Pending","In Progress","Resolved"];
  const filtered=filter==="All"?requests:requests.filter(r=>r.status===filter);
  function updStatus(id,s){setRequests(prev=>prev.map(r=>r.id===id?{...r,status:s}:r));}
  const stCols={"Pending":{bg:"#FEF9C3",c:"#92400E"},"In Progress":{bg:"#EFF6FF",c:"#1D4ED8"},"Resolved":{bg:"#DCFCE7",c:"#15803D"}};
  return(
    <div>
      <div className="pg-title">Requests from Property Managers</div>
      <div className="pg-sub">Damage reports and item requests — update status as you action them</div>
      <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
        {statuses.map(s=><button key={s} className={"prop-tab"+(filter===s?" on":"")} onClick={()=>setFilter(s)}>
          {s}{s==="Pending"&&requests.filter(r=>r.status==="Pending").length>0?` (${requests.filter(r=>r.status==="Pending").length})`:""}
        </button>)}
      </div>
      {filtered.length===0
        ?<div className="empty"><strong>No requests</strong>in this filter.</div>
        :filtered.map(r=>{
          const uc=stCols[r.status]||{bg:"#f3f4f6",c:"#6b7280"};
          const urgC=r.urgency==="Critical"?"#FEE2E2":r.urgency==="Urgent"?"#FEF9C3":"transparent";
          return<div key={r.id} style={{background:"var(--white)",border:"1px solid var(--line)",borderRadius:10,padding:"13px 15px",marginBottom:9,borderLeft:`4px solid ${r.urgency==="Critical"?"#b91c1c":r.urgency==="Urgent"?"#92400E":"var(--line)"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <span className="req-badge" style={{background:r.type==="Damage Report"?"#FEF9C3":"var(--gl)",color:r.type==="Damage Report"?"#92400E":"var(--g)"}}>{r.type}</span>
                  <span className="req-badge" style={{background:urgC,color:r.urgency==="Critical"?"#b91c1c":r.urgency==="Urgent"?"#92400E":"var(--ink3)"}}>{r.urgency}</span>
                  <span style={{fontSize:".68rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>from {r.propName} · {r.submitter} · {r.date}</span>
                </div>
                <div style={{fontWeight:700,fontSize:".9rem",marginBottom:3}}>{r.item}{r.room?" — "+r.room:""} <span style={{fontWeight:400,color:"var(--ink3)",fontSize:".8rem"}}>({r.area})</span></div>
                <div style={{fontSize:".8rem",color:"var(--ink2)"}}>{r.description}</div>
                {r.qty&&<div style={{fontSize:".74rem",color:"var(--g)",marginTop:3}}>Quantity needed: {r.qty}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                <span className="req-badge" style={{background:uc.bg,color:uc.c,justifyContent:"center"}}>{r.status}</span>
                <select value={r.status} onChange={e=>updStatus(r.id,e.target.value)} style={{border:"1px solid var(--line)",borderRadius:6,padding:"4px 7px",fontSize:".72rem",cursor:"pointer"}}>
                  <option>Pending</option><option>In Progress</option><option>Resolved</option>
                </select>
              </div>
            </div>
          </div>;
        })}
    </div>
  );
}

/* ══ INLINE EDIT ROW — shared util ══════════════════════════ */
function InlineTextInput({value,onChange,placeholder,type="text",style={}}){
  return<input className="tbl-inp" type={type} value={value||""} placeholder={placeholder||""} onChange={e=>onChange(e.target.value)} style={{minWidth:70,...style}}/>;
}
function InvoiceFileCell({rec,onChange}){
  const[lightbox,setLightbox]=useState(null);
  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    const dataUrl=await readFileAsDataURL(file);
    onChange({name:file.name,dataUrl,type:file.type});
  }
  if(rec&&rec.name){
    const isImg=rec.type&&rec.type.startsWith("image/");
    return(
      <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-start"}}>
        {lightbox&&<Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
        {isImg
          ?<img src={rec.dataUrl} alt={rec.name} style={{width:40,height:40,objectFit:"cover",borderRadius:4,cursor:"pointer",border:"1px solid var(--line)"}} onClick={()=>setLightbox(rec.dataUrl)}/>
          :<a href={rec.dataUrl} download={rec.name} className="inv-file-btn">📄 {rec.name.length>14?rec.name.slice(0,12)+"…":rec.name}</a>}
        <button style={{background:"none",border:"none",fontSize:".6rem",color:"#9CA3AF",cursor:"pointer",padding:0}} onClick={()=>onChange(null)}>remove</button>
      </div>
    );
  }
  return(
    <label className="inv-file-btn" style={{cursor:"pointer"}}>
      📎 Attach
      <input type="file" accept="image/*,.pdf,.doc,.docx" style={{display:"none"}} onChange={handleFile}/>
    </label>
  );
}

/* ══ HQ PURCHASES ═══════════════════════════════════════════ */
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function HQPurchases({proc,setProc}){
  const[propF,setPropF]=useState("All");
  const[showAdd,setShowAdd]=useState(false);
  const[search,setSearch]=useState("");
  const[form,setForm]=useState({purchaseDate:todayISO()});
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const updE=(k,v)=>setEditForm(f=>({...f,[k]:v}));
  const usedProps=["All",...[...new Set(proc.map(p=>p.property))].sort()];
  const filtered=(propF==="All"?proc:proc.filter(p=>p.property===propF))
    .filter(p=>!search||[p.item,p.vendor,p.property,p.invoiceNo,p.notes].join(" ").toLowerCase().includes(search.toLowerCase()));
  const COLS=["Date of Purchase","Date of Receiving","Item","Price (₹)","Vendor","Property","Approved By","Warranty","Invoice No","Notes"];

  function toRow(p){return{"Date of Purchase":p.purchaseDate,"Date of Receiving":p.receiveDate||"","Item":p.item,"Price (₹)":p.price||"","Vendor":p.vendor,"Property":p.property,"Approved By":p.approvedBy,"Warranty":p.warranty||"","Invoice No":p.invoiceNo||"","Notes":p.notes||""};}
  function dlProp(){dlCSV(filtered.map(toRow),COLS,propF==="All"?"purchases_all.csv":"purchases_"+propF.replace(/ /g,"_")+".csv");}
  function startEdit(p){setEditId(p.id);setEditForm({...p});}
  function saveEdit(){setProc(prev=>prev.map(p=>p.id===editId?{...editForm}:p));setEditId(null);}
  function delRow(id){if(window.confirm("Delete this entry?"))setProc(prev=>prev.filter(p=>p.id!==id));}

  const FormRow=({f,upFn,onSave,onCancel,saveLabel="Save"})=>(
    <div className="form-inline">
      <div style={{fontSize:".72rem",color:"var(--ink2)",background:"var(--gl)",borderRadius:7,padding:"6px 12px",marginBottom:10}}>
        ℹ️ Enter <strong>one item per row</strong> — each item gets its own invoice and report entry.
      </div>
      <div className="fg t4" style={{marginBottom:10}}>
        <div className="ff2"><label>Date Purchased</label><input className="ff2 input" type="date" value={f.purchaseDate||""} onChange={e=>upFn("purchaseDate",e.target.value)}/></div>
        <div className="ff2"><label>Item Name</label><input value={f.item||""} onChange={e=>upFn("item",e.target.value)} placeholder="e.g. Bed Sheets" required/></div>
        <div className="ff2"><label>Quantity</label><input type="number" value={f.qty||""} onChange={e=>{const q=parseFloat(e.target.value)||0;const u=parseFloat(f.unitPrice)||0;upFn("qty",e.target.value);upFn("price",q&&u?q*u:"");}} placeholder="e.g. 12"/></div>
        <div className="ff2"><label>Unit Price (₹)</label><input type="number" value={f.unitPrice||""} onChange={e=>{const u=parseFloat(e.target.value)||0;const q=parseFloat(f.qty)||0;upFn("unitPrice",e.target.value);upFn("price",q&&u?q*u:"");}} placeholder="per piece"/></div>
      </div>
      <div className="fg t4" style={{marginBottom:10}}>
        <div className="ff2"><label>Total Price (₹) <span style={{color:"var(--ink3)",fontWeight:400}}>(auto or override)</span></label><input type="number" value={f.price||""} onChange={e=>upFn("price",e.target.value)} placeholder="0"/></div>
        <div className="ff2"><label>Vendor</label><input value={f.vendor||""} onChange={e=>upFn("vendor",e.target.value)} placeholder="Vendor name"/></div>
        <div className="ff2"><label>Property</label>
          <select value={f.property||""} onChange={e=>upFn("property",e.target.value)}>
            <option value="">— Select —</option><option>All</option>
            {ALL_PROPS.map(p=><option key={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="ff2"><label>Category</label>
          <select value={f.category||""} onChange={e=>upFn("category",e.target.value)}>
            <option value="">— Select —</option>
            {["Room Linen","Bathroom","Furniture","Electronics","Kitchen","Outdoor","Maintenance","Consumables","Other"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div className="fg t4" style={{marginBottom:12}}>
        <div className="ff2"><label>Warranty</label><input value={f.warranty||""} onChange={e=>upFn("warranty",e.target.value)} placeholder="e.g. 1 year"/></div>
        <div className="ff2"><label>Invoice No.</label><input value={f.invoiceNo||""} onChange={e=>upFn("invoiceNo",e.target.value)} placeholder="e.g. INV-1023"/></div>
        <div className="ff2"><label>Invoice File</label><InvoiceFileCell rec={f.invoiceFile} onChange={v=>upFn("invoiceFile",v)}/></div>
        <div className="ff2"><label>Notes</label><input value={f.notes||""} onChange={e=>upFn("notes",e.target.value)} placeholder="Optional"/></div>
      </div>
      <div style={{display:"flex",gap:7}}>
        <button type="button" className="btn btn-g btn-sm" onClick={onSave}>{saveLabel}</button>
        <button type="button" className="btn btn-out btn-sm" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div><div className="pg-title">Purchases</div><div className="pg-sub" style={{marginBottom:0}}>{filtered.length} of {proc.length} orders</div></div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search item, vendor…" style={{padding:"6px 10px",border:"1.5px solid var(--line)",borderRadius:8,fontSize:".8rem",width:170,outline:"none"}}/>
          <button className="btn btn-dk btn-sm" onClick={dlProp}>⬇ Download</button>
          <button className="btn btn-g btn-sm" onClick={()=>{setShowAdd(s=>!s);setEditId(null);setForm({purchaseDate:todayISO()});}}>+ New Order</button>
        </div>
      </div>
      <div className="prop-tabs">{usedProps.map(p=><button key={p} className={"prop-tab"+(propF===p?" on":"")} onClick={()=>setPropF(p)}>{p}</button>)}</div>
      {showAdd&&<FormRow f={form} upFn={upd} saveLabel="Add Order" onSave={()=>{if(!form.item||!form.property){alert("Item and Property required.");return;}setProc(p=>[...p,{...form,id:Date.now(),price:parseFloat(form.price)||0}]);setForm({});setShowAdd(false);}} onCancel={()=>setShowAdd(false)}/>}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table className="ltbl">
            <thead><tr>
              <th>Date</th><th>Item</th><th>Qty</th><th>Price (₹)</th><th>Vendor</th><th>Property</th><th>Cat.</th><th>Warranty</th><th>Invoice</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.length===0
                ?<tr><td colSpan={12} style={{textAlign:"center",padding:30,color:"var(--ink3)"}}>No entries</td></tr>
                :filtered.map(p=>{
                  if(editId===p.id)return(
                    <tr key={p.id} className="edit-row">
                      <td><InlineTextInput type="date" value={editForm.purchaseDate} onChange={v=>updE("purchaseDate",v)}/></td>
                      <td><InlineTextInput value={editForm.item} onChange={v=>updE("item",v)} placeholder="Item"/></td>
                      <td><InlineTextInput type="number" value={editForm.qty} onChange={v=>updE("qty",v)} style={{maxWidth:60}} placeholder="Qty"/></td>
                      <td><InlineTextInput type="number" value={editForm.price} onChange={v=>updE("price",v)} style={{maxWidth:80}}/></td>
                      <td><InlineTextInput value={editForm.vendor} onChange={v=>updE("vendor",v)}/></td>
                      <td><select className="tbl-inp" value={editForm.property||""} onChange={e=>updE("property",e.target.value)}><option value="">—</option><option>All</option>{ALL_PROPS.map(x=><option key={x.id}>{x.name}</option>)}</select></td>
                      <td><select className="tbl-inp" value={editForm.category||""} onChange={e=>updE("category",e.target.value)}><option value="">—</option>{["Room Linen","Bathroom","Furniture","Electronics","Kitchen","Outdoor","Maintenance","Consumables","Other"].map(c=><option key={c}>{c}</option>)}</select></td>
                      <td><InlineTextInput value={editForm.warranty} onChange={v=>updE("warranty",v)} placeholder="Warranty"/></td>
                      <td><InlineTextInput value={editForm.invoiceNo} onChange={v=>updE("invoiceNo",v)} placeholder="Inv #"/><InvoiceFileCell rec={editForm.invoiceFile} onChange={v=>updE("invoiceFile",v)}/></td>

/* ══ ROOT ═══════════════════════════════════════════════════ */
function App(){
  const[session,setSession]=useState(()=>{
    try{const s=localStorage.getItem('seclude_ops_session');return s?JSON.parse(s):null;}
    catch{return null;}
  });
  const _origSetSession=setSession;
  function handleLogin(s){localStorage.setItem('seclude_ops_session',JSON.stringify(s));_origSetSession(s);}
  function handleLogout(){localStorage.removeItem('seclude_ops_session');_origSetSession(null);}
  const[checks,setChecks]=useLS("seclude_checks",()=>{
    const base={};
    for(const[pid,areas] of Object.entries(SEED_2026_03)){
      base[pid]={};
      for(const[area,rooms] of Object.entries(areas)){
        base[pid][area]={};
        for(const[room,months] of Object.entries(rooms)){
          base[pid][area][room]={};
          for(const[mk,items] of Object.entries(months)){
            base[pid][area][room][mk]={};
            for(const[item,v] of Object.entries(items)){
              base[pid][area][room][mk][item]={qty:v.qty,damage:""};
            }
          }
        }
      }
    }
    return base;
  });
  const[photos,setPhotos]=useLS("seclude_photos",{});
  const[requests,setRequests]=useLS("seclude_requests",[]);
  useEffect(()=>{
    if(localStorage.getItem("seclude_seeded_v4"))return;
    const now=new Date();
    const curMk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    setChecks(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      for(const[pid,areas] of Object.entries(SEED_2026_03)){
        if(!n[pid])n[pid]={};
        for(const[area,rooms] of Object.entries(areas)){
          if(!n[pid][area])n[pid][area]={};
          for(const[room,months] of Object.entries(rooms)){
            if(!n[pid][area][room])n[pid][area][room]={};
            for(const[,items] of Object.entries(months)){
              // Seed into 2026-03 (historical) AND current month
              for(const mk of["2026-03",curMk]){
                if(!n[pid][area][room][mk])n[pid][area][room][mk]={};
                for(const[item,v] of Object.entries(items)){
                  if(!n[pid][area][room][mk][item])n[pid][area][room][mk][item]={qty:v.qty,damage:""};
                }
              }
            }
          }
        }
      }
      return n;
    });
    localStorage.setItem("seclude_seeded_v4","1");
  },[]);
  if(!session)return<Login onLogin={handleLogin}/>;
  if(session.type==="pm")return<PMPortal session={session} onLogout={handleLogout} checks={checks} setChecks={setChecks} photos={photos} setPhotos={setPhotos} requests={requests} setRequests={setRequests}/>;
  return<HQApp session={session} onLogout={handleLogout} checks={checks} photos={photos} setPhotos={setPhotos} requests={requests} setRequests={setRequests}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
function __runApp(){
  var root=document.getElementById('root');
  try{
    root.innerHTML='';
    var src=document.getElementById('app-src').textContent;
    var compiled=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    eval(compiled);
  }catch(e){
    root.innerHTML='<div style="padding:24px;font-family:sans-serif;color:#B91C1C;background:#FEF2F2;min-height:100vh"><strong>App failed to load.</strong><br><br><small style="font-family:monospace">'+e.message+'</small></div>';
    console.error('Bootstrap error:',e);
  }
}
function __waitBabel(n){
  if(window.Babel){__runApp();}
  else if(n>0){setTimeout(function(){__waitBabel(n-1);},300);}
  else{document.getElementById('root').innerHTML='<div style="padding:24px;font-family:sans-serif">Could not load Babel. Check your connection and refresh.</div>';}
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){__waitBabel(20);});
}else{
  __waitBabel(20);
}
</script></body>
</html>
