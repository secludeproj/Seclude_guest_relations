<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0F5C4C;--g2:#1B7A5E;--g3:#091f17;--gl:#E8F3F0;--gxl:#F4FAF8;
  --stone:#FAF8F4;--sm:#F0EBE3;--sd:#E0D5C8;
  --ink:#18181B;--ink2:#52525B;--ink3:#A1A1AA;
  --line:#E4E4E7;--ld:#D4D4D8;--white:#fff;
  --ff:"Inter",system-ui,sans-serif;
  --fh:"Cormorant Garamond",Georgia,serif;
  --fm:"DM Mono",monospace;
}
html,body,#root{height:100%;font-family:var(--ff);font-size:15px;color:var(--ink);background:var(--stone)}
button{cursor:pointer;font-family:var(--ff)}
input,select,textarea{font-family:var(--ff);font-size:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}

.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#060f0c,#0d3528)}
.login-box{background:var(--white);border-radius:20px;padding:42px 44px;width:420px;max-width:94vw;box-shadow:0 32px 80px -16px rgba(0,0,0,.55)}
.login-logo{display:block;height:36px;margin:0 auto 28px}
.login-h{font-family:var(--fh);font-size:1.55rem;font-weight:600;text-align:center;margin-bottom:4px;letter-spacing:.01em}
.login-s{font-size:.8rem;color:var(--ink3);text-align:center;margin-bottom:22px}
.modetabs{display:flex;gap:3px;background:var(--sm);border-radius:10px;padding:3px;margin-bottom:20px}
.modetab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:.82rem;font-weight:500;transition:.15s;font-family:var(--ff)}
.modetab.on{background:var(--white);color:var(--g);font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.modetab:not(.on){color:var(--ink2)}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:.65rem;font-weight:600;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.09em}
.fi input,.fi select{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:1rem;outline:none;transition:.15s;color:var(--ink)}
.fi input:focus,.fi select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(15,92,76,.08)}
.btn-main{width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:.9rem;transition:.15s;margin-top:6px;letter-spacing:.01em}
.btn-main:hover{background:var(--g2)}
.err{color:#b91c1c;font-size:.78rem;text-align:center;margin-top:8px}

#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#side{width:256px;min-width:256px;background:var(--g3);display:flex;flex-direction:column;overflow-y:auto;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.shead{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:12px}
.slogo{height:30px;filter:brightness(0) invert(1) opacity(.88)}
.slogo-text{font-family:var(--fh);font-size:1.3rem;font-weight:600;color:rgba(255,255,255,.88);letter-spacing:.02em}
.s-logout{border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:.7rem;cursor:pointer;padding:5px 10px;border-radius:6px;transition:.15s;font-family:var(--ff);white-space:nowrap}
.s-logout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.snav{padding:12px 10px;flex:1}
.snav-section{font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.2);padding:14px 12px 6px;font-family:var(--fm)}
.si{display:block;width:100%;padding:10px 14px;border:none;border-radius:8px;background:none;color:rgba(255,255,255,.45);font-size:.875rem;font-weight:500;text-align:left;letter-spacing:.01em;transition:.15s;margin-bottom:1px;cursor:pointer;font-family:var(--ff);position:relative}
.si:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.si.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.si-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#c2410c;color:#fff;font-size:.58rem;padding:1px 6px;border-radius:8px;font-family:var(--fm)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:rgba(250,248,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.mbtn{display:none;padding:6px;border:none;background:none;color:var(--ink2);border-radius:7px;align-items:center;cursor:pointer}
.mbtn:hover{background:var(--sm)}
.topbar-logo{height:24px;display:none;flex-shrink:0}
.crumb{font-family:var(--fm);font-size:.7rem;color:var(--ink3);display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.crumb b{color:var(--ink2)}
.crumb .lk{cursor:pointer}
.crumb .lk:hover{color:var(--g)}
#content{flex:1;overflow-y:auto;padding:26px 30px}

.btn{padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;border:none;transition:.13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.01em}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--g2)}
.btn-out{background:transparent;color:var(--g);border:1.5px solid rgba(15,92,76,.3)}.btn-out:hover{background:var(--gl)}
.btn-dk{background:var(--ink);color:#fff}.btn-dk:hover{opacity:.85}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-warn{background:#c2410c;color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:.74rem;font-weight:600}
.btn-req{background:#c2410c;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:.84rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.13s}
.btn-req:hover{background:#9a3412}
.btn-edit{background:var(--gl);color:var(--g);border:1px solid rgba(15,92,76,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer;transition:.12s}
.btn-edit:hover{background:var(--g);color:#fff}
.btn-save{background:var(--g);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer}
.btn-cancel{background:#f4f4f5;color:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:600;cursor:pointer}

.card{background:var(--white);border-radius:12px;border:1px solid var(--line);overflow:hidden}
.pg-title{font-family:var(--fh);font-size:1.8rem;font-weight:600;color:var(--ink);margin-bottom:4px;letter-spacing:.01em}
.pg-sub{font-size:.82rem;color:var(--ink3);margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.stat{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:20px 22px;border-left:3px solid var(--g);transition:.2s}
.stat:hover{box-shadow:0 4px 20px -6px rgba(0,0,0,.1)}
.stat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:var(--ink3);font-weight:600;margin-bottom:8px}
.stat-v{font-family:var(--fh);font-size:2.8rem;font-weight:600;color:var(--g);line-height:1;margin-bottom:4px}
.stat-h{font-size:.76rem;color:var(--ink3)}

.atabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--line);overflow-x:auto}
.atab{padding:9px 16px;border:none;background:none;color:var(--ink2);font-size:.84rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.13s;font-family:var(--ff)}
.atab.on{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.atab:hover:not(.on){color:var(--ink)}

.prop-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.prop-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:.76rem;transition:.13s;color:var(--ink2);font-family:var(--ff)}
.prop-tab.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:600}
.prop-tab:hover:not(.on){border-color:var(--g);color:var(--g)}

#pm-wrap{min-height:100vh;background:var(--stone);display:flex;flex-direction:column}
.pm-header{background:var(--g3);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pm-logo{height:28px;filter:brightness(0) invert(1) opacity(.88)}
.pm-exit{border:none;background:none;color:rgba(255,255,255,.4);font-size:.76rem;cursor:pointer;font-family:var(--ff)}
.pm-body{flex:1;padding:16px;max-width:100%;margin:0 auto;width:100%}
.mon-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mon-nav button{padding:5px 12px;border:1.5px solid var(--line);border-radius:7px;background:var(--white);font-size:.8rem;font-weight:600;font-family:var(--ff)}
.mon-nav button:hover{border-color:var(--g);color:var(--g)}
.mon-label{font-family:var(--fh);font-size:1rem;font-weight:600;min-width:140px;text-align:center}

.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.xl-wrap{overflow-x:scroll;overflow-y:auto;border-radius:11px;border:1px solid var(--ld);background:var(--white);max-height:70vh;width:100%;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:#c5d0dc #f1f5f9}
.xl-wrap::-webkit-scrollbar{width:7px;height:7px}
.xl-wrap::-webkit-scrollbar-track{background:#f1f5f9}
.xl-wrap::-webkit-scrollbar-thumb{background:#c5d0dc;border-radius:5px}
.xl-tbl{border-collapse:collapse;font-size:.78rem;white-space:nowrap;table-layout:auto}
.xl-tbl th,.xl-tbl td{border:1px solid #e2e8ef;padding:0;vertical-align:middle}
.xl-tbl tbody tr:nth-child(even) td:not(.item-col):not(.subcat-row td){background:#FAFCFB}
.xl-tbl .item-col{position:sticky;left:0;background:var(--stone);z-index:2;min-width:120px;max-width:130px;width:120px;padding:5px 8px;font-weight:600;font-size:.74rem;border-right:2px solid var(--g);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xl-tbl .item-col-head{position:sticky;left:0;top:0;background:var(--g3);z-index:5;padding:6px 8px;color:rgba(255,255,255,.65);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border-right:2px solid var(--g)}
.xl-tbl thead th{position:sticky;top:0;z-index:4}
.xl-tbl .room-hd{background:var(--g);color:#fff;text-align:center;padding:5px 4px;font-size:.66rem;font-weight:700;letter-spacing:.02em;border-bottom:2px solid rgba(255,255,255,.15);min-width:160px}
.xl-tbl .sub-hd{background:#1B7A5E;color:rgba(255,255,255,.88);text-align:center;padding:4px 3px;font-size:.58rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.xl-tbl .prop-hd{background:#234e3a;color:rgba(255,255,255,.7);text-align:center;padding:4px 8px;font-size:.6rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.xl-tbl .subcat-row td{background:#F0EDE8;font-size:.6rem;font-weight:700;padding:5px 8px;text-transform:uppercase;letter-spacing:.08em;color:#0F5C4C;border-top:2px solid var(--sd);border-bottom:1px solid #d9cfc4}
.xl-tbl .subcat-row .item-col{background:#E8E2DA;color:#0F5C4C}
.xl-tbl tr:hover .item-col{background:#edf7f4}
.xl-tbl tr:not(.subcat-row):hover td:not(.item-col):not(.room-hd):not(.sub-hd):not(.prop-hd){background:#e8f6f2!important}
.xl-tbl .subcat-row:hover td{background:#E8E2DA!important}
.dmg-cell{cursor:pointer;text-align:center;min-width:72px;padding:5px 3px;user-select:none;transition:.1s;font-size:.71rem}
.dmg-cell:hover{filter:brightness(.9)}
.qty-cell{min-width:46px;padding:2px 2px;text-align:center}
.qty-inp{width:100%;border:none;background:transparent;text-align:center;font-size:.76rem;font-family:var(--fm);padding:3px 2px;outline:none;color:var(--ink)}
.qty-inp:focus{background:#fff;border:1.5px solid var(--g);border-radius:4px}
.photo-cell{text-align:center;padding:3px 3px;min-width:46px}
.photo-thumb{width:32px;height:32px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid var(--gl);transition:.13s}
.photo-thumb:hover{border-color:var(--g);transform:scale(1.1)}
.photo-add{background:none;border:1.5px dashed #d4d4d8;border-radius:5px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:.13s;color:#a1a1aa}
.photo-add:hover{border-color:var(--g);color:var(--g);background:var(--gl)}
/* back button for property detail */
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid var(--line);border-radius:8px;background:var(--white);color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;transition:.13s;font-family:var(--ff);margin-bottom:14px}
.back-btn:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

.form-inline{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:20px 22px;margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.t3{grid-template-columns:repeat(3,1fr)}
.fg.t4{grid-template-columns:repeat(4,1fr)}
.fg.t5{grid-template-columns:repeat(5,1fr)}
.ff2{display:flex;flex-direction:column;gap:4px}
.ff2 label{font-size:.63rem;font-family:var(--fm);font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.ff2 input,.ff2 select,.ff2 textarea{padding:8px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:.84rem;color:var(--ink);outline:none;transition:.13s}
.ff2 input:focus,.ff2 select:focus,.ff2 textarea:focus{border-color:var(--g)}
.tbl-inp{width:100%;border:1.5px solid var(--g);border-radius:5px;padding:4px 7px;font-size:.79rem;font-family:var(--ff);outline:none;background:#fff;color:var(--ink)}

.ltbl{width:100%;border-collapse:collapse}
.ltbl th{padding:10px 14px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-family:var(--fm);background:var(--stone);border-bottom:1px solid var(--line);white-space:nowrap}
.ltbl td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:.84rem;vertical-align:middle}
.ltbl tr:last-child td{border-bottom:none}
.ltbl tr:hover td{background:var(--gxl)}
.ltbl .edit-row td{background:#FAFFF8!important}
.tag{font-size:.65rem;padding:2px 7px;border-radius:5px;font-family:var(--fm);font-weight:600;display:inline-block}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-box{background:var(--white);border-radius:18px;padding:28px;width:530px;max-width:100%;box-shadow:0 24px 64px -16px rgba(0,0,0,.5)}
.modal-title{font-family:var(--fh);font-size:1.25rem;font-weight:600;margin-bottom:18px}
.req-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:5px;font-size:.65rem;font-family:var(--fm);font-weight:600}
.lightbox-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox-img{max-width:92vw;max-height:92vh;border-radius:10px;box-shadow:0 8px 60px rgba(0,0,0,.7);object-fit:contain}
.lightbox-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.3rem;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.empty{text-align:center;padding:52px 20px;color:var(--ink3)}
.empty strong{display:block;font-family:var(--fh);font-size:1.15rem;color:var(--ink2);margin-bottom:4px}
.divider{height:1px;background:var(--line);margin:18px 0}
.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:20px}
.dl-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:9px}
.inv-file-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:.67rem;font-family:var(--fm);font-weight:600;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:var(--stone);color:var(--ink2);transition:.12s}
.inv-file-btn:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

/* ── PROPERTY CARDS ───────────────────────────────── */
.state-heading{font-family:var(--fh);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g);background:var(--gxl);border:1px solid var(--gl);border-radius:7px;padding:5px 12px;margin:28px 0 14px;display:inline-block}
.loc-section{margin-bottom:24px;padding-left:0}
.loc-heading{font-family:var(--fh);font-size:1.1rem;font-weight:600;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:8px}
.loc-state{font-size:.72rem;color:var(--ink3);font-family:var(--fm);font-weight:400;letter-spacing:.04em}
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prop-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px 20px;cursor:pointer;transition:.2s;position:relative}
.prop-card:hover{border-color:var(--g);box-shadow:0 6px 28px -6px rgba(15,92,76,.14);transform:translateY(-2px)}
.prop-card-name{font-family:var(--fh);font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.2}
.prop-card-type{font-size:.74rem;color:var(--ink2);margin-bottom:12px}
.prop-card-rooms{font-size:.7rem;color:var(--ink3);font-family:var(--fm);padding-top:10px;border-top:1px solid var(--line)}
.prop-card-no-rooms{opacity:.5;cursor:default}
.prop-card-no-rooms:hover{transform:none;box-shadow:none;border-color:var(--line)}

/* ── DASHBOARD ────────────────────────────────────── */
.dash-section-title{font-family:var(--fh);font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:14px;margin-top:6px}
.dash-props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:28px}
.dash-grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
.dash-prop-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:16px 18px;cursor:pointer;transition:.2s}
.dash-prop-card:hover{border-color:var(--g);box-shadow:0 4px 20px -4px rgba(15,92,76,.12);transform:translateY(-1px)}
.dash-prop-loc{font-size:.62rem;color:var(--g);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:var(--fm)}
.dash-prop-name{font-family:var(--fh);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:2px}
.dash-prop-type{font-size:.72rem;color:var(--ink2);margin-bottom:8px}
.dash-prop-rooms{font-size:.68rem;color:var(--ink3);font-family:var(--fm)}
.dash-requests{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.dash-req-card{background:var(--white);border-radius:10px;border:1px solid var(--line);padding:12px 15px}
.dash-req-empty{color:var(--ink3);font-size:.84rem;padding:20px 0}

/* ── BOTTOM NAV (mobile only) ─────────────────────── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);z-index:150;padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-nav-inner{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px;border:none;background:none;color:var(--ink3);font-size:.58rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:.13s;font-family:var(--ff);position:relative}
.bn-item.on{color:var(--g)}
.bn-item.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--g);border-radius:0 0 2px 2px}
.bn-badge{position:absolute;top:5px;right:calc(50% - 18px);background:#c2410c;color:#fff;font-size:.52rem;padding:0 4px;border-radius:7px;font-family:var(--fm);min-width:14px;text-align:center;line-height:1.6}
.bn-icon{font-size:.95rem;line-height:1}

/* mobile back button in topbar (hidden on desktop, shown on mobile when in property) */
.mob-back{display:none;align-items:center;gap:4px;border:none;background:none;color:var(--g);font-size:.84rem;font-weight:700;cursor:pointer;padding:4px 8px;border-radius:7px;font-family:var(--ff);flex-shrink:0;white-space:nowrap}
.mob-back:hover{background:var(--gl)}

@media(max-width:640px){
  #side{display:none!important}
  .mbtn{display:none!important}
  .topbar-logo{display:block}
  .crumb{display:none}
  /* clip instead of hidden: prevents horizontal page scroll WITHOUT breaking position:sticky */
  #content{padding:12px 10px 16px;overflow-x:clip}
  .stat-row{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .stat{padding:12px 14px}
  .stat-v{font-size:2rem}
  .stat-l{font-size:.58rem}
  .fg,.fg.t3,.fg.t4,.fg.t5{grid-template-columns:1fr}
  /* Table: horizontal-only scroll — touch-action:pan-x stops diagonal drift */
  .xl-wrap{max-width:calc(100vw - 20px);overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;touch-action:pan-x;max-height:none}
  .xl-tbl{font-size:.7rem}
  .xl-tbl .item-col{min-width:80px;max-width:95px;width:80px;padding:4px 6px;font-size:.66rem}
  .xl-tbl .item-col-head{min-width:80px;max-width:95px;padding:4px 6px}
  .dmg-cell{min-width:62px;font-size:.63rem;padding:4px 2px}
  .qty-cell{min-width:38px}
  .photo-cell{min-width:38px;padding:2px}
  .photo-thumb,.photo-add{width:28px;height:28px}
  /* room-hd min-width matches 2 sub-cols (condition+qty) when photo is hidden */
  .xl-tbl .room-hd{min-width:104px;font-size:.62rem;padding:4px 3px}
  .xl-tbl .sub-hd{font-size:.57rem;padding:4px 2px}
  .qty-inp{font-size:.72rem}
  .dmg-cell{min-width:80px;font-size:.68rem;padding:5px 2px}
  .qty-cell{min-width:62px}
  .atab{padding:7px 10px;font-size:.78rem}
  .bottom-nav{display:block}
  #main{padding-bottom:64px}
  .prop-grid{grid-template-columns:1fr 1fr}
  .prop-card{padding:12px 13px}
  .dash-props-grid{grid-template-columns:1fr 1fr;gap:8px}
  .dash-prop-card{padding:12px 13px}
  .pg-title{font-size:1.4rem}
  .dash-grid{grid-template-columns:1fr 1fr!important}
  #topbar{padding:9px 12px}
  .s-logout{font-size:.65rem;padding:4px 8px}
  .back-btn{display:none}
  /* show topbar back button on mobile */
  .mob-back{display:flex}

  /* ── Purchases/Expenses: compact card rows on mobile ── */
  .ltbl{width:100%;border-collapse:collapse}
  .ltbl thead tr{display:none}
  .ltbl tbody tr:not(.edit-row):not(.total-row){display:block;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--white)}
  .ltbl tbody tr:not(.edit-row):not(.total-row) td{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 12px;border-bottom:1px solid #f0f0f0;font-size:.8rem;gap:8px}
  .ltbl tbody tr:not(.edit-row):not(.total-row) td:last-child{border-bottom:none;justify-content:flex-end;padding:8px 12px}
  .ltbl tbody tr:not(.edit-row):not(.total-row) td:last-child::before{display:none}
  .ltbl tbody tr:not(.edit-row):not(.total-row) td::before{content:attr(data-label);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-family:var(--fm);min-width:72px;flex-shrink:0;padding-top:1px}
  /* total row */
  .total-row td{display:inline!important;border:none!important;padding:2px 4px!important}
  .total-row td::before{display:none!important}
  .total-row{background:var(--stone);border-radius:8px;margin-top:4px;display:flex!important;justify-content:space-between;padding:8px 12px!important}
  /* edit row */
  .ltbl .edit-row{display:block}
  .ltbl .edit-row td{display:block;padding:3px 4px;border:none;font-size:.82rem}
  /* tags */
  .ltbl .tag{font-size:.72rem;padding:2px 6px}
  /* buttons in card action row */
  .ltbl .btn-edit{padding:5px 12px;font-size:.78rem}
  /* iOS zoom fix */
  input,select,textarea{font-size:16px!important}
  .ff2 input,.ff2 select,.ff2 textarea{font-size:16px}
  .tbl-inp{font-size:16px}
  .qty-inp{font-size:16px}
}
/* mobile header abbreviations */
.hd-short{display:none}
@media(max-width:640px){
  .hd-long{display:none}
  .hd-short{display:inline}
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

function dlCSV(rows,cols,fname){
  const esc=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
  const csv=[cols.join(","),...rows.map(r=>cols.map(c=>esc(r[c])).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));a.download=fname;a.click();
}
function readFileAsDataURL(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}
function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}catch{return typeof init==="function"?init():init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[v,key]);
  return[v,setV];
}
/* Real-time Firestore sync hook – falls back to localStorage when offline.
   Debounces writes to avoid hammering Firestore on rapid state changes.
   When an incoming snapshot arrives (change from another device) it cancels
   any pending local write so Firestore always wins as source of truth. */
function useFirestore(key,init,debounceMs=1500){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}catch{return typeof init==="function"?init():init;}});
  const timerRef=useRef(null);
  const pendingRef=useRef(null);
  useEffect(()=>{
    if(!window.db)return;
    const unsub=window.db.collection("ops").doc(key).onSnapshot(snap=>{
      if(snap.exists){
        const data=snap.data().v;
        // Cancel any queued local write – incoming data from another device takes priority
        clearTimeout(timerRef.current);
        pendingRef.current=null;
        try{localStorage.setItem(key,JSON.stringify(data));}catch{}
        setV(data);
      }
    },err=>console.warn("[FS listen]",key,err));
    return()=>unsub();
  },[key]);
  function setVSync(valOrFn){
    setV(prev=>{
      const next=typeof valOrFn==="function"?valOrFn(prev):valOrFn;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      pendingRef.current=next;
      clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{
        if(window.db&&pendingRef.current!==null){
          window.db.collection("ops").doc(key)
            .set({v:pendingRef.current,_ts:Date.now()})
            .catch(e=>console.warn("[FS write]",key,e));
          pendingRef.current=null;
        }
      },debounceMs);
      return next;
    });
  }
  return[v,setVSync];
}

            </select>
          </div>
          <div className="fi"><label>Your Name</label><input value={pmName} onChange={e=>setPmName(e.target.value)} placeholder="Enter your name" required/></div>
          <div className="fi"><label>Property PIN</label><input type="password" value={pmPin} onChange={e=>setPmPin(e.target.value)} placeholder="Enter PIN" required/></div>
          {err&&<div className="err">{err}</div>}
          <button className="btn-main" type="submit">Open Dashboard →</button>
        </form>
        :<form onSubmit={e=>{
            e.preventDefault();
            if(!offName.trim()){setErr("Enter your name.");return;}
            if(offPin.trim()!==OFFICE_PIN){setErr("Incorrect PIN. Contact HQ.");return;}
            onLogin({type:"office",submitter:offName.trim()});
          }}>
            <div className="fi"><label>Your Name</label><input value={offName} onChange={e=>setOffName(e.target.value)} placeholder="Enter your name" required/></div>
            <div className="fi"><label>Office PIN</label><input type="password" value={offPin} onChange={e=>setOffPin(e.target.value)} placeholder="Enter PIN" required/></div>
            {err&&<div className="err">{err}</div>}
            <button className="btn-main" type="submit">Open Office Storage →</button>
          </form>
        }
    </div></div>
  );
}

/* ══ PM EXCEL TABLE ════════════════════════════════════════ */
function useIsMobile(){
  const[mob,setMob]=useState(()=>window.innerWidth<641);
  useEffect(()=>{
    const h=()=>setMob(window.innerWidth<641);
    window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);
  },[]);
  return mob;
}
function PMExcelTable({propId,area,yr,mn,checks,setChecks,photos,setPhotos,readOnly,customItems,setCustomItems,editItems}){
  const[lightbox,setLightbox]=useState(null);
  const[addInputs,setAddInputs]=useState({});
  const[dragRoom,setDragRoom]=useState(null);
  const[dragOverRoom,setDragOverRoom]=useState(null);
  const[dragItem,setDragItem]=useState(null);
  const[dragOverItem,setDragOverItem]=useState(null);
  const[dragItemGroup,setDragItemGroup]=useState(null);
  const isMobile=useIsMobile();
  const mk=monthKey(yr,mn);
  const propInv=INV[propId]||{};
  const areaData=propInv[area]||{};
  const isRoom=area==="Room Inventory";
  const cPropItems=(customItems&&customItems[propId]&&customItems[propId][area])||{};
  const deleted=cPropItems["__deleted"]||[];

  // Room order: use custom order if set, else default
  const defaultRooms=isRoom?(areaData.rooms||[]):[];
  const customRoomOrder=isRoom?(cPropItems["__roomOrder"]||null):null;
  const rooms=isRoom
    ?(customRoomOrder&&customRoomOrder.length?[...new Set([...customRoomOrder,...defaultRooms])].filter(r=>defaultRooms.includes(r)):defaultRooms)
    :[];

  let items=isRoom?[...(areaData.items||[])]:[];
  let subcats=isRoom?null:{...(areaData.subcats||{})};
  if(isRoom){
    const cRoom=cPropItems["__room"]||[];
    const rawItems=[...new Set([...items,...cRoom])].filter(i=>!deleted.includes(i));
    const customItemOrder=cPropItems["__itemOrder"]||null;
    items=customItemOrder&&customItemOrder.length
      ?[...new Set([...customItemOrder,...rawItems])].filter(i=>rawItems.includes(i))
      :rawItems;
  }else{
    Object.entries(cPropItems).forEach(([sc,its])=>{
      if(sc==="__room"||sc==="__deleted"||sc.startsWith("__"))return;
      subcats[sc]=[...new Set([...(subcats[sc]||[]),...its])];
    });
    if(subcats)Object.keys(subcats).forEach(sc=>{
      subcats[sc]=subcats[sc].filter(i=>!deleted.includes(i));
      const customOrder=cPropItems["__itemOrder_subcat_"+sc]||null;
      if(customOrder&&customOrder.length)
        subcats[sc]=[...new Set([...customOrder,...subcats[sc]])].filter(i=>subcats[sc].includes(i));
    });
  }

  // Drag-to-reorder room columns (edit mode only)
  function handleRoomDragStart(e,r){setDragRoom(r);e.dataTransfer.effectAllowed="move";}
  function handleRoomDragOver(e,r){e.preventDefault();setDragOverRoom(r);}
  function handleRoomDrop(e,target){
    e.preventDefault();
    if(!dragRoom||dragRoom===target||!setCustomItems)return;
    const ordered=[...rooms];
    const fi=ordered.indexOf(dragRoom);const ti=ordered.indexOf(target);
    ordered.splice(fi,1);ordered.splice(ti,0,dragRoom);
    setCustomItems(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};
      n[propId][area]["__roomOrder"]=ordered;return n;
    });
    setDragRoom(null);setDragOverRoom(null);
  }
  function handleRoomDragEnd(){setDragRoom(null);setDragOverRoom(null);}

  // Drag-to-reorder item rows — drag handle <td> only, dragEnter for reliable tracking
  function handleItemDragStart(e,item,group){
    setDragItem(item);setDragItemGroup(group);
    e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",item);
  }
  function handleItemDragEnter(e,item,group){
    e.preventDefault();
    if(!dragItem||dragItem===item)return;
    const sameGroup=(group===dragItemGroup)||(group==null&&dragItemGroup==null);
    if(sameGroup)setDragOverItem(item);
  }
  function handleItemDrop(e,target,group){
    e.preventDefault();
    if(!dragItem||dragItem===target||!setCustomItems)return;
    const isSSKey=group&&group.startsWith("__ss_");
    const isSubcat=group&&!isSSKey;
    let srcList;
    if(isSSKey){
      const label=group.replace("__ss_","");
      const defItems=(INV[propId]?.[area]?.subSections||[]).find(s=>s.label===label)?.items||[];
      const raw=[...new Set([...(cPropItems["__itemOrder_"+label]||defItems),...(cPropItems[group]||[])])].filter(i=>!deleted.includes(i));
      srcList=raw;
    }else if(isSubcat){
      srcList=[...(subcats[group]||[])];
    }else{
      srcList=[...items];
    }
    const fi=srcList.indexOf(dragItem);const ti=srcList.indexOf(target);
    if(fi<0||ti<0){setDragItem(null);setDragOverItem(null);setDragItemGroup(null);return;}
    const ordered=[...srcList];ordered.splice(fi,1);ordered.splice(ti,0,dragItem);
    setCustomItems(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};
      if(isSSKey){const label=group.replace("__ss_","");n[propId][area]["__itemOrder_"+label]=ordered;}
      else if(isSubcat){n[propId][area]["__itemOrder_subcat_"+group]=ordered;}
      else{n[propId][area]["__itemOrder"]=ordered;}
      return n;
    });
    setDragItem(null);setDragOverItem(null);setDragItemGroup(null);
  }
  function handleItemDragEnd(){setDragItem(null);setDragOverItem(null);setDragItemGroup(null);}
  // Shared drag handle td (only rendered in edit mode)
  const HDLSTYLE={width:22,padding:"0 4px",textAlign:"center",cursor:"grab",color:"#9CA3AF",fontSize:15,userSelect:"none",verticalAlign:"middle"};
  function DragHandle({item,group}){
    return<td style={HDLSTYLE} draggable={true}
      onDragStart={e=>handleItemDragStart(e,item,group)}
      onDragEnd={handleItemDragEnd}
      title="Drag to reorder">⠿</td>;
  }
  function rowDragProps(item,group){
    return{
      onDragEnter:e=>handleItemDragEnter(e,item,group),
      onDragOver:e=>e.preventDefault(),
      onDrop:e=>handleItemDrop(e,item,group),
      style:{borderTop:dragOverItem===item&&dragItem!==item?"3px solid #0F5C4C":"",transition:"border-color .08s"}
    };
  }

  function removeItem(item,subcat){
    if(!setCustomItems)return;
    // subcat starting with __ss_ = subsection item
    const isSSKey=subcat&&subcat.startsWith("__ss_");
    let origDef;
    if(isSSKey){
      const label=subcat.replace("__ss_","");
      origDef=(INV[propId]?.[area]?.subSections||[]).find(s=>s.label===label)?.items||[];
    }else{
      origDef=isRoom?(INV[propId]?.[area]?.items||[]):(subcat?(INV[propId]?.[area]?.subcats?.[subcat]||[]):[]);
    }
    const isDef=origDef.includes(item);
    setCustomItems(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};
      if(isDef){
        if(!n[propId][area]["__deleted"])n[propId][area]["__deleted"]=[];
        if(!n[propId][area]["__deleted"].includes(item))n[propId][area]["__deleted"].push(item);
      }else{
        const key=subcat||"__room";
        if(n[propId][area][key])n[propId][area][key]=n[propId][area][key].filter(i=>i!==item);
      }
      return n;
    });
  }
  function doAddItem(subcat){
    const key=subcat||"__room";
    const name=(addInputs[key]||"").trim();
    if(!name||!setCustomItems)return;
    setCustomItems(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};
      if(!n[propId][area][key])n[propId][area][key]=[];
      if(!n[propId][area][key].includes(name))n[propId][area][key].push(name);
      return n;
    });
    setAddInputs(a=>({...a,[key]:""}));
  }
  function AddRow({subcat,colSpan}){
    const key=subcat||"__room";
    return(
      <tr><td colSpan={colSpan} style={{padding:"5px 6px"}}>
        <div style={{display:"flex",gap:4}}>
          <input value={addInputs[key]||""} onChange={e=>setAddInputs(a=>({...a,[key]:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&doAddItem(subcat)}
            placeholder="+ Type item name and press Enter or +"
            style={{flex:1,padding:"4px 8px",border:"1px dashed #0F5C4C",borderRadius:5,fontSize:".74rem",outline:"none",fontFamily:"var(--ff)",background:"#F0FAF7"}}/>
          <button onClick={()=>doAddItem(subcat)} style={{padding:"4px 10px",background:"#0F5C4C",color:"#fff",border:"none",borderRadius:5,fontSize:".74rem",cursor:"pointer",fontWeight:700}}>+</button>
        </div>
      </td></tr>
    );
  }
  const allItems=subcats?Object.values(subcats).flat():items;

  function getV(item,room,field){
    const rk=isRoom?room:"property";
    try{const c=checks&&checks[propId]&&checks[propId][area]&&checks[propId][area][rk]&&checks[propId][area][rk][mk]&&checks[propId][area][rk][mk][item];return(c&&c[field])||"";}catch{return"";}
  }
  function setV(item,room,field,val){
    if(readOnly)return;
    setChecks(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=isRoom?room:"property";
      if(!n[propId])n[propId]={};if(!n[propId][area])n[propId][area]={};if(!n[propId][area][rk])n[propId][area][rk]={};
      if(!n[propId][area][rk][mk])n[propId][area][rk][mk]={};if(!n[propId][area][rk][mk][item])n[propId][area][rk][mk][item]={};
      n[propId][area][rk][mk][item][field]=val;return n;
    });
  }
  function cycleD(item,room){if(!readOnly)setV(item,room,"damage",nxtDmg(getV(item,room,"damage")));}

  function getPhoto(item,room){
    try{return photos&&photos[propId]&&photos[propId][room||"_"]&&photos[propId][room||"_"][item]||null;}catch{return null;}
  }
  async function handlePhoto(e,item,room){
    const file=e.target.files[0];if(!file)return;
    const dataUrl=await readFileAsDataURL(file);
    if(setPhotos)setPhotos(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=room||"_";
      if(!n[propId])n[propId]={};if(!n[propId][rk])n[propId][rk]={};
      n[propId][rk][item]=dataUrl;return n;
    });
  }
  function removePhoto(item,room){
    if(setPhotos)setPhotos(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      const rk=room||"_";
      try{delete n[propId][rk][item];}catch{}return n;
    });
  }

  if(isRoom&&rooms.length===0)return<div className="empty"><strong>No rooms configured</strong>for this property.</div>;

  function PhotoCell({item,room}){
    const src=getPhoto(item,room);
    const fid=`ph-${propId}-${room||"_"}-${item}`.replace(/\s/g,"_");
    if(src)return(
      <td className="photo-cell">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <img className="photo-thumb" src={src} alt={item} onClick={()=>setLightbox(src)}/>
          {setPhotos&&<button style={{background:"none",border:"none",fontSize:".58rem",color:"#9CA3AF",cursor:"pointer",padding:0}} onClick={()=>removePhoto(item,room)}>remove</button>}
        </div>
      </td>
    );
    if(!setPhotos)return<td className="photo-cell"><span style={{color:"#d1d5db",fontSize:".7rem"}}>—</span></td>;
    return(
      <td className="photo-cell">
        <label htmlFor={fid} className="photo-add" title="Add photo">📷
          <input id={fid} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handlePhoto(e,item,room)}/>
        </label>
      </td>
    );
  }

  return(
    <>
    {lightbox&&<Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
    <div className="xl-wrap">
      <table className="xl-tbl">
        <thead>
          {isRoom&&<tr>
            {editItems&&<th rowSpan={2} style={{width:22,background:"#F9FAFB"}}/>}
            <th className="item-col-head" rowSpan={2}>Item</th>
            {rooms.map(r=><th key={r} className="room-hd" colSpan={isMobile?2:3}
              draggable={!!editItems}
              onDragStart={editItems?e=>handleRoomDragStart(e,r):undefined}
              onDragOver={editItems?e=>handleRoomDragOver(e,r):undefined}
              onDrop={editItems?e=>handleRoomDrop(e,r):undefined}
              onDragEnd={editItems?handleRoomDragEnd:undefined}
              style={{cursor:editItems?"grab":"default",opacity:dragOverRoom===r&&dragRoom!==r?.6:1,outline:dragOverRoom===r&&dragRoom!==r?"2px dashed #0F5C4C":"none",transition:"opacity .15s"}}
            >{editItems?<span title="Drag to reorder">⠿ {r}</span>:r}</th>)}
            {editItems&&<th rowSpan={2} style={{width:28}}/>}
          </tr>}
          {isRoom&&<tr>
            {rooms.map(r=><React.Fragment key={r}>
              <th className="sub-hd" style={{minWidth:62}}>Condition</th>
              <th className="sub-hd" style={{minWidth:40}}>Qty</th>
              {!isMobile&&<th className="sub-hd" style={{minWidth:36}}>Photo</th>}
            </React.Fragment>)}
          </tr>}
          {!isRoom&&<tr>
            {editItems&&<th style={{width:22,background:"#F9FAFB"}}/>}
            <th className="item-col-head">Item</th>
            <th className="prop-hd" style={{minWidth:62}}>Condition</th>
            <th className="prop-hd" style={{minWidth:40}}>Quantity</th>
            <th className="prop-hd" style={{minWidth:36}}>Photo</th>
            {editItems&&<th style={{width:28}}/>}
          </tr>}
        </thead>
        <tbody>
          {isRoom
            ?[
              // Main room items
              ...items.map(item=><tr key={item} {...rowDragProps(item,null)}>
                {editItems&&<DragHandle item={item} group={null}/>}
                <td className="item-col">{item}</td>
                {rooms.map(room=>{
                  const dmg=getV(item,room,"damage");const qty=getV(item,room,"qty");const dcfg=DMG[dmg]||DMG[""];
                  return<React.Fragment key={room}>
                    <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,room)} title={readOnly?"":"Click to change"}>
                      <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                    </td>
                    <td className="qty-cell">
                      <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,room,"qty",e.target.value)}/>
                    </td>
                    {!isMobile&&<PhotoCell item={item} room={room}/>}
                  </React.Fragment>;
                })}
                {editItems&&<td style={{padding:"0 4px"}}><button onClick={()=>removeItem(item,null)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:13,lineHeight:1,padding:2}} title="Remove item">✕</button></td>}
              </tr>),
              ...(editItems?[<AddRow key="__add_room" subcat={null} colSpan={2+rooms.length*(isMobile?2:3)+1}/>]:[]),
              // Sub-sections: Guest Amenities, Washroom, etc.
              ...(areaData.subSections||[]).flatMap(ss=>{
                const ssKey="__ss_"+ss.label;
                const rawSsItems=[...(ss.items||[]).filter(i=>!deleted.includes(i)),...(cPropItems[ssKey]||[])];
                const customSsOrder=cPropItems["__itemOrder_"+ss.label]||null;
                const ssItems=customSsOrder&&customSsOrder.length
                  ?[...new Set([...customSsOrder,...rawSsItems])].filter(i=>rawSsItems.includes(i))
                  :rawSsItems;
                const colCount=rooms.length*(isMobile?2:3);
                return[
                  <tr key={"ss-hd-"+ss.label}>
                    {editItems&&<td style={{background:"#E8F3F0",borderTop:"2px solid var(--gl)"}}/>}
                    <td className="item-col" style={{background:"#E8F3F0",color:"var(--g)",fontWeight:700,fontSize:".7rem",letterSpacing:".07em",textTransform:"uppercase",padding:"6px 12px",borderTop:"2px solid var(--gl)"}}>
                      {ss.label}
                    </td>
                    {rooms.map(r=><React.Fragment key={r}>
                      <td style={{background:"#E8F3F0",borderTop:"2px solid var(--gl)"}}/>
                      <td style={{background:"#E8F3F0",borderTop:"2px solid var(--gl)"}}/>
                      {!isMobile&&<td style={{background:"#E8F3F0",borderTop:"2px solid var(--gl)"}}/>}
                    </React.Fragment>)}
                    {editItems&&<td style={{background:"#E8F3F0",borderTop:"2px solid var(--gl)"}}/>}
                  </tr>,
                  ...ssItems.map(item=><tr key={"ss-"+ss.label+"-"+item} {...rowDragProps(item,ssKey)}>
                    {editItems&&<DragHandle item={item} group={ssKey}/>}
                    <td className="item-col" style={{paddingLeft:22}}>{item}</td>
                    {rooms.map(room=>{
                      const dmg=getV(item,room,"damage");const qty=getV(item,room,"qty");const dcfg=DMG[dmg]||DMG[""];
                      return<React.Fragment key={room}>
                        <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,room)} title={readOnly?"":"Click to change"}>
                          <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                        </td>
                        <td className="qty-cell">
                          <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,room,"qty",e.target.value)}/>
                        </td>
                        {!isMobile&&<PhotoCell item={item} room={room}/>}
                      </React.Fragment>;
                    })}
                    {editItems&&<td style={{padding:"0 4px"}}><button onClick={()=>removeItem(item,ssKey)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:13,lineHeight:1,padding:2}} title="Remove item">✕</button></td>}
                  </tr>),
                  ...(editItems?[<AddRow key={"__add_"+ssKey} subcat={ssKey} colSpan={2+colCount+1}/>]:[])
                ];
              })
            ]
            :subcats
              ?Object.entries(subcats).flatMap(([sub,sitems])=>[
                <tr key={"sub-"+sub} className="subcat-row">
                  {editItems&&<td style={{background:"#F8F4EF"}}/>}
                  <td className="item-col" style={{color:"#0F5C4C",fontWeight:700}}>{sub}</td>
                  <td style={{background:"#F8F4EF"}}/><td style={{background:"#F8F4EF"}}/><td style={{background:"#F8F4EF"}}/>
                  {editItems&&<td style={{background:"#F8F4EF"}}/>}
                </tr>,
                ...sitems.map(item=>{
                  const dmg=getV(item,null,"damage");const qty=getV(item,null,"qty");const dcfg=DMG[dmg]||DMG[""];
                  return<tr key={item} {...rowDragProps(item,sub)}>
                    {editItems&&<DragHandle item={item} group={sub}/>}
                    <td className="item-col">{item}</td>
                    <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,null)} title={readOnly?"":"Click to change"}>
                      <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                    </td>
                    <td className="qty-cell">
                      <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,null,"qty",e.target.value)}/>
                    </td>
                    <PhotoCell item={item} room={null}/>
                    {editItems&&<td style={{padding:"0 4px"}}><button onClick={()=>removeItem(item,sub)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:13,lineHeight:1,padding:2}} title="Remove item">✕</button></td>}
                  </tr>;
                }),
                ...(editItems?[<AddRow key={"__add_"+sub} subcat={sub} colSpan={5+(editItems?1:0)}/>]:[])
              ])
              :allItems.map(item=>{
                const dmg=getV(item,null,"damage");const qty=getV(item,null,"qty");const dcfg=DMG[dmg]||DMG[""];
                return<tr key={item} {...rowDragProps(item,null)}>
                  {editItems&&<DragHandle item={item} group={null}/>}
                  <td className="item-col">{item}</td>
                  <td className="dmg-cell" style={{background:dcfg.bg}} onClick={()=>cycleD(item,null)} title={readOnly?"":"Click to change"}>
                    <span style={{color:dcfg.c,fontWeight:700,fontSize:".74rem"}}>{dcfg.sym||"—"} {dmg||"—"}</span>
                  </td>
                  <td className="qty-cell">
                    <input className="qty-inp" type="number" min="0" value={qty} placeholder="0" readOnly={readOnly} onChange={e=>setV(item,null,"qty",e.target.value)}/>
                  </td>
                  <PhotoCell item={item} room={null}/>
                  {editItems&&<td style={{padding:"0 4px"}}><button onClick={()=>removeItem(item,null)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:13,lineHeight:1,padding:2}} title="Remove item">✕</button></td>}
                </tr>;
              })
          }
        </tbody>
      </table>
    </div>
    </>
  );
}

/* ══ PM REQUEST FORM ════════════════════════════════════════ */
function PMRequestForm({session,onClose,onSubmit}){
  const[form,setForm]=useState({type:"Damage Report",area:"Room Inventory",room:"",item:"",description:"",qty:"",urgency:"Normal"});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const propInv=INV[session.propId]||{};
  const areaData=propInv[form.area]||{};
  const isRoom=form.area==="Room Inventory";
  const rooms=isRoom?(areaData.rooms||[]):[];
  const allItems=areaData.subcats?Object.values(areaData.subcats).flat():(areaData.items||[]);
  function submit(e){
    e.preventDefault();
    onSubmit({...form,id:Date.now(),ts:Date.now(),propId:session.propId,propName:session.propName,submitter:session.submitter,date:new Date().toLocaleDateString("en-IN"),status:"Pending"});
    onClose();
  }
  return(

          <div className="fg" style={{marginBottom:10}}>

          </div>
          <div className="ff2" style={{marginBottom:10}}><label>Item</label>

          </div>

          {form.type==="Item Needed"&&<div className="ff2" style={{marginBottom:10}}><label>Quantity Needed</label><input type="number" min="1" value={form.qty} onChange={e=>upd("qty",e.target.value)} placeholder="e.g. 5"/></div>}

            <button type="button" className="btn btn-out btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-req btn-sm">📮 Send to HQ</button>

/* ══ INVENTORY RECEIVED MODAL ═══════════════════════════════ */
function InvReceivedModal({session,checks,setChecks,customItems,setCustomItems,requests,setRequests,proc,setProc,received,setReceived,onClose}){
  const propId=session.propId;
  const propInv=INV[propId]||{};
  const[selArea,setSelArea]=useState("Room Inventory");
  const[selSubcat,setSelSubcat]=useState("");
  const[itemName,setItemName]=useState("");
  const[isNew,setIsNew]=useState(false);
  const[newSubcat,setNewSubcat]=useState("");
  const[qtyRec,setQtyRec]=useState("");
  const[room,setRoom]=useState("");
  const[vendor,setVendor]=useState("");
  const[price,setPrice]=useState("");
  const[invoiceNo,setInvoiceNo]=useState("");
  const[linkedReqId,setLinkedReqId]=useState("");
  const[err,setErr]=useState("");

  const areaData=propInv[selArea]||{};
  const isRoom=selArea==="Room Inventory";
  const rooms=isRoom?(areaData.rooms||[]):[];
  const cItems=customItems&&customItems[propId]&&customItems[propId][selArea]||{};
  const subcatMap={...(areaData.subcats||{})};
  Object.entries(cItems).forEach(([sc,its])=>{subcatMap[sc]=[...new Set([...(subcatMap[sc]||[]),...its])];});
  const subcats=isRoom?[]:Object.keys(subcatMap);
  const subcatItems=selSubcat?(subcatMap[selSubcat]||[]):(isRoom?(areaData.items||[]):[]);
  const allKnownItems=isRoom?(areaData.items||[]):Object.values(subcatMap).flat();
  // Pending "Item Needed" requests for this property not yet linked to a receipt
  const openReqs=(requests||[]).filter(r=>r.propId===propId&&r.type==="Item Needed"&&r.status!=="Resolved"&&!r.linkedReceiptId);

  function save(e){
    e.preventDefault();
    const item=itemName.trim();
    if(!item){setErr("Enter item name.");return;}
    if(!isRoom&&!selSubcat&&!newSubcat){setErr("Select or enter a category.");return;}
    const sc=isRoom?"__room":(selSubcat||newSubcat);
    const qty=parseFloat(qtyRec)||0;
    const mk=monthKey(new Date().getFullYear(),new Date().getMonth()+1);
    const rk=isRoom?(room||"Common Area"):"property";
    const receiptId=Date.now();

    // Add to customItems if new
    if(isNew){
      setCustomItems(prev=>{
        const n=JSON.parse(JSON.stringify(prev||{}));
        if(!n[propId])n[propId]={};if(!n[propId][selArea])n[propId][selArea]={};
        if(!n[propId][selArea][sc])n[propId][selArea][sc]=[];
        if(!n[propId][selArea][sc].includes(item))n[propId][selArea][sc].push(item);
        return n;
      });
    }

    // Update inventory qty
    setChecks(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[propId])n[propId]={};if(!n[propId][selArea])n[propId][selArea]={};
      if(!n[propId][selArea][rk])n[propId][selArea][rk]={};if(!n[propId][selArea][rk][mk])n[propId][selArea][rk][mk]={};
      const cur=parseFloat(n[propId][selArea][rk][mk][item]?.qty)||0;
      if(!n[propId][selArea][rk][mk][item])n[propId][selArea][rk][mk][item]={damage:""};
      n[propId][selArea][rk][mk][item].qty=String(cur+qty);
      return n;
    });

    // Create purchase entry if price given — ONE entry, linked to request if applicable
    if(price){
      const prop=ALL_PROPS.find(p=>p.id===propId);
      setProc(prev=>{
        // Dedup: if a purchase entry already exists linked to this request, don't create another
        if(linkedReqId&&prev.some(p=>p.linkedRequestId===linkedReqId))return prev;
        return[...prev,{
          id:receiptId,purchaseDate:new Date().toISOString().slice(0,10),
          item,qty,unitPrice:price/qty||"",price:parseFloat(price)||0,
          vendor:vendor||"—",property:prop?.name||propId,
          category:selArea,invoiceNo:invoiceNo||"",invoiceFile:null,notes:"",
          sourceType:"inventory_received",linkedRequestId:linkedReqId||null,
          addedBy:session.submitter,warranty:""
        }];
      });
    }

    // Always log to received inventory list (visible to both PM and HQ)
    if(setReceived){
      const prop=ALL_PROPS.find(p=>p.id===propId);
      setReceived(prev=>[{
        id:receiptId,
        date:new Date().toISOString().slice(0,10),
        item,qty,
        area:selArea,
        propId,propName:prop?.name||propId,
        receivedBy:session.submitter||session.name||"—",
        vendor:vendor||"—",
        price:price?parseFloat(price)||0:null,
        invoiceNo:invoiceNo||"",
        linkedRequestId:linkedReqId||null,
      },...(prev||[])]);
    }

    // Auto-resolve linked request and mark receipt ID on it
    if(linkedReqId){
      setRequests(prev=>prev.map(r=>r.id===Number(linkedReqId)||r.id===linkedReqId
        ?{...r,status:"Resolved",linkedReceiptId:receiptId}:r));
    }
    onClose();
  }

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">📦 Inventory Received</div>
        <form onSubmit={save}>
          <div className="fg" style={{marginBottom:10}}>
            <div className="ff2"><label>Area / Header</label>
              <select value={selArea} onChange={e=>{setSelArea(e.target.value);setSelSubcat("");setItemName("");setIsNew(false);}}>
                {AREAS.map(a=><option key={a}>{a}</option>)}
              </select>
            </div>
            {!isRoom&&<div className="ff2"><label>Category</label>
              <select value={selSubcat} onChange={e=>{setSelSubcat(e.target.value);setNewSubcat("");setItemName("");setIsNew(false);}}>
                <option value="">— Select or type new below —</option>
                {subcats.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>}
          </div>
          {!isRoom&&!selSubcat&&<div className="ff2" style={{marginBottom:10}}><label>New Category Name</label><input value={newSubcat} onChange={e=>setNewSubcat(e.target.value)} placeholder="e.g. Cold Storage"/></div>}
          {isRoom&&<div className="ff2" style={{marginBottom:10}}><label>Room</label>
            <select value={room} onChange={e=>setRoom(e.target.value)}>
              <option value="">Common Area</option>
              {rooms.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>}
          <div className="ff2" style={{marginBottom:6}}><label>Item Name</label>
            <input value={itemName} onChange={e=>{setItemName(e.target.value);const known=allKnownItems.map(i=>i.toLowerCase());setIsNew(e.target.value.trim()&&!known.includes(e.target.value.trim().toLowerCase()));}} placeholder="Type or select item" list="inv-items-list" required/>
            <datalist id="inv-items-list">{subcatItems.map(i=><option key={i} value={i}/>)}</datalist>
          </div>
          {isNew&&<div style={{fontSize:".72rem",color:"#0F5C4C",background:"#E8F3F0",borderRadius:5,padding:"4px 8px",marginBottom:8}}>✦ New item — will be added to {selArea}{selSubcat||newSubcat?" › "+(selSubcat||newSubcat):""}</div>}
          <div className="fg" style={{marginBottom:10}}>
            <div className="ff2"><label>Qty Received</label><input type="number" min="0" value={qtyRec} onChange={e=>setQtyRec(e.target.value)} placeholder="0" required/></div>
            <div className="ff2"><label>Vendor / Source</label><input value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="e.g. HO Godown"/></div>
          </div>
          <div className="fg" style={{marginBottom:10}}>
            <div className="ff2"><label>Total Cost ₹ <span style={{color:"var(--ink3)",fontWeight:400}}>(optional — adds to Purchases)</span></label><input type="number" min="0" value={price} onChange={e=>setPrice(e.target.value)} placeholder="Leave blank if unknown"/></div>
            <div className="ff2"><label>Invoice No.</label><input value={invoiceNo} onChange={e=>setInvoiceNo(e.target.value)} placeholder="e.g. INV-1023"/></div>
          </div>
          {openReqs.length>0&&<div className="ff2" style={{marginBottom:10}}>
            <label>Link to Pending Request <span style={{color:"var(--ink3)",fontWeight:400}}>(prevents duplicate purchase entry)</span></label>
            <select value={linkedReqId} onChange={e=>setLinkedReqId(e.target.value)}>
              <option value="">— None —</option>
              {openReqs.map(r=><option key={r.id} value={r.id}>{r.item} · {r.date} · {r.urgency}</option>)}
            </select>
          </div>}
          {err&&<div className="err">{err}</div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <button type="button" className="btn btn-out btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-g btn-sm">📦 Save Receipt</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ══ PM PORTAL ══════════════════════════════════════════════ */
function PMPortal({session,onLogout,checks,setChecks,photos,setPhotos,requests,setRequests,customItems,setCustomItems,proc,setProc,received,setReceived}){

        </svg>
        <div style={{color:"rgba(255,255,255,.75)",fontSize:".82rem",flex:1,marginLeft:10}}>{session.propName} · {session.submitter}</div>
        {window.db&&<span style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"11px",color:"rgba(255,255,255,.55)",whiteSpace:"nowrap",marginRight:4}}><span style={{width:"6px",height:"6px",borderRadius:"50%",background:"#34D399",display:"inline-block"}}/>Live</span>}
        <button className="btn-g" style={{padding:"6px 12px",fontSize:".74rem",border:"none",borderRadius:7,cursor:"pointer",fontFamily:"var(--ff)",fontWeight:600,color:"#fff",background:"#1B7A5E",marginRight:4}} onClick={()=>setShowInvForm(true)}>📦 Log Received</button>
        <button style={{padding:"6px 12px",fontSize:".74rem",border:"1.5px solid "+(showReceivedLog?"#1B7A5E":"rgba(255,255,255,.3)"),borderRadius:7,cursor:"pointer",fontFamily:"var(--ff)",fontWeight:600,color:"#fff",background:showReceivedLog?"#1B7A5E":"transparent",marginRight:4}} onClick={()=>setShowReceivedLog(s=>!s)}>📋 Received Log</button>
        <button onClick={()=>setEditItems(m=>!m)} style={{padding:"6px 12px",fontSize:".74rem",border:"1.5px solid "+(editItems?"#0F5C4C":"rgba(255,255,255,.3)"),borderRadius:7,cursor:"pointer",fontFamily:"var(--ff)",fontWeight:600,color:"#fff",background:editItems?"#0F5C4C":"transparent",marginRight:4}}>{editItems?"✓ Done":"✏️ Edit Items"}</button>
        <button className="btn-req" style={{padding:"6px 12px",fontSize:".74rem"}} onClick={()=>setShowReqForm(true)}>📮 Request to HQ</button>
        <button className="pm-exit" style={{marginLeft:8}} onClick={onLogout}>Exit ✕</button>
      </div>
      <div className="pm-body">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:12}}>
          <div><div style={{fontWeight:700,fontSize:"1.05rem"}}>{session.propName}</div><div style={{fontSize:".76rem",color:"var(--ink3)"}}>Monthly inventory check · {session.submitter}</div></div>
          <div className="mon-nav" style={{margin:0}}><button onClick={prevMon}>‹</button><span className="mon-label">{monthLabel(yr,mn)}</span><button onClick={nextMon}>›</button></div>
        </div>
        <div className="atabs" style={{marginBottom:12}}>
          {AREAS.map(a=><button key={a} className={"atab"+(area===a?" on":"")} onClick={()=>setArea(a)}>{a}</button>)}
        </div>
        <div style={{fontSize:".72rem",color:"var(--ink3)",marginBottom:8,fontFamily:"var(--fm)"}}>
          Click <span style={{background:"#DCFCE7",color:"#15803D",padding:"1px 6px",borderRadius:4,fontWeight:700}}>condition cell</span> to cycle · Enter quantities · Click 📷 to attach a photo · Scroll right for all rooms
        </div>
        <PMExcelTable propId={session.propId} area={area} yr={yr} mn={mn} checks={checks} setChecks={setChecks} photos={photos} setPhotos={setPhotos} customItems={customItems} setCustomItems={setCustomItems} editItems={editItems}/>
        {myReqs.length>0&&<div style={{marginTop:18}}>
          <div style={{fontWeight:700,fontSize:".82rem",marginBottom:8}}>Your Recent Requests</div>
          {myReqs.map(r=><div key={r.id} style={{background:"var(--white)",border:"1px solid var(--line)",borderRadius:9,padding:"10px 13px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>

              <div style={{fontWeight:600,fontSize:".84rem",marginTop:4}}>{r.item}{r.room?" — "+r.room:""}</div>

            </div>
            {(received||[]).filter(r=>r.propId===session.propId).length===0
              ?<div style={{color:"var(--ink3)",fontSize:".8rem",padding:"12px 0"}}>No inventory items received yet for {session.propName}.</div>
              :<ReceivedLog received={(received||[]).filter(r=>r.propId===session.propId)} showProp={false}/>
            }
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ RECEIVED INVENTORY LOG ════════════════════════════════ */
function ReceivedLog({received,showProp=true}){
  const[filterProp,setFilterProp]=useState("");
  const list=(received||[]).filter(r=>!filterProp||r.propId===filterProp);
  const props=[...new Map((received||[]).map(r=>[r.propId,r.propName])).entries()];
  const fmtD=d=>{try{return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});}catch{return d;}};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div className="pg-title" style={{marginBottom:0}}>Inventory Received</div>
        {showProp&&props.length>1&&<select value={filterProp} onChange={e=>setFilterProp(e.target.value)} style={{border:"1px solid var(--line)",borderRadius:7,padding:"5px 10px",fontSize:".78rem",background:"var(--white)"}}>
          <option value="">All Properties</option>
          {props.map(([id,name])=><option key={id} value={id}>{name}</option>)}
        </select>}
      </div>
      {list.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"var(--ink3)",fontSize:".85rem"}}>No inventory received yet.</div>:(
        <div style={{overflowX:"auto"}}>
          <table className="ltbl" style={{fontSize:".78rem"}}>
            <thead><tr style={{background:"var(--stone)"}}>
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)",whiteSpace:"nowrap"}}>Date</th>
              {showProp&&<th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Property</th>}
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Item</th>
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Area</th>
              <th style={{padding:"8px 12px",textAlign:"right",fontWeight:600,color:"var(--ink2)"}}>Qty</th>
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Vendor</th>
              <th style={{padding:"8px 12px",textAlign:"right",fontWeight:600,color:"var(--ink2)"}}>Price</th>
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Received By</th>
              <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600,color:"var(--ink2)"}}>Invoice</th>
            </tr></thead>
            <tbody>
              {list.map((r,i)=>(
                <tr key={r.id} style={{borderBottom:"1px solid var(--line)",background:i%2===0?"var(--white)":"var(--stone)"}}>
                  <td style={{padding:"8px 12px",whiteSpace:"nowrap",fontFamily:"var(--fm)",color:"var(--ink3)"}}>{fmtD(r.date)}</td>
                  {showProp&&<td style={{padding:"8px 12px",fontWeight:600}}>{r.propName}</td>}
                  <td style={{padding:"8px 12px",fontWeight:600}}>{r.item}</td>
                  <td style={{padding:"8px 12px",color:"var(--ink2)"}}>{r.area}</td>
                  <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"var(--fm)"}}>{r.qty}</td>
                  <td style={{padding:"8px 12px",color:"var(--ink3)"}}>{r.vendor||"—"}</td>
                  <td style={{padding:"8px 12px",textAlign:"right",fontFamily:"var(--fm)"}}>{r.price!=null?`₹${Number(r.price).toLocaleString("en-IN")}`:"—"}</td>
                  <td style={{padding:"8px 12px",color:"var(--ink3)"}}>{r.receivedBy}</td>
                  <td style={{padding:"8px 12px",color:"var(--ink3)",fontFamily:"var(--fm)"}}>{r.invoiceNo||"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══ HQ REQUESTS ════════════════════════════════════════════ */
function HQRequests({requests,setRequests,proc,setProc,received,setReceived}){
  const[filter,setFilter]=useState("All");
  const[purchaseForm,setPurchaseForm]=useState({}); // {reqId: {price,vendor,invoiceNo}}
  const statuses=["All","Pending","In Progress","Resolved"];
  const filtered=filter==="All"?requests:requests.filter(r=>r.status===filter);
  const stCols={"Pending":{bg:"#FEF9C3",c:"#92400E"},"In Progress":{bg:"#EFF6FF",c:"#1D4ED8"},"Resolved":{bg:"#DCFCE7",c:"#15803D"}};

  function updStatus(id,s){
    setRequests(prev=>prev.map(r=>r.id===id?{...r,status:s}:r));
  }
  function addPurchaseFromRequest(r,pf){
    // Dedup: if already linked from PM's inventory received, skip
    if(r.linkedReceiptId||(proc||[]).some(p=>p.linkedRequestId===r.id)){
      setRequests(prev=>prev.map(x=>x.id===r.id?{...x,status:"Resolved"}:x));
      setPurchaseForm(prev=>{const n={...prev};delete n[r.id];return n;});
      return;
    }
    const newId=Date.now();
    setProc(prev=>[...prev,{
      id:newId,purchaseDate:new Date().toISOString().slice(0,10),
      item:r.item,qty:parseFloat(r.qty)||1,price:parseFloat(pf.price)||0,
      vendor:pf.vendor||"—",property:r.propName,category:r.area||"",
      invoiceNo:pf.invoiceNo||"",invoiceFile:null,notes:"From request: "+r.description,
      warranty:"",sourceType:"from_request",linkedRequestId:r.id,addedBy:"HQ"
    }]);
    setRequests(prev=>prev.map(x=>x.id===r.id?{...x,status:"Resolved",linkedReceiptId:newId}:x));
    // Also log to received inventory list
    if(setReceived){setReceived(prev=>[{id:newId,date:new Date().toISOString().slice(0,10),item:r.item,qty:parseFloat(r.qty)||1,area:r.area||"",propId:r.propId,propName:r.propName,receivedBy:"HQ",vendor:pf.vendor||"—",price:parseFloat(pf.price)||0,invoiceNo:pf.invoiceNo||"",linkedRequestId:r.id},...(prev||[])]);}
    setPurchaseForm(prev=>{const n={...prev};delete n[r.id];return n;});
  }

  return(
    <div>
      <div className="pg-title">Requests from Property Managers</div>
      <div className="pg-sub">Damage reports and item requests — update status as you action them</div>
      <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
        {statuses.map(s=><button key={s} className={"prop-tab"+(filter===s?" on":"")} onClick={()=>setFilter(s)}>
          {s}{s==="Pending"&&requests.filter(r=>r.status==="Pending").length>0?` (${requests.filter(r=>r.status==="Pending").length})`:""}
        </button>)}
      </div>
      {filtered.length===0
        ?<div className="empty"><strong>No requests</strong>in this filter.</div>
        :filtered.map(r=>{
          const uc=stCols[r.status]||{bg:"#f3f4f6",c:"#6b7280"};
          const urgC=r.urgency==="Critical"?"#FEE2E2":r.urgency==="Urgent"?"#FEF9C3":"transparent";
          const alreadyLinked=r.linkedReceiptId||(proc||[]).some(p=>p.linkedRequestId===r.id);
          const pf=purchaseForm[r.id]||{};
          return<div key={r.id} style={{background:"var(--white)",border:"1px solid var(--line)",borderRadius:10,padding:"13px 15px",marginBottom:9,borderLeft:`4px solid ${r.urgency==="Critical"?"#b91c1c":r.urgency==="Urgent"?"#92400E":"var(--line)"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <span className="req-badge" style={{background:r.type==="Damage Report"?"#FEF9C3":"var(--gl)",color:r.type==="Damage Report"?"#92400E":"var(--g)"}}>{r.type}</span>
                  <span className="req-badge" style={{background:urgC,color:r.urgency==="Critical"?"#b91c1c":r.urgency==="Urgent"?"#92400E":"var(--ink3)"}}>{r.urgency}</span>
                  {alreadyLinked&&<span className="req-badge" style={{background:"#E8F3F0",color:"var(--g)"}}>✓ Purchase logged</span>}
                  <span style={{fontSize:".68rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>from {r.propName} · {r.submitter} · {r.date}</span>
                </div>
                <div style={{fontWeight:700,fontSize:".9rem",marginBottom:3}}>{r.item}{r.room?" — "+r.room:""} <span style={{fontWeight:400,color:"var(--ink3)",fontSize:".8rem"}}>({r.area})</span></div>
                <div style={{fontSize:".8rem",color:"var(--ink2)"}}>{r.description}</div>
                {r.qty&&<div style={{fontSize:".74rem",color:"var(--g)",marginTop:3}}>Quantity needed: {r.qty}</div>}
                {/* Purchase form — only for Item Needed, when resolving, not already logged */}
                {purchaseForm[r.id]!==undefined&&r.type==="Item Needed"&&!alreadyLinked&&(
                  <div style={{marginTop:10,background:"var(--stone)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--gl)"}}>
                    <div style={{fontSize:".72rem",fontWeight:700,color:"var(--g)",marginBottom:7}}>Add to Purchases (optional)</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      <div className="ff2"><label>Total Cost ₹</label><input type="number" value={pf.price||""} onChange={e=>setPurchaseForm(p=>({...p,[r.id]:{...p[r.id],price:e.target.value}}))} placeholder="0"/></div>
                      <div className="ff2"><label>Vendor</label><input value={pf.vendor||""} onChange={e=>setPurchaseForm(p=>({...p,[r.id]:{...p[r.id],vendor:e.target.value}}))} placeholder="Vendor"/></div>
                      <div className="ff2"><label>Invoice No.</label><input value={pf.invoiceNo||""} onChange={e=>setPurchaseForm(p=>({...p,[r.id]:{...p[r.id],invoiceNo:e.target.value}}))} placeholder="INV-"/></div>
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:8}}>
                      <button type="button" className="btn btn-g btn-sm" onClick={()=>addPurchaseFromRequest(r,pf)}>✓ Confirm &amp; Resolve</button>
                      <button type="button" className="btn btn-out btn-sm" onClick={()=>{updStatus(r.id,"Resolved");setPurchaseForm(p=>{const n={...p};delete n[r.id];return n;});}}>Resolve without purchase</button>
                    </div>
                  </div>
                )}
                {alreadyLinked&&r.status!=="Resolved"&&<div style={{fontSize:".72rem",color:"var(--g)",marginTop:6,background:"#E8F3F0",borderRadius:5,padding:"4px 8px"}}>PM already logged receipt — purchase entry exists. Just mark resolved.</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                <span className="req-badge" style={{background:uc.bg,color:uc.c,justifyContent:"center"}}>{r.status}</span>
                <select value={r.status} onChange={e=>{
                  const newStatus=e.target.value;
                  if(newStatus==="Resolved"&&r.type==="Item Needed"&&!alreadyLinked){
                    // Show purchase form instead of immediately resolving
                    setPurchaseForm(p=>({...p,[r.id]:p[r.id]||{}}));
                    updStatus(r.id,"Resolved");
                  }else{
                    updStatus(r.id,newStatus);
                    if(newStatus!=="Resolved")setPurchaseForm(p=>{const n={...p};delete n[r.id];return n;});
                  }
                }} style={{border:"1px solid var(--line)",borderRadius:6,padding:"4px 7px",fontSize:".72rem",cursor:"pointer"}}>
                  <option>Pending</option><option>In Progress</option><option>Resolved</option>
                </select>
              </div>
            </div>
          </div>;
        })}
    </div>
  );
}

function InvoiceFileCell({rec,onChange}){

  return(
    <label className="inv-file-btn" style={{cursor:"pointer"}}>
      📎 Attach
      <input type="file" accept="image/*,.pdf,.doc,.docx" style={{display:"none"}} onChange={handleFile}/>
    </label>
  );
}

/* ══ HQ PURCHASES ═══════════════════════════════════════════ */
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

// Lifted outside HQPurchases so React never unmounts it on re-render (focus bug fix)
function PurchaseFormRow({f,upFn,onSave,onCancel,saveLabel="Save"}){
  const calcPrice=(qty,unit)=>{const q=parseFloat(qty)||0;const u=parseFloat(unit)||0;return q&&u?q*u:"";};
  return(
    <div className="form-inline">
      <div style={{fontSize:".72rem",color:"var(--ink2)",background:"var(--gl)",borderRadius:7,padding:"6px 12px",marginBottom:10}}>
        ℹ️ Enter <strong>one item per row</strong> — each item gets its own invoice and report entry.
      </div>
      <div className="fg t4" style={{marginBottom:10}}>
        <div className="ff2"><label>Date Purchased</label><input className="ff2 input" type="date" value={f.purchaseDate||""} onChange={e=>upFn("purchaseDate",e.target.value)}/></div>
