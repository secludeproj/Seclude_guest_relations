/* ══ OFFICE STORAGE ══════════════════════════════════════ */
function OfficeStorage({session,onLogout,officeItems,setOfficeItems}){
  const cats=Object.keys(officeItems);
  const[selCat,setSelCat]=useState(()=>cats[0]||null);
  const[showAddCat,setShowAddCat]=useState(false);
  const[newCat,setNewCat]=useState("");
  useEffect(()=>{if(!selCat&&cats.length>0)setSelCat(cats[0]);},[cats.length]);

  function addCategory(){
    const name=newCat.trim();
    if(!name)return;
    if(officeItems[name]){alert("Category already exists.");return;}
    setOfficeItems(prev=>({...prev,[name]:[]}));
    setSelCat(name);setNewCat("");setShowAddCat(false);
  }
  function delCategory(cat){
    if(!window.confirm(`Delete "${cat}" and all its items?`))return;
    setOfficeItems(prev=>{const n={...prev};delete n[cat];return n;});
    setSelCat(cats.filter(c=>c!==cat)[0]||null);
  }
  function addItem(){
    if(!selCat)return;
    setOfficeItems(prev=>({...prev,[selCat]:[...(prev[selCat]||[]),{id:Date.now()+"",name:"",qty:"",notes:""}]}));
  }
  function updItem(idx,field,val){
    setOfficeItems(prev=>({...prev,[selCat]:prev[selCat].map((x,i)=>i===idx?{...x,[field]:val}:x)}));
  }
  function delItem(idx){
    setOfficeItems(prev=>({...prev,[selCat]:prev[selCat].filter((_,i)=>i!==idx)}));
  }

  const items=selCat?(officeItems[selCat]||[]):[];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"var(--stone,#FAF8F4)"}}>
      {/* Header */}
      <div className="pm-header" style={{display:"flex",alignItems:"center",gap:10,padding:"14px 20px",background:"var(--g3,#091f17)",flexShrink:0}}>
        <svg height="22" viewBox="0 0 120 22" fill="none" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
          <text y="17" fontFamily="Georgia,serif" fontSize="16" fill="rgba(255,255,255,.88)" letterSpacing="3">SECLUDE</text>
        </svg>
        <div style={{color:"rgba(255,255,255,.65)",fontSize:".82rem",flex:1,marginLeft:10}}>Office Storage · {session.submitter}</div>
        <button className="pm-exit" onClick={onLogout}>Exit ✕</button>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:210,background:"#fff",borderRight:"1px solid var(--line,#E4E4E7)",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"14px 14px 8px",fontWeight:700,fontSize:12,color:"var(--ink2,#52525B)",letterSpacing:.4}}>CATEGORIES</div>
          <div style={{flex:1,overflowY:"auto",padding:"0 8px 8px"}}>
            {cats.map(cat=>(
              <div key={cat} onClick={()=>setSelCat(cat)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:7,marginBottom:2,cursor:"pointer",background:selCat===cat?"var(--gl,#E8F3F0)":"transparent",color:selCat===cat?"var(--g,#0F5C4C)":"var(--ink2,#52525B)",fontWeight:selCat===cat?600:400,fontSize:13}}>
                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat}</span>
                <button onClick={e=>{e.stopPropagation();delCategory(cat);}}
                  style={{background:"none",border:"none",cursor:"pointer",color:"var(--ink3,#A1A1AA)",fontSize:14,padding:"0 0 0 4px",lineHeight:1,flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{padding:"8px 10px 12px",borderTop:"1px solid var(--line,#E4E4E7)"}}>
            {showAddCat?(
              <div style={{display:"flex",gap:5}}>
                <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Category name…"
                  onKeyDown={e=>e.key==="Enter"&&addCategory()}
                  style={{flex:1,padding:"6px 8px",border:"1px solid var(--ld,#D4D4D8)",borderRadius:6,fontSize:12,outline:"none"}} autoFocus/>
                <button onClick={addCategory} style={{padding:"6px 9px",background:"var(--g,#0F5C4C)",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"}}>+</button>
                <button onClick={()=>setShowAddCat(false)} style={{padding:"6px 8px",background:"none",border:"1px solid var(--ld,#D4D4D8)",borderRadius:6,fontSize:12,cursor:"pointer"}}>✕</button>
              </div>
            ):(
              <button onClick={()=>setShowAddCat(true)}
                style={{width:"100%",padding:"7px 10px",background:"none",border:"1px dashed var(--ld,#D4D4D8)",borderRadius:7,cursor:"pointer",fontSize:12,color:"var(--ink2,#52525B)"}}>
                + Add Category
              </button>
            )}
          </div>
        </div>

        {/* Main panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {selCat?(
            <>
              <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--line,#E4E4E7)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0}}>
                <div>
                  <div style={{fontWeight:700,fontSize:"1rem",color:"var(--ink,#18181B)"}}>{selCat}</div>
                  <div style={{fontSize:12,color:"var(--ink3,#A1A1AA)",marginTop:2}}>{items.length} item{items.length!==1?"s":""}</div>
                </div>
                <button onClick={addItem}
                  style={{padding:"7px 14px",background:"var(--g,#0F5C4C)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>
                  + Add Item
                </button>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
                {items.length===0?(
                  <div style={{textAlign:"center",padding:"48px 0",color:"var(--ink3,#A1A1AA)"}}>
                    <div style={{fontSize:32,marginBottom:10}}>📦</div>
                    <div style={{fontWeight:600,fontSize:14,color:"var(--ink2,#52525B)",marginBottom:4}}>No items yet</div>
                    <div style={{fontSize:12}}>Click "+ Add Item" to start tracking inventory in this category.</div>
                  </div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"var(--sm,#F0EBE3)"}}>
                        {["Item Name","Quantity","Notes",""].map(h=>(
                          <th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:"var(--ink2,#52525B)",letterSpacing:.4,borderBottom:"2px solid var(--sd,#E0D5C8)",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {items.map((item,idx)=>(
                        <tr key={item.id||idx} style={{borderBottom:"1px solid var(--line,#E4E4E7)"}}>
                          <td style={{padding:"6px 8px",width:"38%"}}>
                            <input value={item.name} onChange={e=>updItem(idx,"name",e.target.value)}
                              placeholder="Item name…"
                              style={{width:"100%",padding:"5px 8px",border:"1px solid transparent",borderRadius:5,fontSize:13,outline:"none",background:"transparent"}}
                              onFocus={e=>e.target.style.border="1px solid var(--g2,#1B7A5E)"}
                              onBlur={e=>e.target.style.border="1px solid transparent"}/>
                          </td>
                          <td style={{padding:"6px 8px",width:"15%"}}>
                            <input type="number" value={item.qty} onChange={e=>updItem(idx,"qty",e.target.value)}
                              placeholder="0"
                              style={{width:"100%",padding:"5px 8px",border:"1px solid transparent",borderRadius:5,fontSize:13,outline:"none",background:"transparent",textAlign:"center"}}
                              onFocus={e=>e.target.style.border="1px solid var(--g2,#1B7A5E)"}
                              onBlur={e=>e.target.style.border="1px solid transparent"}/>
                          </td>
                          <td style={{padding:"6px 8px"}}>
                            <input value={item.notes} onChange={e=>updItem(idx,"notes",e.target.value)}
                              placeholder="Notes…"
                              style={{width:"100%",padding:"5px 8px",border:"1px solid transparent",borderRadius:5,fontSize:13,outline:"none",background:"transparent"}}
                              onFocus={e=>e.target.style.border="1px solid var(--g2,#1B7A5E)"}
                              onBlur={e=>e.target.style.border="1px solid transparent"}/>
                          </td>
                          <td style={{padding:"6px 4px",textAlign:"center",width:32}}>
                            <button onClick={()=>delItem(idx)}
                              style={{background:"none",border:"none",cursor:"pointer",color:"var(--ink3,#A1A1AA)",fontSize:15,lineHeight:1,padding:"2px 4px"}}
                              title="Delete row">✕</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </>
          ):(
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,color:"var(--ink3,#A1A1AA)"}}>
              <div style={{fontSize:40}}>📦</div>
              <div style={{fontWeight:600,fontSize:14,color:"var(--ink2,#52525B)"}}>No categories yet</div>
              <div style={{fontSize:12}}>Use the sidebar to add your first category (e.g. Stationery, Electronics, Furniture).</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[session,setSession]=useState(()=>{
    try{
      const ls=localStorage.getItem('seclude_ops_session');
      if(ls)return JSON.parse(ls);
      const ss=sessionStorage.getItem('seclude_ops_session');
      if(ss)return JSON.parse(ss);
    }catch{}
    return null;
  });
  const _origSetSession=setSession;
  function handleLogin(s){
    const js=JSON.stringify(s);
    try{localStorage.setItem('seclude_ops_session',js);}catch{}
    try{sessionStorage.setItem('seclude_ops_session',js);}catch{}
    _origSetSession(s);
  }
  function handleLogout(){
    try{localStorage.removeItem('seclude_ops_session');}catch{}
    try{sessionStorage.removeItem('seclude_ops_session');}catch{}
    _origSetSession(null);
  }
  const[checks,setChecks]=useFirestore("seclude_checks",()=>{
    const base={};
    for(const[pid,areas] of Object.entries(SEED_2026_03)){
      base[pid]={};
      for(const[area,rooms] of Object.entries(areas)){
        base[pid][area]={};
        for(const[room,months] of Object.entries(rooms)){
          base[pid][area][room]={};
          for(const[mk,items] of Object.entries(months)){
            base[pid][area][room][mk]={};
            for(const[item,v] of Object.entries(items)){
              base[pid][area][room][mk][item]={qty:v.qty,damage:""};
            }
          }
        }
      }
    }
    return base;
  },3000);
  const[photos,setPhotos]=useLS("seclude_photos",{});
  const[requests,setRequests]=useFirestore("seclude_requests",[],500);
  const[customItems,setCustomItems]=useFirestore("seclude_custom_items",{},1000);
  const[proc,setProc]=useFirestore("seclude_proc_v2",INIT_PROC,500);
  const[received,setReceived]=useFirestore("seclude_received",INIT_RECEIVED,500);
  const[officeItems,setOfficeItems]=useFirestore("seclude_office_items",{},1000);
  // Keep session alive in sessionStorage so reload never loses PM/HQ state
  useEffect(()=>{
    if(session){const js=JSON.stringify(session);try{localStorage.setItem('seclude_ops_session',js);}catch{}try{sessionStorage.setItem('seclude_ops_session',js);}catch{}}
    else{try{localStorage.removeItem('seclude_ops_session');}catch{}try{sessionStorage.removeItem('seclude_ops_session');}catch{}}
  },[session]);
  // One-time clear of sample purchases data
  useEffect(()=>{
    if(localStorage.getItem("seclude_cleared_proc_v1"))return;
    setProc([]);
    localStorage.setItem("seclude_cleared_proc_v1","1");
  },[]);
  useEffect(()=>{
    if(localStorage.getItem("seclude_seeded_v4"))return;
    const now=new Date();
    const curMk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    setChecks(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      for(const[pid,areas] of Object.entries(SEED_2026_03)){
        if(!n[pid])n[pid]={};
        for(const[area,rooms] of Object.entries(areas)){
          if(!n[pid][area])n[pid][area]={};
          for(const[room,months] of Object.entries(rooms)){
            if(!n[pid][area][room])n[pid][area][room]={};
            for(const[,items] of Object.entries(months)){
              // Seed into 2026-03 (historical) AND current month
              for(const mk of["2026-03",curMk]){
                if(!n[pid][area][room][mk])n[pid][area][room][mk]={};
                for(const[item,v] of Object.entries(items)){
                  if(!n[pid][area][room][mk][item])n[pid][area][room][mk][item]={qty:v.qty,damage:""};
                }
              }
            }
          }
        }
      }
      return n;
    });
    localStorage.setItem("seclude_seeded_v4","1");
  },[]);
  if(!session)return<Login onLogin={handleLogin}/>;
  if(session.type==="pm")return<PMPortal session={session} onLogout={handleLogout} checks={checks} setChecks={setChecks} photos={photos} setPhotos={setPhotos} requests={requests} setRequests={setRequests} customItems={customItems} setCustomItems={setCustomItems} proc={proc} setProc={setProc} received={received} setReceived={setReceived}/>;
  if(session.type==="office")return<OfficeStorage session={session} onLogout={handleLogout} officeItems={officeItems} setOfficeItems={setOfficeItems}/>;
  return<HQApp session={session} onLogout={handleLogout} checks={checks} setChecks={setChecks} photos={photos} setPhotos={setPhotos} requests={requests} setRequests={setRequests} customItems={customItems} setCustomItems={setCustomItems} proc={proc} setProc={setProc} received={received} setReceived={setReceived}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
function __runApp(){
  var root=document.getElementById('root');
  try{
    root.innerHTML='';
    var src=document.getElementById('app-src').textContent;
    var compiled=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    eval(compiled);
  }catch(e){
    root.innerHTML='<div style="padding:24px;font-family:sans-serif;color:#B91C1C;background:#FEF2F2;min-height:100vh"><strong>App failed to load.</strong><br><br><small style="font-family:monospace">'+e.message+'</small></div>';
    console.error('Bootstrap error:',e);
  }
}
function __waitBabel(n){
  if(window.Babel){__runApp();}
  else if(n>0){setTimeout(function(){__waitBabel(n-1);},300);}
  else{document.getElementById('root').innerHTML='<div style="padding:24px;font-family:sans-serif">Could not load Babel. Check your connection and refresh.</div>';}
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){__waitBabel(20);});
}else{
  __waitBabel(20);
}
</script></body>
