<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Seclude — Guest Relations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0F5C4C;--g2:#1B7A5E;--g3:#091f17;--gl:#E8F3F0;--gxl:#F4FAF8;
  --stone:#FAF8F4;--sm:#F0EBE3;--sd:#E0D5C8;
  --ink:#18181B;--ink2:#52525B;--ink3:#A1A1AA;
  --line:#E4E4E7;--ld:#D4D4D8;--white:#fff;
  --ff:"DM Sans",system-ui,sans-serif;--fh:"DM Serif Display",Georgia,serif;--fm:"DM Mono",monospace;
}
html,body,#root{height:100%;font-family:var(--ff);font-size:15px;color:var(--ink);background:var(--stone)}
button{cursor:pointer;font-family:var(--ff)}
input,select,textarea{font-family:var(--ff);font-size:15px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}

/* LOGIN */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#060f0c,#0d3528)}
.login-box{background:var(--white);border-radius:20px;padding:42px 44px;width:420px;max-width:94vw;box-shadow:0 32px 80px -16px rgba(0,0,0,.55)}
.login-h{font-family:var(--fh);font-size:1.55rem;font-weight:600;text-align:center;margin-bottom:4px}
.login-s{font-size:.8rem;color:var(--ink3);text-align:center;margin-bottom:22px}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:.65rem;font-weight:600;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.09em}
.fi input,.fi select{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:1rem;outline:none;transition:.15s;color:var(--ink)}
.fi input:focus,.fi select:focus{border-color:var(--g)}
.btn-main{width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:.9rem;transition:.15s;margin-top:6px}
.btn-main:hover{background:var(--g2)}
.err{color:#b91c1c;font-size:.78rem;text-align:center;margin-top:8px}

/* LAYOUT */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#side{width:256px;min-width:256px;background:var(--g3);display:flex;flex-direction:column;overflow-y:auto;z-index:100}
.shead{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:12px}
.slogo-text{font-family:var(--fh);font-size:1.3rem;font-weight:600;color:rgba(255,255,255,.88)}
.slogo-sub{font-size:.6rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);margin-top:2px}
.s-logout{border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:.7rem;cursor:pointer;padding:5px 10px;border-radius:6px;transition:.15s;white-space:nowrap}
.s-logout:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.snav{padding:12px 10px;flex:1}
.snav-sect{font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.2);padding:14px 12px 6px;font-family:var(--fm)}
.si{display:block;width:100%;padding:10px 14px;border:none;border-radius:8px;background:none;color:rgba(255,255,255,.45);font-size:.875rem;font-weight:500;text-align:left;transition:.15s;margin-bottom:1px;cursor:pointer;font-family:var(--ff);position:relative}
.si:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.si.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.si-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#c2410c;color:#fff;font-size:.58rem;padding:1px 6px;border-radius:8px;font-family:var(--fm)}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:rgba(250,248,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.crumb{font-family:var(--fm);font-size:.7rem;color:var(--ink3);display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.crumb b{color:var(--ink2)}
.crumb .lk{cursor:pointer}.crumb .lk:hover{color:var(--g)}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:26px 30px}
/* Scroll wrapper — must be a direct child of #content; negative margin trick lets it escape overflow:hidden */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:calc(100% + 0px);position:relative}
/* Responsive show/hide — default (desktop) */
.mob-only{display:none}
.desk-only{display:block}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;border:none;transition:.13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--g2)}
.btn-out{background:transparent;color:var(--g);border:1.5px solid rgba(15,92,76,.3)}.btn-out:hover{background:var(--gl)}
.btn-sm{padding:5px 11px;font-size:.75rem}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:7px;padding:5px 11px;font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:.13s}
.btn-wa:hover{background:#128C7E}
.btn-dk{background:var(--ink);color:#fff}.btn-dk:hover{opacity:.85}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid var(--line);border-radius:8px;background:var(--white);color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;transition:.13s;margin-bottom:14px;font-family:var(--ff)}
.back-btn:hover{border-color:var(--g);color:var(--g);background:var(--gl)}

/* CARDS & MISC */
.card{background:var(--white);border-radius:12px;border:1px solid var(--line);overflow:hidden}
.pg-title{font-family:var(--fh);font-size:1.8rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.pg-sub{font-size:.82rem;color:var(--ink3);margin-bottom:18px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.stat{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px 20px;border-left:3px solid var(--g)}
.stat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:var(--ink3);font-weight:600;margin-bottom:6px}
.stat-v{font-family:var(--fh);font-size:2.4rem;font-weight:600;color:var(--g);line-height:1;margin-bottom:3px}
.stat-h{font-size:.74rem;color:var(--ink3)}
.empty{text-align:center;padding:52px 20px;color:var(--ink3)}
.empty strong{display:block;font-family:var(--fh);font-size:1.15rem;color:var(--ink2);margin-bottom:4px}
.tag{font-size:.65rem;padding:2px 8px;border-radius:5px;font-family:var(--fm);font-weight:600;display:inline-block;white-space:nowrap}
.divider{height:1px;background:var(--line);margin:16px 0}

/* FORMS */
.form-section{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:20px 22px;margin-bottom:14px}
.form-section-title{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg.t3{grid-template-columns:repeat(3,1fr)}
.fg.t4{grid-template-columns:repeat(4,1fr)}
.ff2{display:flex;flex-direction:column;gap:4px}
.ff2 label{font-size:.63rem;font-family:var(--fm);font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.ff2 input,.ff2 select,.ff2 textarea{padding:8px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:.84rem;color:var(--ink);outline:none;transition:.13s;background:var(--white)}
.ff2 input:focus,.ff2 select:focus,.ff2 textarea:focus{border-color:var(--g)}
.ff2 input[readonly]{background:var(--stone);color:var(--ink3)}

/* BOOKING LIST */
.bk-list{display:flex;flex-direction:column;gap:6px}
.bk-card{background:var(--white);border-radius:9px;border:1px solid var(--line);padding:10px 13px;cursor:pointer;transition:.18s;border-left:3px solid var(--line)}
.bk-card:hover{box-shadow:0 3px 12px -4px rgba(15,92,76,.1)}
.bk-card.upsell-sold{border-left-color:#15803D}
.bk-card.upsell-pitched{border-left-color:#CA8A04}
.bk-card.upsell-pending{border-left-color:var(--ink3)}
.bk-card.upsell-nosale{border-left-color:#9CA3AF}
.bk-card.lead-hot{border-left-color:var(--g);border-color:var(--gl);background:var(--gxl)}
.bk-card.lead-hot:hover{box-shadow:0 3px 12px -4px rgba(15,92,76,.15)}
.bk-card.lead-warm{border-left-color:var(--ld);background:var(--stone)}
.bk-card.lead-warm:hover{box-shadow:0 3px 12px -4px rgba(0,0,0,.06)}

/* LEAD BADGES */
.lead-badge{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;font-family:var(--fm);font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.lead-hot-badge{background:var(--gl);color:var(--g)}
.lead-warm-badge{background:var(--sm);color:var(--ink2)}

/* LEAD REASONS */
.lead-reasons{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.reason-tag{font-size:.58rem;padding:1px 5px;border-radius:3px;background:var(--stone);color:var(--ink2);font-family:var(--fm)}
.reason-tag.hot{background:var(--gl);color:var(--g)}
.reason-tag.warn{background:var(--sm);color:var(--ink2)}

/* MEAL FLAG */
.meal-flag{display:flex;align-items:flex-start;gap:6px;padding:5px 9px;border-radius:6px;background:var(--gxl);border:1px solid var(--gl);color:var(--g);font-size:.71rem;margin-top:4px;line-height:1.4}

/* PRIORITY LEADS SECTION */
.hot-section{background:var(--gxl);border:1.5px solid var(--gl);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.hot-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hot-section-title{font-family:var(--fh);font-size:.98rem;font-weight:600;color:var(--g)}
.warm-section{background:var(--stone);border:1.5px solid var(--sd);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.warm-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.warm-section-title{font-family:var(--fh);font-size:.98rem;font-weight:600;color:var(--ink2)}

/* PROPERTY TABS */
.prop-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.prop-tab{padding:5px 13px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-size:.76rem;color:var(--ink2);font-family:var(--ff);cursor:pointer;transition:.13s;white-space:nowrap}
.prop-tab.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:600}
.prop-tab:hover:not(.on){border-color:var(--g);color:var(--g)}
.bk-name{font-family:var(--fh);font-size:.95rem;font-weight:600;margin-bottom:1px}
.bk-meta{font-size:.67rem;color:var(--ink3);font-family:var(--fm);margin-bottom:4px}
.bk-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}

/* STATUS BADGES */
.sb{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:.65rem;font-family:var(--fm);font-weight:600;white-space:nowrap}
.sb-confirmed{background:#DCFCE7;color:#15803D}
.sb-called{background:#EFF6FF;color:#1D4ED8}
.sb-checkedin{background:#F3E8FF;color:#7E22CE}
.sb-checkedout{background:#F4F4F5;color:#52525B}
.sb-cancelled{background:#FEE2E2;color:#991B1B}
.sb-noshow{background:#FEE2E2;color:#991B1B}
.sb-pending{background:#F4F4F5;color:#71717A}
.sb-pitched{background:#FEF9C3;color:#854D0E}
.sb-sold{background:#DCFCE7;color:#15803D}
.sb-partial{background:#FEF3C7;color:#92400E}
.sb-nosale{background:#F4F4F5;color:#9CA3AF}
.sb-roomonly{background:#FEF9C3;color:#854D0E}
.sb-direct{background:var(--gl);color:var(--g)}

/* FILTERS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:.8rem;color:var(--ink);outline:none;background:var(--white);font-family:var(--ff)}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--g)}
.filter-bar input{min-width:200px}

/* BOOKING DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}
.detail-section{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px 20px;margin-bottom:12px}
.detail-section-title{font-size:.7rem;font-family:var(--fm);font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:12px}
.dl{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dl.t3{grid-template-columns:1fr 1fr 1fr}
.dl-item label{font-size:.62rem;font-family:var(--fm);color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.dl-item span{font-size:.84rem;color:var(--ink);font-weight:500}
.rooms-tbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:4px}
.rooms-tbl th{background:var(--stone);padding:6px 10px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-family:var(--fm);border-bottom:1px solid var(--line)}
.rooms-tbl td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.rooms-tbl tr:last-child td{border-bottom:none}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.84rem}
.fin-row.total{font-weight:700;border-top:1px solid var(--line);margin-top:4px;padding-top:8px}
.fin-row.outstanding{color:#b91c1c;font-weight:700}
.fin-row label{color:var(--ink3);font-size:.8rem}

/* UPSELL PANEL */
.upsell-panel{position:sticky;top:0}
.upsell-flag{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:9px;margin-bottom:7px;font-size:.8rem;line-height:1.4}
.upsell-flag.payment{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.upsell-flag.dining{background:#FFFBEB;border:1px solid #FDE68A;color:#854D0E}
.upsell-flag.special{background:#FDF4FF;border:1px solid #E9D5FF;color:#6B21A8}
.upsell-flag.couple{background:#FFF1F2;border:1px solid #FECDD3;color:#9F1239}
.upsell-flag.upsell{background:#FFFBEB;border:1px solid #FDE68A;color:#854D0E}
.exp-row{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:7px;transition:.13s}
.exp-row:hover{border-color:var(--g);background:var(--gxl)}
.exp-row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.exp-row-name{font-weight:600;font-size:.88rem}
.exp-row-price{font-family:var(--fm);font-size:.8rem;color:var(--g);font-weight:700;white-space:nowrap}
.exp-row-desc{font-size:.76rem;color:var(--ink3);margin-bottom:7px;line-height:1.4}
.exp-row-actions{display:flex;gap:5px}

/* CALL LOG */
.call-entry{background:var(--stone);border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--line)}
.call-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.call-entry-agent{font-weight:600;font-size:.84rem}
.call-entry-date{font-size:.7rem;color:var(--ink3);font-family:var(--fm)}
.call-pitched{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.call-sold{background:#DCFCE7;border-radius:6px;padding:6px 10px;font-size:.78rem;color:#15803D;margin-top:4px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-box{background:var(--white);border-radius:18px;padding:28px;width:600px;max-width:100%;box-shadow:0 24px 64px -16px rgba(0,0,0,.5)}
.modal-title{font-family:var(--fh);font-size:1.25rem;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.2rem;color:var(--ink3);cursor:pointer;line-height:1}
.modal-close:hover{color:var(--ink)}

/* EXPERIENCES CATALOG */
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.exp-catalog-card{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:18px;cursor:pointer;transition:.18s}
.exp-catalog-card:hover{box-shadow:0 6px 24px -6px rgba(0,0,0,.1);transform:translateY(-2px);border-color:var(--g)}
.exp-emoji{font-size:2rem;margin-bottom:10px;display:block}
.exp-cat-label{font-size:.6rem;font-family:var(--fm);font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:5px}
.exp-card-name{font-family:var(--fh);font-size:1.1rem;font-weight:600;margin-bottom:4px}
.exp-card-price{font-family:var(--fm);font-size:.84rem;color:var(--g);font-weight:700;margin-bottom:8px}
.exp-card-desc{font-size:.76rem;color:var(--ink3);line-height:1.45}

/* PIPELINE STAGES TRACKER */
.stage-track{display:flex;align-items:flex-start;gap:0;margin:16px 0}
.stage-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;cursor:pointer}
.stage-step:not(:last-child)::after{content:'';position:absolute;top:13px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:var(--line);z-index:0}
.stage-step.done:not(:last-child)::after{background:var(--g)}
.stage-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;border:2px solid var(--line);background:var(--white);z-index:1;position:relative;transition:.18s;line-height:1}
.stage-dot.done{background:var(--g);border-color:var(--g);color:#fff}
.stage-dot.next{border-color:var(--g);color:var(--g);box-shadow:0 0 0 3px rgba(15,92,76,.15)}
.stage-lbl{font-size:.56rem;font-family:var(--fm);text-align:center;color:var(--ink3);line-height:1.3;max-width:54px}
.stage-lbl.done{color:var(--g);font-weight:600}
.stage-wa-modal{background:var(--white);border-radius:14px;border:1px solid var(--line);padding:18px;margin-top:10px}

/* ALL BOOKINGS TABLE */
.bk-tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
.tbl-scroll{overflow-x:auto!important;-webkit-overflow-scrolling:touch;width:100%}
.bk-tbl{width:100%;border-collapse:collapse;font-size:.8rem;min-width:700px}
.bk-tbl th{background:var(--stone);padding:8px 12px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-family:var(--fm);border-bottom:1px solid var(--line);white-space:nowrap}
.bk-tbl td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.bk-tbl tr:last-child td{border-bottom:none}
.bk-tbl tbody tr{cursor:pointer;transition:.12s}
.bk-tbl tbody tr:hover td{background:var(--gxl)}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:0;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
.view-btn{padding:6px 14px;border:none;background:transparent;font-size:.75rem;color:var(--ink3);cursor:pointer;transition:.13s;font-family:var(--ff)}
.view-btn.on{background:var(--g);color:#fff;font-weight:600}

/* PRICING SETTINGS */
.price-tbl{width:100%;border-collapse:collapse}
.price-tbl th{background:var(--stone);padding:8px 12px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-family:var(--fm);border-bottom:1px solid var(--line)}
.price-tbl td{padding:7px 12px;border-bottom:1px solid var(--line);font-size:.82rem;vertical-align:middle}
.price-tbl tr:last-child td{border-bottom:none}
.price-inp{width:100px;padding:4px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:.8rem;color:var(--ink);font-family:var(--fm);text-align:right;transition:.13s}
.price-inp:focus{outline:none;border-color:var(--g)}

function hotScore(b){
  if(!b)return{score:0,tier:"none",reasons:[],mealFlag:null};
  const rooms=b.rooms||[];
  const txt=((b.notes||"")+" "+(b.specialRequests||"")).toLowerCase();
  const totalAdults=rooms.reduce((s,r)=>s+(r.adults||0),0);
  const totalKids=rooms.reduce((s,r)=>s+(r.children||0)+(r.infants||0),0);
  const maxNights=rooms.length?Math.max(...rooms.map(r=>r.nights||1)):1;
  const totalRooms=rooms.length;
  const totalRent=b.financials?.roomRent||b.rooms.reduce((s,r)=>s+(Number(r.netPrice)||0),0);
  const daysToCI=b.checkIn?Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000):-1;
  const isInactive=["Checked In","Checked Out","Cancelled","No Show"].includes(b.status);

  let score=0;const reasons=[];
  if(b.specialRequests?.trim()){score+=22;reasons.push({t:"⚡ Special request",cls:"hot"});}
  if(txt.includes("anniversary")){score+=30;reasons.push({t:"💍 Anniversary",cls:"hot"});}
  if(txt.includes("birthday")){score+=30;reasons.push({t:"🎂 Birthday",cls:"hot"});}
  if(txt.includes("honeymoon")){score+=30;reasons.push({t:"🥂 Honeymoon",cls:"hot"});}
  if(txt.includes("babymoon")){score+=25;reasons.push({t:"👶 Babymoon",cls:"hot"});}
  if(txt.match(/proposal|engagement|surprise|celebration/)){score+=20;reasons.push({t:"🎉 Occasion",cls:"hot"});}
  if(totalRooms>=3){score+=25;reasons.push({t:`🏠 ${totalRooms} rooms`,cls:"hot"});}
  else if(totalRooms>=2){score+=15;reasons.push({t:"🏠 2 rooms",cls:"warn"});}
  if(totalAdults>=6){score+=20;reasons.push({t:`👥 ${totalAdults} pax`,cls:"hot"});}
  else if(totalAdults>=4){score+=12;reasons.push({t:`👥 ${totalAdults} adults`,cls:"warn"});}
  if(maxNights>=5){score+=20;reasons.push({t:`🌙 ${maxNights} nights`,cls:"hot"});}
  else if(maxNights>=3){score+=12;reasons.push({t:`🌙 ${maxNights} nights`,cls:"warn"});}
  if(rooms.some(r=>r.mealPlan==="Room Only")){score+=15;reasons.push({t:"🍽️ Room Only",cls:"warn"});}
  if(b.reservationType==="Corporate"){score+=10;reasons.push({t:"💼 Corporate",cls:"warn"});}
  if(totalRent>=50000){score+=15;reasons.push({t:"💰 High value",cls:"hot"});}
  if(daysToCI>=0&&daysToCI<=3){score+=25;reasons.push({t:`🔴 Check-in in ${daysToCI}d`,cls:"hot"});}
  else if(daysToCI>=0&&daysToCI<=7&&b.upsellStatus==="Pending"){score+=18;reasons.push({t:`🟡 Check-in in ${daysToCI}d`,cls:"warn"});}

  // Meal plan discount flag — guests on meal plans are eligible for bundled add-on discounts
  let mealFlag=null;
  const plans=rooms.map(r=>r.mealPlan||"");
  if(plans.some(p=>p==="AP – All Meals"||p==="All Inclusive"))
    mealFlag="On AP/All Inclusive — offer discounted experience packages as premium add-ons (easy upsell)";
  else if(plans.some(p=>p==="MAP – Breakfast & Dinner"))
    mealFlag="On MAP — lunch & daytime experiences (Picnic, Bird Watching, Sight Seeing) are open revenue";
  else if(plans.some(p=>p==="CP – Breakfast"))
    mealFlag="On CP — dinner, lunch & all dining experiences (BBQ, Candle Light, Movie Night) are open";

  const tier=isInactive||alreadySold?"done":score>=28?"hot":score>=12?"warm":"cold";
  return{score,tier,reasons,mealFlag};
}

/* ══ UPSELL ENGINE ══════════════════════════════════════════════ */
function getUpsellSuggestions(booking){
  if(!booking)return{experiences:[],flags:[],signals:[]};
  const bRooms=booking.rooms||[];
  const totalAdults=bRooms.reduce((s,r)=>s+(r.adults||0),0);
  const totalKids=bRooms.reduce((s,r)=>s+(r.children||0)+(r.infants||0),0);
  const maxNights=bRooms.length?Math.max(...bRooms.map(r=>r.nights||1)):1;
  const isCouple=totalAdults===2&&totalKids===0;
  const isGroup=totalAdults>=4;
  const isRoomOnly=bRooms.some(r=>r.mealPlan==="Room Only");
  const isMultiNight=maxNights>=2;
  const txt=((booking.notes||"")+" "+(booking.specialRequests||"")).toLowerCase();
  const isAnn=txt.includes("anniversary");
  const isBday=txt.includes("birthday");
  const hasEarlyCI=txt.includes("early check");

  const signals=[];
  if(isCouple)signals.push("couple");
  if(totalKids>0)signals.push("family");
  if(isGroup)signals.push("group");
  if(isRoomOnly)signals.push("roomonly");
  if(isMultiNight)signals.push("multinight");
  if(isAnn)signals.push("anniversary","special");
  if(isBday)signals.push("birthday","special");
  signals.push("all");

  const scored=EXPERIENCES.map(exp=>{
    let score=0;
    exp.bestFor.forEach(bf=>{if(signals.includes(bf))score+=(bf==="all"?1:4);});
    return{...exp,score};
  }).sort((a,b)=>b.score-a.score);

  const flags=[];
  if((booking.financials?.outstanding||0)>0)flags.push({type:"payment",icon:"💰",msg:`₹${Number(booking.financials.outstanding).toLocaleString()} outstanding — confirm payment timing on call`});
  if(hasEarlyCI)flags.push({type:"upsell",icon:"⏰",msg:"Early check-in requested — offer as a paid add-on (₹1,000–₹2,000)"});
  if(isAnn)flags.push({type:"special",icon:"💍",msg:"Anniversary stay detected — pitch Anniversary Celebration (₹7,000)"});
  if(isBday)flags.push({type:"special",icon:"🎂",msg:"Birthday stay detected — pitch Birthday Celebration (₹6,500)"});
  if(isRoomOnly)flags.push({type:"dining",icon:"🍽️",msg:"Room Only plan — all dining experiences are open revenue opportunities"});
  if(isCouple&&!isAnn&&!isBday)flags.push({type:"couple",icon:"🕯️",msg:"Couple stay — Candle Light Dinner & Movie Night are top picks"});

  return{experiences:scored,flags,signals};
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
  });
}

/* ══ LOG CALL MODAL ════════════════════════════════════════════ */
function LogCallModal({booking,session,onClose,onSave}){
  const[date,setDate]=useState(todayISO());
  const[outcome,setOutcome]=useState("Connected – Interested");
  const[pitched,setPitched]=useState([]);
  const[soldMap,setSoldMap]=useState({});// expId -> {confirmed,confirmed_price,exp_date}
  const[notes,setNotes]=useState("");
  const[copied,setCopied]=useState(null);
  const{experiences}=getUpsellSuggestions(booking);

  function togglePitch(id){
    setPitched(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
    if(!pitched.includes(id))setSoldMap(p=>({...p,[id]:{sold:false,confirmedPrice:"",expDate:""}}));
  }
  function updateSold(id,field,val){setSoldMap(p=>({...p,[id]:{...p[id],[field]:val}}));}

  function copyWA(exp){
    copyToClipboard(generateWAMsg(booking,exp));
    setCopied(exp.id);setTimeout(()=>setCopied(null),2000);
  }

  function save(){
    if(!pitched.length&&outcome!=="No Answer"&&outcome!=="Voicemail"){
      alert("Please select at least one experience that was pitched.");return;
    }
    const soldItems=Object.entries(soldMap)
      .filter(([id,v])=>v.sold&&pitched.includes(id))
      .map(([id,v])=>({expId:id,confirmedPrice:Number(v.confirmedPrice)||EXPERIENCES.find(e=>e.id===id)?.price||0,expDate:v.expDate,notes:""}));
    const entry={id:cluid(),date,agentId:session.id,agentName:session.name,pitched,sold:soldItems,outcome,notes};
    onSave(entry,soldItems.length>0?"Sold":pitched.length>0?"Pitched":"Pending");
    onClose();
  }

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{width:640}}>
        <div className="modal-title">
          📞 Log Sales Call — {booking.guestName.split(" ")[0]}
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="fg" style={{marginBottom:14}}>
          <div className="ff2"><label>Date of Call</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="ff2"><label>Agent</label><input value={session.name} readOnly/></div>
        </div>

        <div className="ff2" style={{marginBottom:14}}>
          <label>Call Outcome</label>
          <select value={outcome} onChange={e=>setOutcome(e.target.value)}>
            <option>Connected – Interested</option>
            <option>Connected – Sold</option>
            <option>Connected – No Sale</option>
            <option>Connected – Follow-up Needed</option>
            <option>No Answer</option>
            <option>Voicemail</option>
          </select>
        </div>

        <div style={{fontWeight:600,fontSize:".82rem",marginBottom:8}}>Experiences Pitched <span style={{fontWeight:400,color:"var(--ink3)",fontSize:".74rem"}}>(select all you mentioned)</span></div>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16}}>
          {experiences.map(exp=>(
            <div key={exp.id} style={{background:pitched.includes(exp.id)?"var(--gxl)":"var(--stone)",border:"1px solid "+(pitched.includes(exp.id)?"var(--g)":"var(--line)"),borderRadius:9,padding:"9px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input type="checkbox" id={"p"+exp.id} checked={pitched.includes(exp.id)} onChange={()=>togglePitch(exp.id)} style={{width:15,height:15,accentColor:"var(--g)"}}/>
                <label htmlFor={"p"+exp.id} style={{flex:1,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:pitched.includes(exp.id)?600:400,fontSize:".84rem"}}>{exp.emoji} {exp.name}</span>
                  <span style={{fontFamily:"var(--fm)",fontSize:".74rem",color:"var(--g)",fontWeight:700}}>{exp.priceLabel}</span>
                </label>
                <button className="btn-wa" style={{padding:"3px 8px",fontSize:".68rem"}} onClick={()=>copyWA(exp)} title="Copy WhatsApp message">
                  {copied===exp.id?"✓ Copied":"WhatsApp"}
                </button>
              </div>
              {pitched.includes(exp.id)&&(
                <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid var(--gl)",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                  <label style={{display:"flex",alignItems:"center",gap:5,fontSize:".8rem",cursor:"pointer"}}>
                    <input type="checkbox" checked={soldMap[exp.id]?.sold||false} onChange={e=>updateSold(exp.id,"sold",e.target.checked)} style={{accentColor:"var(--g)"}}/>
                    Sold
                  </label>
                  {soldMap[exp.id]?.sold&&<>
                    <div className="ff2" style={{flexDirection:"row",gap:6,alignItems:"center",flex:1,minWidth:160}}>
                      <label style={{whiteSpace:"nowrap",fontSize:".68rem"}}>Confirmed Price (₹)</label>
                      <input type="number" value={soldMap[exp.id]?.confirmedPrice||""} onChange={e=>updateSold(exp.id,"confirmedPrice",e.target.value)} placeholder={exp.price} style={{width:90,padding:"4px 7px",border:"1.5px solid var(--g)",borderRadius:6,fontSize:".78rem"}}/>
                    </div>
                    <div className="ff2" style={{flexDirection:"row",gap:6,alignItems:"center"}}>
                      <label style={{whiteSpace:"nowrap",fontSize:".68rem"}}>Experience Date</label>
                      <input type="date" value={soldMap[exp.id]?.expDate||""} onChange={e=>updateSold(exp.id,"expDate",e.target.value)} style={{padding:"4px 7px",border:"1.5px solid var(--g)",borderRadius:6,fontSize:".78rem"}}/>
                    </div>
                  </>}
                </div>
              )}
            </div>
          ))}
        </div>

        <div className="ff2" style={{marginBottom:18}}>
          <label>Internal Notes</label>
          <textarea rows={2} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Guest reactions, follow-up reminders, special requests..." style={{resize:"vertical"}}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button className="btn btn-out" onClick={onClose}>Cancel</button>
          <button className="btn btn-g" onClick={save}>Save Call Log</button>
        </div>
      </div>
    </div>
  );
}

/* ══ PIPELINE STAGE TRACKER ════════════════════════════════════ */
function PipelineStageTracker({booking,onUpdate}){
  const[openStage,setOpenStage]=useState(null);
  const[copied,setCopied]=useState(false);
  const stages=booking.pipelineStages||{};

  function toggleStage(stageId){
    const alreadyDone=!!stages[stageId];
    const updated={...booking,pipelineStages:{...stages,[stageId]:alreadyDone?"":todayISO()}};
    onUpdate(updated);
    if(!alreadyDone)setOpenStage(stageId);
    else if(openStage===stageId)setOpenStage(null);
  }

  function nextStage(){
    return PIPELINE_STAGES.find(s=>!stages[s.id])?.id||null;
  }

  function copyMsg(stageId){
    copyToClipboard(generateStageMsg(booking,stageId));
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  }

  const doneCount=PIPELINE_STAGES.filter(s=>stages[s.id]).length;
  const next=nextStage();

  return(
    <div className="detail-section" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div className="detail-section-title" style={{marginBottom:0}}>WhatsApp Pipeline</div>
        <span style={{fontSize:".7rem",fontFamily:"var(--fm)",color:"var(--ink3)"}}>{doneCount}/{PIPELINE_STAGES.length} sent</span>
      </div>
      <div className="stage-track">
        {PIPELINE_STAGES.map((s,i)=>{
          const done=!!stages[s.id];
          const isNext=s.id===next;
          return(
            <div key={s.id} className={"stage-step"+(done?" done":"")} onClick={()=>setOpenStage(openStage===s.id?null:s.id)}>
              <div className={"stage-dot"+(done?" done":isNext?" next":"")} title={s.desc}>
                {done?"✓":s.icon}
              </div>
              <div className={"stage-lbl"+(done?" done":"")}>{s.label}</div>
            </div>
          );
        })}
      </div>

      {openStage&&(()=>{
        const s=PIPELINE_STAGES.find(x=>x.id===openStage);
        if(!s)return null;
        const done=!!stages[openStage];
        const msg=generateStageMsg(booking,openStage);
        return(
          <div className="stage-wa-modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:600,fontSize:".86rem"}}>{s.icon} {s.label}</div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn-wa" style={{fontSize:".72rem",padding:"4px 10px"}} onClick={()=>copyMsg(openStage)}>
                  {copied?"✓ Copied":"Copy WhatsApp"}
                </button>
                <button className="btn btn-sm" style={{background:done?"#FEE2E2":"var(--g)",color:done?"#991B1B":"#fff",border:"none",fontSize:".72rem"}} onClick={()=>toggleStage(openStage)}>
                  {done?"↩ Undo":"✓ Mark Done"}
                </button>
              </div>
            </div>
            <div style={{background:"#DCF8C6",borderRadius:9,padding:"10px 13px",fontSize:".76rem",lineHeight:1.65,whiteSpace:"pre-wrap",color:"#1a1a1a",maxHeight:200,overflowY:"auto",fontFamily:"var(--ff)"}}>
              {msg}
            </div>
            {done&&<div style={{fontSize:".7rem",color:"var(--g)",fontFamily:"var(--fm)",marginTop:6}}>✓ Sent on {fmtDate(stages[openStage])}</div>}
          </div>
        );
      })()}
    </div>
  );
}

/* ══ WHATSAPP HELPER ══════════════════════════════════════════ */
function buildWaUrl(phone, text){
  const raw=(phone||'').replace(/\D/g,'');
  if(!raw)return null;
  const num=raw.startsWith('91')?raw:'91'+raw;
  const enc=encodeURIComponent(text);
  // On mobile: wa.me opens native WhatsApp app. On desktop: web.whatsapp.com avoids the desktop app "Starting chat" hang.
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  return isMobile
    ?`https://wa.me/${num}?text=${enc}`
    :`https://web.whatsapp.com/send?phone=${num}&text=${enc}`;
}
function waLinkCustom(phone, text){ return buildWaUrl(phone,text); }
function waLink(booking, templateType='details', customTemplates){
  const tpl=(customTemplates||DEFAULT_WA_TEMPLATES)[templateType]||DEFAULT_WA_TEMPLATES[templateType]||'';
  const msg=renderWaTpl(tpl,booking);
  return buildWaUrl(booking.guestPhone,msg);
}

function WAButton({booking, templateType='details', label, style={}}){
  const link=waLink(booking, templateType);
  if(!link)return null;
  return(
    <a href={link} target="_blank" rel="noopener noreferrer"
      style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 11px",
        background:"#25D366",color:"#fff",borderRadius:7,fontSize:".78rem",fontWeight:600,
        textDecoration:"none",transition:".15s",flexShrink:0,...style}}>
      <span style={{fontSize:"1rem",lineHeight:1}}>💬</span>{label||"WhatsApp"}
    </a>
  );
}

function getWaStageStatus(booking, stageId){
  const ws=(booking.waStages||{})[stageId]||{};
  if(ws.sent)return{status:'sent',sentAt:ws.sentAt,sentBy:ws.sentBy};
  const now=new Date();
  const ci=booking.checkIn?new Date(booking.checkIn+'T00:00:00'):null;
  const co=booking.checkOut?new Date(booking.checkOut+'T'+(booking.checkOutTime||'11:00')+':00'):null;
  const dCI=ci?Math.floor((ci-now)/86400000):null;
  const dCO=co?Math.floor((co-now)/86400000):null;
  const hAfterCO=co?(now-co)/3600000:null;
  switch(stageId){
    case'details':
      if(dCI===null)return{status:'na'};
      if(dCI<0)return{status:'overdue',daysLate:-dCI};
      if(dCI<=7)return{status:'due',urgent:dCI<=2};
      return{status:'upcoming',daysUntil:dCI-7};
    case'upgrade':
    case'addons':
      if(dCI===null)return{status:'na'};
      if(dCI<0)return{status:'overdue',daysLate:-dCI};
      if(dCI<=5&&dCI>=2)return{status:'due',urgent:dCI<=3};
      if(dCI<2)return{status:'overdue',daysLate:0};
      return{status:'upcoming',daysUntil:dCI-5};
    case'extension':
      if(!ci||!co)return{status:'na'};
      if(dCI!==null&&dCI>0)return{status:'upcoming'};
      if(dCO!==null&&dCO<=1&&dCO>=0)return{status:'due',urgent:true};
      if(dCO!==null&&dCO<0)return{status:'overdue',daysLate:-dCO};
      return{status:'upcoming'};
    case'reviews':
      if(!co)return{status:'na'};
      if(hAfterCO!==null&&hAfterCO>=1&&hAfterCO<=72)return{status:'due'};
      if(hAfterCO!==null&&hAfterCO>72)return{status:'overdue',daysLate:Math.floor(hAfterCO/24)};
      return{status:'upcoming'};
    default:return{status:'na'};
  }
}

function renderWaTpl(tpl, booking, extra={}){
  if(!tpl)return'';
  const bRooms=booking.rooms||[];
  const roomNames=bRooms.map(r=>r.roomName).filter(Boolean).join(', ')||'your room';
  const mealPlan=[...new Set(bRooms.map(r=>r.mealPlan).filter(Boolean))].join(', ')||'As booked';
  const nights=bRooms.length?Math.max(...bRooms.map(r=>r.nights||1)):1;
  const adults=bRooms.reduce((s,r)=>s+(r.adults||0),0)||'';
  const children=bRooms.reduce((s,r)=>s+(r.children||0)+(r.infants||0),0);
  const pax=adults+(children>0?` adults, ${children} children`:(adults?' adults':''));
  // Format check-in date long form e.g. "16 June 2026"
  const fmtLong=s=>{if(!s)return'';try{return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});}catch{return s;}};
  const vars={
    guestName:     booking.guestName||'',
    property:      booking.property||'',
    reservationId: booking.reservationId||'',
    checkIn:       fmtLong(booking.checkIn)||'',
    checkInShort:  fmtDateShort(booking.checkIn)||'',
    checkInTime:   booking.checkInTime||'2:00 PM',
    checkOut:      fmtLong(booking.checkOut)||'',
    checkOutShort: fmtDateShort(booking.checkOut)||'',
    checkOutTime:  booking.checkOutTime||'11:00 AM',
    nights:        String(nights),
    rooms:         roomNames,
    mealPlan,
    adults:        String(adults),
    pax,
    inclusions:    booking.inclusions||'Standard amenities',
    specialRequests: booking.specialRequests||'',
    phone:         booking.guestPhone||'',
    email:         booking.guestEmail||'',
    ...extra
  };
  return Object.entries(vars).reduce((t,[k,v])=>t.replace(new RegExp(`\\{${k}\\}`,'g'),v||''),tpl);
}

function OutreachSendModal({booking,stageId,waTemplates,roomRates,session,onSend,onClose}){
  const stage=WA_STAGES.find(s=>s.id===stageId);
  const baseTpl=(waTemplates||{})[stageId]||DEFAULT_WA_TEMPLATES[stageId]||'';
  const[msgText,setMsgText]=useState('');
  const[selUpgrade,setSelUpgrade]=useState(null);
  const[selAddons,setSelAddons]=useState([]);
  const[ready,setReady]=useState(false);

  const upgradeSuggestions=useMemo(()=>{
    if(stageId!=='upgrade')return[];
    const prop=booking.property;
    const rates=Object.entries((roomRates||DEFAULT_ROOM_RATES)[prop]||{}).sort((a,b)=>a[1]-b[1]);
    const currentNames=new Set((booking.rooms||[]).map(r=>r.roomName));
    const currentMax=Math.max(0,...(booking.rooms||[]).map(r=>(rates.find(([n])=>n===r.roomName)||[,0])[1]));
    return rates.filter(([n,r])=>!currentNames.has(n)&&r>currentMax).slice(0,4);
  },[stageId,booking,roomRates]);

  function buildMsg(upgrade,addons){
    if(stageId==='upgrade'&&upgrade){
      const[uRoom,uRate]=upgrade;
      const currentRoom=(booking.rooms||[])[0]?.roomName||'your current room';
      const rates=Object.entries((roomRates||DEFAULT_ROOM_RATES)[booking.property]||{});
      const currentRate=(rates.find(([n])=>n===currentRoom)||[,0])[1]||0;
      return renderWaTpl(baseTpl,booking,{
        upgradedRoom:uRoom,currentRoom,
        upgradeDiff:(uRate-currentRate).toLocaleString('en-IN'),
        upgradeReasons:'• More spacious & beautifully appointed\n• Enhanced privacy and comfort\n• Stunning views of the surroundings'
      });
    }
    if(stageId==='addons'){
      const list=addons.map(e=>`${e.emoji} *${e.name}* — ${e.priceLabel}\n_${e.shortDesc}_`).join('\n\n');
      return renderWaTpl(baseTpl,booking,{addOnsList:list||'[Select experiences above to populate]'});
    }
    return renderWaTpl(baseTpl,booking);
  }

  useEffect(()=>{
    const initUpgrade=stageId==='upgrade'&&upgradeSuggestions.length?upgradeSuggestions[0]:null;
    setSelUpgrade(initUpgrade);
    setMsgText(buildMsg(initUpgrade,[]));
    setReady(true);
  },[]);

  useEffect(()=>{if(ready)setMsgText(buildMsg(selUpgrade,selAddons));},[selUpgrade,selAddons,baseTpl]);

  function send(){
    const url=buildWaUrl(booking.guestPhone,msgText);
    if(url)window.open(url,'_blank');
    onSend(stageId,session);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1001,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:620,maxWidth:"96vw",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,.22)"}}>

          <div>
            <div style={{fontFamily:"var(--fh)",fontWeight:700,fontSize:"1rem"}}>{stage?.icon} {stage?.label} Message</div>
            <div style={{fontSize:".72rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:1}}>{booking.guestName} · {booking.property} · {fmtDateShort(booking.checkIn)}</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:"1.1rem",cursor:"pointer",color:"var(--ink3)",padding:"4px 8px",lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflow:"auto",padding:"14px 20px"}}>
          {/* Upgrade picker */}
          {stageId==='upgrade'&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:".66rem",fontFamily:"var(--fm)",fontWeight:700,color:"var(--ink2)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>Suggest Upgrade Room</div>
              {upgradeSuggestions.length===0
                ?<div style={{fontSize:".74rem",color:"var(--ink3)",background:"var(--stone)",padding:"7px 11px",borderRadius:7}}>No higher-tier rooms found. Add room rates in Pricing settings.</div>
                :<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {upgradeSuggestions.map(([room,rate])=>{
                    const currentRate=(Object.entries((roomRates||DEFAULT_ROOM_RATES)[booking.property]||{}).find(([n])=>n===(booking.rooms||[])[0]?.roomName)||[,0])[1]||0;
                    return(
                      <button key={room} onClick={()=>setSelUpgrade([room,rate])}
                        style={{padding:"5px 12px",borderRadius:7,cursor:"pointer",fontSize:".76rem",fontWeight:selUpgrade?.[0]===room?700:500,

/* ══ GMAIL SYNC ENGINE ════════════════════════════════════════ */
const PROP_FROM_PREFIX={SECP:'Pangot Perch',SECW:'Willows',SECT:'Taraview'};
const MONTH_IDX={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
const KNOWN_MEAL_PLANS=['Room Only','CP - Breakfast','CP – Breakfast','MAP - Breakfast & Dinner','MAP – Breakfast & Dinner','AP - All Inclusive','AP','EP','CP'];

function djuboDateToISO(str){
  if(!str)return'';
  const m=str.match(/(\d{1,2})\s+(\w{3}),?\s+(\d{4})/);
  if(!m)return'';
  return`${m[3]}-${String(MONTH_IDX[m[2]]||1).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
}
function djuboTime(str){return str?.match(/(\d{2}:\d{2})/)?.[1]||'14:00';}

function decodeGmailBody(data){
  try{return decodeURIComponent(escape(atob(data.replace(/-/g,'+').replace(/_/g,'/'))));}
  catch{try{return atob(data.replace(/-/g,'+').replace(/_/g,'/'));}catch{return'';}}
}

function htmlToText(html){
  return html
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<\/p>/gi,'\n').replace(/<\/div>/gi,'\n')
    .replace(/<\/tr>/gi,'\n').replace(/<\/td>/gi,' ').replace(/<\/th>/gi,' ')
    .replace(/<[^>]+>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&#39;/g,"'")
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
    .replace(/[ \t]+/g,' ')
    .replace(/\n[ \t]+/g,'\n')
    .replace(/\n{3,}/g,'\n\n');
}
function extractPlainText(payload){
  if(!payload)return'';
  if(payload.mimeType==='text/plain'&&payload.body?.data)return decodeGmailBody(payload.body.data);
  let htmlFallback=null;
  for(const part of payload.parts||[]){
    const found=extractPlainText(part);
    if(found)return found;
    if(!htmlFallback&&part.mimeType==='text/html'&&part.body?.data)htmlFallback=part.body.data;
  }
  if(htmlFallback)return htmlToText(decodeGmailBody(htmlFallback));
  if(payload.mimeType==='text/html'&&payload.body?.data)return htmlToText(decodeGmailBody(payload.body.data));
  return'';
}

function parseDjuboBooking(body, gmailMsgId){
  if(!/djubo/i.test(body))return null;
  const resId=(
    body.match(/Reservation ID[\s\S]{0,10}\n\s*([A-Z]+\d+)/)?.[1]||
    body.match(/Reservation ID\s*[:\-]?\s*([A-Z]+\d+)/i)?.[1]||
    body.match(/\b(SEC[A-Z]\d{4,})\b/)?.[1]
  )?.trim();
  if(!resId){console.warn('[Djubo] no resId in msg',gmailMsgId,body.slice(0,300));return null;}
  const prefix=resId.match(/^([A-Z]+)/)?.[1];
  const property=PROP_FROM_PREFIX[prefix];
  if(!property){console.warn('[Djubo] unknown prefix',prefix,'resId',resId);return null;}

  const ciStr=body.match(/Check in[\s\S]{0,10}\n\s*([\d]+ \w+,? \d{4}[^\n]+)/)?.[1]?.trim();
  const coStr=body.match(/Check out[\s\S]{0,10}\n\s*([\d]+ \w+,? \d{4}[^\n]+)/)?.[1]?.trim();
  const guestName=body.match(/Guest Name\s*:\s*(.+)/)?.[1]?.trim()||'';
  const guestEmail=body.match(/Guest Email\s*:\s*(.+)/)?.[1]?.trim()||'';
  const guestPhone=body.match(/Guest Contact No\.\s*:\s*(.+)/)?.[1]?.trim()||'';
  const createdBy=body.match(/Created By:\s*(.+)/)?.[1]?.trim()||'';
  const createdOnStr=body.match(/Created On:\s*(.+)/)?.[1]?.trim()||'';
  const resType=body.match(/Type of Reservation:\s*(.+)/)?.[1]?.trim()||'Direct';
  const cancelPolicy=body.match(/CANCELLATION POLICY[\s\S]{0,20}\n(.+)/)?.[1]?.trim()||'';
  const paymentSummary=body.match(/PAYMENT SUMMARY[\s\S]{0,20}\n(.+)/)?.[1]?.trim()||'';

  // Parse rooms from table
  const rooms=[];
  const lines=body.split('\n');
  const tblIdx=lines.findIndex(l=>l.includes('S.No.')&&l.includes('Room')&&l.includes('Nights'));
  if(tblIdx>=0){
    for(let i=tblIdx+1;i<lines.length;i++){
      const line=lines[i].trim();
      if(!line||/^Room Rent|^Total\b|^Discount|^Sub Total|^Total Taxes|^Advance|^Total outstanding/.test(line))break;
      if(!/^\d+\s/.test(line))continue;
      const rest=line.replace(/^\d+\s+/,'');
      let mealPlan='Room Only';
      for(const mp of KNOWN_MEAL_PLANS){if(rest.includes(mp)){mealPlan=mp;break;}}
      const mpIdx=rest.indexOf(mealPlan);
      const before=rest.slice(0,mpIdx).trim();
      const after=rest.slice(mpIdx+mealPlan.length).trim();
      const bp=before.split(/\s+/);
      const price=after.match(/INR\s*([\d,]+\.?\d*)/)?.[1];
      const nums=bp.slice(-4);
      const roomName=bp.slice(0,-4).join(' ')||rest.split(/\s+/)[0];
      rooms.push({
        roomName,nights:parseInt(nums[0])||1,adults:parseInt(nums[1])||2,
        children:parseInt(nums[2])||0,infants:parseInt(nums[3])||0,
        mealPlan,netPrice:price?parseFloat(price.replace(/,/g,'')):0
      });
    }
  }
  if(!rooms.length)rooms.push({roomName:'',nights:1,adults:2,children:0,infants:0,mealPlan:'Room Only',netPrice:0});

  // Parse financials
  const fin=(re)=>{const m=body.match(re);return m?parseFloat(m[1].replace(/,/g,'')):0;};
  const financials={
    roomRent:fin(/Room Rent\s+INR\s*([\d,]+\.?\d*)/),
    discount:String(fin(/Discount Amount\s+INR\s*([\d,]+\.?\d*)/)||''),
    subTotal:fin(/Sub Total\s+INR\s*([\d,]+\.?\d*)/),
    taxes:String(fin(/Total Taxes\s+INR\s*([\d,]+\.?\d*)/)||''),
    advance:String(fin(/Advance Amount\s+INR\s*([\d,]+\.?\d*)/)||''),
    outstanding:fin(/Total outstanding amount\s+INR\s*([\d,]+\.?\d*)/)
  };

  const creator=SALES_USERS.find(u=>u.name===createdBy);
  return{
    id:'djubo_'+resId,
    reservationId:resId,property,guestName,guestEmail,guestPhone,
    checkIn:djuboDateToISO(ciStr),checkInTime:djuboTime(ciStr),
    checkOut:djuboDateToISO(coStr),checkOutTime:djuboTime(coStr)||'11:00',
    reservationType:resType,status:'Confirmed',upsellStatus:'Pending',
    rooms,financials,callLog:[],pipelineStages:{},
    cancellationPolicy:cancelPolicy,paymentSummary,
    createdBy,addedById:creator?.id||null,
    addedOn:djuboDateToISO(createdOnStr)||todayISO(),
    source:'gmail',gmailMsgId
  };
}

function parseDjuboCancellation(body){
  if(!body.includes('Powered by Djubo.com')&&!body.includes('djubo'))return null;
  const resId=body.match(/\b(SEC[A-Z]\d{4,})\b/)?.[1];
  return resId?resId:null;
}

async function gmailFetch(token, url){
  const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error(`Gmail API ${r.status}`);
  return r.json();
}

async function syncGmailBookings(token, existingBookings, setBookings, setSyncLog, setLastSync){
  const added=[], cancelled=[], skipped=[];
  const existingIds=new Set(existingBookings.map(b=>b.reservationId));

  // 1. New bookings — search all Djubo emails from Jan 2025 onwards
  const q=encodeURIComponent('from:djubo.com after:2025/01/01');
  console.log('[GmailSync] query:',decodeURIComponent(q));
  const list=await gmailFetch(token,`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${q}&maxResults=200`);
  console.log('[GmailSync] messages found:',list.messages?.length||0);
  for(const msg of list.messages||[]){
    const full=await gmailFetch(token,`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=full`);
    const subject=full.payload?.headers?.find(h=>h.name==='Subject')?.value||'';
    const body=extractPlainText(full.payload);
    console.log('[GmailSync] email subject:',subject,'bodyLen:',body.length,'hasDjubo:',/djubo/i.test(body));
    const parsed=parseDjuboBooking(body, msg.id);
    if(!parsed){skipped.push(msg.id);continue;}
    if(existingIds.has(parsed.reservationId)){skipped.push(parsed.reservationId);continue;}
    added.push(parsed);
    existingIds.add(parsed.reservationId);
  }

  // 2. Cancellations
  const qc=encodeURIComponent('from:djubo.com subject:Cancel after:2025/01/01');
  const listC=await gmailFetch(token,`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${qc}&maxResults=50`);
  for(const msg of listC.messages||[]){
    const full=await gmailFetch(token,`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=full`);
    const body=extractPlainText(full.payload);
    const resId=parseDjuboCancellation(body);
    if(resId)cancelled.push(resId);
  }

  // Apply all changes atomically — drop sample placeholder data on first real import
  if(added.length||cancelled.length){
    setBookings(prev=>{
      const base=added.length?prev.filter(b=>!b._sample):prev;
      let next=[...base,...added];
      if(cancelled.length)next=next.map(b=>cancelled.includes(b.reservationId)?{...b,status:'Cancelled'}:b);
      return next;
    });
  }

  const ts=new Date().toISOString();
  setLastSync(ts);
  setSyncLog(prev=>[{ts,added:added.length,cancelled:cancelled.length,skipped:skipped.length},...(prev||[]).slice(0,19)]);
  return{added:added.length,cancelled:cancelled.length};
}

const GMAIL_CLIENT_ID='824198991836-s9i9mk9n9ev4nn5eq5nvn03bi614vbmb.apps.googleusercontent.com';
/* ══ GMAIL SYNC PANEL ══════════════════════════════════════════ */
function GmailSyncPanel({bookings,setBookings}){
  const clientId=GMAIL_CLIENT_ID;
  const[lastSync,setLastSync]=useLS('seclude_gmail_last_sync',null);
  const[syncLog,setSyncLog]=useLS('seclude_gmail_sync_log',[]);
  const[token,setToken]=useState(null);
  const[status,setStatus]=useState('idle'); // idle|connecting|syncing|done|error
  const[lastResult,setLastResult]=useState(null);
  const bookingsRef=React.useRef(bookings);
  bookingsRef.current=bookings;

  async function runSync(tok){
    setStatus('syncing');
    try{
      const res=await syncGmailBookings(tok,bookingsRef.current,setBookings,setSyncLog,setLastSync);
      setLastResult(res);setStatus('done');
      setTimeout(()=>setStatus('idle'),4000);
    }catch(e){setStatus('error');console.error('Gmail sync error:',e);}
  }

  function getToken(callback, silent=false){
    if(!window.google?.accounts?.oauth2){if(!silent)setStatus('error');return;}
    const client=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:'https://www.googleapis.com/auth/gmail.readonly',
      callback:(r)=>{
        if(r.access_token){setToken(r.access_token);callback(r.access_token);}
        else if(!silent){setStatus('error');}
      },
      error_callback:(e)=>{if(!silent)setStatus('error');}
    });
    client.requestAccessToken(silent?{prompt:''}:{});
  }

  // ── Auto-sync once per session — skip if synced within last 30 min ──
  useEffect(()=>{
    if(!clientId)return;
    // If already synced in the last 30 minutes, don't re-sync on every nav
    if(lastSync&&(Date.now()-new Date(lastSync).getTime())<30*60*1000)return;
    let cancelled=false;
    const attempt=(retries=0)=>{
      if(cancelled)return;
      if(!window.google?.accounts?.oauth2){
        if(retries<10)setTimeout(()=>attempt(retries+1),600);
        return;
      }
      getToken(tok=>{if(!cancelled)runSync(tok);}, /*silent=*/true);
    };
    setTimeout(()=>attempt(),800);
    return()=>{cancelled=true;};
  },[]); // run once on first mount only — eslint-disable-line

  function handleSync(){
    if(token){runSync(token);}
    else{setStatus('connecting');getToken(tok=>runSync(tok),false);}
  }

  const lastSyncFmt=lastSync?new Date(lastSync).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' · '+new Date(lastSync).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):null;

  return(
    <div className="gmail-strip" style={{background:"var(--stone)",border:"1px solid var(--line)",borderRadius:10,padding:"9px 14px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:"1rem"}}>📧</span>
        <div>
          <div style={{fontSize:".76rem",fontWeight:600,color:"var(--ink)"}}>Gmail Sync {token?<span style={{color:"var(--g)",fontWeight:700}}>● Connected</span>:<span style={{color:"var(--ink3)"}}>○ Not connected</span>}</div>
          <div style={{fontSize:".65rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>{lastSyncFmt?`Last sync: ${lastSyncFmt}`:'Never synced'}{lastResult&&status==='done'?` · ✅ ${lastResult.added} new, ${lastResult.cancelled} cancelled`:''}</div>
        </div>
      </div>
      <button onClick={handleSync} disabled={status==='syncing'||status==='connecting'}
        style={{padding:"5px 13px",background:status==='syncing'||status==='connecting'?"var(--line)":"var(--g)",color:status==='syncing'||status==='connecting'?"var(--ink3)":"#fff",border:"none",borderRadius:7,fontSize:".76rem",fontWeight:600,cursor:status==='syncing'?"wait":"pointer",transition:".15s",flexShrink:0}}>
        {status==='connecting'?'Connecting…':status==='syncing'?'Syncing…':status==='done'?'✓ Synced':'↻ Sync Now'}
      </button>
    </div>
  );
}

                <button className="btn btn-out btn-sm" style={{fontSize:".7rem",padding:"4px 9px"}} onClick={()=>setShowExp(exp)}>Details</button>
              </div>
            </div>
          ))}
        </div>

        <div className="detail-section">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div className="detail-section-title" style={{marginBottom:0}}>Call Log</div>
            <button className="btn btn-g btn-sm" style={{fontSize:".7rem"}} onClick={()=>setShowLogCall(true)}>+ Log Call</button>
          </div>
          {(!booking.callLog||booking.callLog.length===0)&&<div style={{fontSize:".8rem",color:"var(--ink3)",padding:"8px 0"}}>No calls logged yet.</div>}
          {(booking.callLog||[]).map(entry=>(
            <div key={entry.id} className="call-entry">
              <div className="call-entry-header">
                <span className="call-entry-agent">{entry.agentName}</span>
                <span className="call-entry-date">{fmtDate(entry.date)}</span>
              </div>
              <div style={{fontSize:".74rem",color:"var(--ink3)",marginBottom:6}}>
                <span className={"sb "+(entry.outcome.includes("Sold")?"sb-sold":entry.outcome.includes("Interested")?"sb-pitched":entry.outcome.includes("No")?"sb-nosale":"sb-called")}>{entry.outcome}</span>
              </div>
              {entry.pitched.length>0&&(
                <div className="call-pitched">
                  <span style={{fontSize:".64rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginRight:2}}>PITCHED:</span>
                  {entry.pitched.map(id=>{const ex=EXPERIENCES.find(e=>e.id===id);return ex?<span key={id} className="tag" style={{background:"#F3F4F6",color:"var(--ink2)"}}>{ex.emoji} {ex.name}</span>:null;})}
                </div>
              )}
              {entry.sold.length>0&&(
                <div className="call-sold">
                  <div style={{fontWeight:700,marginBottom:4,fontSize:".74rem"}}>✓ Sold:</div>
                  {entry.sold.map((s,i)=>{const ex=EXPERIENCES.find(e=>e.id===s.expId);return(
                    <div key={i} style={{fontSize:".78rem",display:"flex",justifyContent:"space-between"}}>
                      <span>{ex?.emoji} {ex?.name}</span>
                      <span style={{fontFamily:"var(--fm)",fontWeight:600}}>{fmtCur(s.confirmedPrice)}{s.expDate?" · "+fmtDateShort(s.expDate):""}</span>
                    </div>
                  );})}
                </div>
              )}
              {entry.notes&&<div style={{marginTop:6,fontSize:".76rem",color:"var(--ink2)",fontStyle:"italic"}}>"{entry.notes}"</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
    </>
  );
}

/* ══ DATE BRACKET HELPER ════════════════════════════════════════ */
function getDateBracket(checkIn){
  if(!checkIn)return{label:"Unknown",order:99};
  const d=Math.floor((new Date(checkIn+"T00:00:00")-new Date())/86400000);
  if(d<0)return{label:"Overdue",order:0};
  if(d===0)return{label:"Today",order:1};
  if(d===1)return{label:"Tomorrow",order:2};
  if(d<=7)return{label:"This Week",order:3};
  if(d<=14)return{label:"Next Week",order:4};
  return{label:"Later",order:5};
}

        const nonHot=filtered.filter(b=>hotScore(b).tier!=="hot");
        // Group non-hot by date bracket
        const restGroups=(()=>{
          const g={};
          nonHot.forEach(b=>{
            const br=getDateBracket(b.checkIn);
            if(!g[br.label])g[br.label]={label:br.label,order:br.order,items:[]};
