                    {b.financials?.outstanding>0&&<div style={{fontSize:".72rem",color:"#b91c1c",fontWeight:600,marginTop:3}}>Due: {fmtCur(b.financials.outstanding)}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══ EXPERIENCES CATALOG ════════════════════════════════════════ */
function ExperiencesCatalog({expPrices,roomRates}){
  const[catF,setCatF]=useState("All");
  const[showExp,setShowExp]=useState(null);
  const[selPropRm,setSelPropRm]=useState(PROPERTIES[0]);
  const cats=["All",...[...new Set(EXPERIENCES.map(e=>e.category))],"Rooms"];
  const filtered=catF==="All"?EXPERIENCES:EXPERIENCES.filter(e=>e.category===catF);

  function roomTier(rate,allRates){
    const sorted=[...allRates].sort((a,b)=>a-b);
    const pct=(sorted.indexOf(rate)+1)/sorted.length;
    if(pct<=0.33)return{label:"Standard",cls:"#6B7280"};
    if(pct<=0.66)return{label:"Deluxe",cls:"var(--g2)"};
    return{label:"Premium",cls:"var(--g)"};
  }

  return(
    <div>
      {showExp&&<ExpDetailModal exp={{...showExp,priceLabel:(expPrices?.[showExp.id]?.label||showExp.priceLabel)}} booking={null} onClose={()=>setShowExp(null)}/>}
      <div className="pg-title">Experiences &amp; Rooms</div>
      <div className="pg-sub">Experiences catalog + room hierarchy for upgrade suggestions · Prices editable in Pricing</div>
      <div className="pill-bar">
        {cats.map(c=><button key={c} className={"pill"+(catF===c?" on":"")} onClick={()=>setCatF(c)}>{c}</button>)}
      </div>

      {catF==="Rooms"?(
        <div>
          <div style={{marginBottom:12,fontSize:".8rem",color:"var(--ink2)",background:"var(--gxl)",border:"1px solid var(--gl)",borderRadius:8,padding:"8px 13px"}}>
            💡 Rooms are ranked by nightly rate — use this to suggest upgrades during sales calls. Rates editable in Pricing.
          </div>
          <div className="prop-tabs" style={{marginBottom:14}}>
            {PROPERTIES.map(p=><button key={p} className={"prop-tab"+(selPropRm===p?" on":"")} onClick={()=>setSelPropRm(p)}>{p}</button>)}
          </div>
          {(()=>{
            const propRooms=Object.entries((roomRates||DEFAULT_ROOM_RATES)[selPropRm]||{}).sort((a,b)=>a[1]-b[1]);
            if(!propRooms.length)return<div className="empty"><strong>No rooms configured</strong>Add rooms in Pricing settings.</div>;
            const n=propRooms.length;
            const cut1=Math.ceil(n/3),cut2=Math.ceil(2*n/3);
            const bands=[
              {id:"standard",label:"Standard",cls:"standard",color:"var(--ink3)",rooms:propRooms.slice(0,cut1)},
              {id:"deluxe",  label:"Deluxe",  cls:"deluxe",  color:"var(--g2)", rooms:propRooms.slice(cut1,cut2)},
              {id:"premium", label:"Premium", cls:"premium", color:"#fff",      rooms:propRooms.slice(cut2)},
            ].filter(b=>b.rooms.length>0);
            return(
              <div>
                {bands.map((band,bi)=>{
                  const minR=band.rooms[0][1],maxR=band.rooms[band.rooms.length-1][1];
                  const nextBand=bands[bi+1];
                  return(
                    <div key={band.id} className="tier-band">
                      <div className={"tier-band-hdr "+band.cls}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:9,height:9,borderRadius:"50%",background:band.id==="premium"?"rgba(255,255,255,.5)":"var(--g)",flexShrink:0}}/>
                          <span style={{fontWeight:700,fontSize:".84rem",color:band.id==="premium"?"rgba(255,255,255,.88)":"var(--ink)"}}>{band.label}</span>
                          <span style={{fontSize:".68rem",fontFamily:"var(--fm)",color:band.id==="premium"?"rgba(255,255,255,.4)":"var(--ink3)"}}>
                            {fmtCur(minR)}{minR!==maxR?` – ${fmtCur(maxR)}`:""}/night
                          </span>
                        </div>
                        <span style={{fontSize:".63rem",fontFamily:"var(--fm)",color:band.id==="premium"?"rgba(255,255,255,.35)":"var(--ink3)"}}>{band.rooms.length} room{band.rooms.length!==1?"s":""}</span>
                      </div>
                      {band.rooms.map(([room,rate],idx)=>{
                        const nextInBand=band.rooms[idx+1];
                        const upgrade=nextInBand||(idx===band.rooms.length-1&&nextBand?nextBand.rooms[0]:null);
                        return(
                          <div key={room} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderBottom:idx<band.rooms.length-1?"1px solid var(--line)":undefined,gap:10,background:"var(--white)"}}>
                            <div style={{fontWeight:500,fontSize:".84rem"}}>{room}</div>
                            <div style={{display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
                              <span style={{fontFamily:"var(--fm)",fontSize:".84rem",fontWeight:700,color:"var(--g)"}}>{fmtCur(rate)}<span style={{fontWeight:400,fontSize:".68rem",color:"var(--ink3)"}}>/n</span></span>
                              {upgrade
                                ?<span style={{fontSize:".7rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>↑ <strong style={{color:"var(--ink2)"}}>{upgrade[0]}</strong> <span style={{color:"var(--g2)"}}>+{fmtCur(upgrade[1]-rate)}/n</span></span>
                                :<span style={{fontSize:".65rem",color:"var(--g)",fontFamily:"var(--fm)",fontWeight:600}}>⭐ Top</span>
                              }
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      ):(
        <div className="exp-grid">
          {filtered.map(exp=>{
            const livePrice=expPrices?.[exp.id];
            return(
              <div key={exp.id} className="exp-catalog-card" onClick={()=>setShowExp(exp)}>
                <span className="exp-emoji">{exp.emoji}</span>
                <div className="exp-cat-label">{exp.category}</div>
                <div className="exp-card-name">{exp.name}</div>
                <div className="exp-card-price">{livePrice?.label||exp.priceLabel}</div>
                <div className="exp-card-desc">{exp.shortDesc}</div>
                <div style={{marginTop:10,fontSize:".72rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>⏱ {exp.timings}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══ UPSELL PIPELINE ════════════════════════════════════════════ */
function UpsellPipeline({bookings,onSelect}){
  const[agentF,setAgentF]=useState("All");
  const today=todayISO();

  // On-property: checked-in guests or check-in date has passed and not yet checked out/cancelled
  const onProperty=useMemo(()=>bookings.filter(b=>
    b.status==="Checked In"||(b.checkIn<=today&&b.checkOut>today&&!["Checked Out","Cancelled","No Show"].includes(b.status))
  ).sort((a,z)=>a.checkOut.localeCompare(z.checkOut)),[bookings,today]);

  const allEntries=useMemo(()=>{
    const rows=[];
    bookings.forEach(b=>{
      (b.callLog||[]).forEach(cl=>{
        cl.pitched.forEach(expId=>{
          const exp=EXPERIENCES.find(e=>e.id===expId);
          const soldItem=cl.sold.find(s=>s.expId===expId);
          rows.push({bookingId:b.id,guest:b.guestName,property:b.property,checkIn:b.checkIn,agent:cl.agentName,agentId:cl.agentId,callDate:cl.date,expId,expName:exp?.name||expId,expEmoji:exp?.emoji||"",sold:!!soldItem,confirmedPrice:soldItem?.confirmedPrice||0,expDate:soldItem?.expDate||""});
        });
        if(cl.pitched.length===0){
          rows.push({bookingId:b.id,guest:b.guestName,property:b.property,checkIn:b.checkIn,agent:cl.agentName,agentId:cl.agentId,callDate:cl.date,expId:null,expName:"(no experience pitched)",expEmoji:"📞",sold:false,confirmedPrice:0,expDate:""});
        }
      });
    });
    return rows.sort((a,b)=>(b.callDate||"").localeCompare(a.callDate||""));
  },[bookings]);

  const agents=["All",...[...new Set(allEntries.map(e=>e.agent))].sort()];
  const filtered=agentF==="All"?allEntries:allEntries.filter(e=>e.agent===agentF);
  const totalRev=filtered.filter(e=>e.sold).reduce((s,e)=>s+e.confirmedPrice,0);
  const convRate=filtered.length>0?Math.round((filtered.filter(e=>e.sold).length/filtered.length)*100):0;

  function downloadCSV(){
    const headers=["Date","Guest","Property","Check-in","Agent","Experience","Result","Revenue"];
    const rows=filtered.map(r=>[r.callDate,r.guest,r.property,r.checkIn,r.agent,r.expName,r.sold?"Sold":"Pitched",r.sold?r.confirmedPrice:0]);
    const csv=[headers,...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`upsell-pipeline-${today}.csv`;a.click();
    URL.revokeObjectURL(url);
  }

  return(
    <div>
      <div className="pg-title">Upsell Pipeline</div>
      <div className="pg-sub">On-property guests + all pitched/sold experiences — track performance</div>

      {/* ON-PROPERTY — highest priority */}
      {onProperty.length>0&&(
        <div style={{background:"var(--gxl)",border:"1.5px solid var(--gl)",borderRadius:12,padding:"14px 16px",marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontFamily:"var(--fh)",fontSize:"1rem",fontWeight:600,color:"var(--g)"}}>🏠 On Property Now — Upsell Immediately</div>
            <span style={{fontSize:".68rem",fontFamily:"var(--fm)",fontWeight:700,background:"var(--gl)",color:"var(--g)",padding:"2px 8px",borderRadius:4}}>{onProperty.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {onProperty.map(b=>{
              const{tier,reasons}=hotScore(b);
              const daysLeft=b.checkOut?Math.floor((new Date(b.checkOut+"T00:00:00")-new Date())/86400000):-1;
              return(
                <div key={b.id} style={{background:"var(--white)",border:"1px solid var(--gl)",borderRadius:8,padding:"9px 13px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}} onClick={()=>onSelect(b.id)}>
                  <div>
                    <div style={{fontWeight:600,fontSize:".88rem"}}>{b.guestName} <span style={{fontWeight:400,color:"var(--ink3)",fontSize:".74rem",fontFamily:"var(--fm)"}}>· {b.property}</span></div>
                    <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                      <span className={"sb "+(UPSELL_CLASS[b.upsellStatus]||"sb-pending")}>{b.upsellStatus}</span>
                      {reasons.slice(0,2).map((r,i)=><span key={i} className={"reason-tag "+r.cls}>{r.t}</span>)}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {daysLeft>=0&&<div style={{fontFamily:"var(--fm)",fontSize:".76rem",fontWeight:700,color:daysLeft<=1?"#b91c1c":daysLeft<=2?"var(--ink2)":"var(--ink3)"}}>{daysLeft}d left</div>}
                    <div style={{fontSize:".65rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:2}}>CO: {fmtDateShort(b.checkOut)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="stat-row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <div className="stat"><div className="stat-l">Total Pitches</div><div className="stat-v">{filtered.length}</div></div>
        <div className="stat"><div className="stat-l">Revenue Sold</div><div className="stat-v" style={{fontSize:"1.6rem"}}>{fmtCur(totalRev)}</div></div>
        <div className="stat"><div className="stat-l">Conversion Rate</div><div className="stat-v">{convRate}%</div></div>
      </div>

      <div className="filter-bar">
        <select value={agentF} onChange={e=>setAgentF(e.target.value)}>
          {agents.map(a=><option key={a}>{a}</option>)}
        </select>
        {filtered.length>0&&<button className="btn btn-out btn-sm" onClick={downloadCSV}>↓ Download CSV</button>}
      </div>

      {filtered.length===0&&<div className="empty"><strong>No upsell activity yet</strong>Log a sales call to see pipeline data.</div>}
      {filtered.length>0&&(
        <div className="card" style={{padding:0,overflow:"hidden"}}>
          {/* Desktop table */}
          <div className="desk-only" style={{overflowX:"auto"}}>
            <table className="pipeline-tbl" style={{minWidth:620,width:"100%"}}>
              <thead><tr><th>Date</th><th>Guest</th><th>Property</th><th>Check-in</th><th>Agent</th><th>Experience</th><th>Result</th><th>Revenue</th></tr></thead>
              <tbody>
                {filtered.map((r,i)=>(
                  <tr key={i} style={{cursor:"pointer"}} onClick={()=>onSelect(r.bookingId)}>
                    <td style={{fontFamily:"var(--fm)",fontSize:".76rem",whiteSpace:"nowrap"}}>{fmtDateShort(r.callDate)}</td>
                    <td style={{fontWeight:600}}>{r.guest}</td>
                    <td style={{color:"var(--ink3)",fontSize:".8rem"}}>{r.property}</td>
                    <td style={{fontFamily:"var(--fm)",fontSize:".74rem",whiteSpace:"nowrap"}}>{fmtDateShort(r.checkIn)}</td>
                    <td style={{fontSize:".8rem"}}>{r.agent}</td>
                    <td>{r.expEmoji} {r.expName}</td>
                    <td><span className={"sb "+(r.sold?"sb-sold":"sb-pitched")}>{r.sold?"✓ Sold":"Pitched"}</span></td>
                    <td style={{fontFamily:"var(--fm)",fontWeight:600,color:r.sold?"var(--g)":"var(--ink3)"}}>{r.sold?fmtCur(r.confirmedPrice):"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* Mobile card stack */}
          <div className="mob-only" style={{flexDirection:"column",gap:0}}>
            {filtered.map((r,i)=>(
              <div key={i} onClick={()=>onSelect(r.bookingId)} style={{padding:"12px 14px",borderBottom:"1px solid var(--line)",cursor:"pointer",background:"#fff"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:".88rem"}}>{r.guest}</div>
                    <div style={{fontSize:".72rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:1}}>{r.property}</div>
                  </div>
                  <span className={"sb "+(r.sold?"sb-sold":"sb-pitched")}>{r.sold?"✓ Sold":"Pitched"}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                  <div style={{fontSize:".76rem",color:"var(--ink2)"}}>{r.expEmoji} {r.expName}</div>
                  <div style={{fontFamily:"var(--fm)",fontWeight:700,color:r.sold?"var(--g)":"var(--ink3)",fontSize:".82rem"}}>{r.sold?fmtCur(r.confirmedPrice):"—"}</div>
                </div>
                <div style={{fontSize:".68rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:4}}>{r.agent} · {fmtDateShort(r.callDate)} · CI: {fmtDateShort(r.checkIn)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ REPORTS ════════════════════════════════════════════════════ */
function Reports({bookings}){
  const allSold=bookings.flatMap(b=>(b.callLog||[]).flatMap(c=>c.sold.map(s=>({...s,agent:c.agentName,property:b.property}))));
  const totalRev=allSold.reduce((s,x)=>s+x.confirmedPrice,0);
  const byAgent={};
  bookings.forEach(b=>{
    (b.callLog||[]).forEach(cl=>{
      if(!byAgent[cl.agentName])byAgent[cl.agentName]={calls:0,sold:0,rev:0};
      byAgent[cl.agentName].calls++;
      byAgent[cl.agentName].sold+=cl.sold.length;
      byAgent[cl.agentName].rev+=cl.sold.reduce((s,x)=>s+x.confirmedPrice,0);
    });
  });
  const byExp={};
  allSold.forEach(s=>{
    const exp=EXPERIENCES.find(e=>e.id===s.expId);
    const n=exp?.name||s.expId;
    if(!byExp[n])byExp[n]={count:0,rev:0};
    byExp[n].count++;byExp[n].rev+=s.confirmedPrice;
  });

  return(
    <div>
      <div className="pg-title">Reports</div>
      <div className="pg-sub">Sales performance and upsell revenue overview</div>
      <div className="stat-row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <div className="stat"><div className="stat-l">Total Bookings</div><div className="stat-v">{bookings.length}</div></div>
        <div className="stat"><div className="stat-l">Total Upsell Revenue</div><div className="stat-v" style={{fontSize:"1.5rem"}}>{fmtCur(totalRev)}</div></div>
        <div className="stat"><div className="stat-l">Upsell Conversion</div><div className="stat-v">{bookings.length>0?Math.round((bookings.filter(b=>b.upsellStatus==="Sold"||b.upsellStatus==="Partial").length/bookings.length)*100):0}%</div></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16}}>
        <div className="rep-card">
          <div className="rep-title">By Agent</div>
          {Object.keys(byAgent).length===0&&<div style={{color:"var(--ink3)",fontSize:".82rem"}}>No data yet</div>}
          {Object.entries(byAgent).sort(([,a],[,b])=>b.rev-a.rev).map(([agent,d])=>(
            <div key={agent} className="rep-row">
              <div><div style={{fontWeight:600,fontSize:".84rem"}}>{agent}</div><div style={{fontSize:".72rem",color:"var(--ink3)"}}>{d.calls} calls · {d.sold} sold</div></div>
              <div style={{fontFamily:"var(--fm)",fontWeight:700,color:"var(--g)"}}>{fmtCur(d.rev)}</div>
            </div>
          ))}
        </div>
        <div className="rep-card">
          <div className="rep-title">Top Experiences</div>
          {Object.keys(byExp).length===0&&<div style={{color:"var(--ink3)",fontSize:".82rem"}}>No data yet</div>}
          {Object.entries(byExp).sort(([,a],[,b])=>b.rev-a.rev).map(([name,d])=>(
            <div key={name} className="rep-row">
              <div><div style={{fontWeight:600,fontSize:".84rem"}}>{name}</div><div style={{fontSize:".72rem",color:"var(--ink3)"}}>{d.count}× sold</div></div>
              <div style={{fontFamily:"var(--fm)",fontWeight:700,color:"var(--g)"}}>{fmtCur(d.rev)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══ LEAD CARD (shared by Dashboard hot/warm sections) ══════════ */
function LeadCard({b,onNav}){
  const{tier,reasons,mealFlag}=hotScore(b);
  const totalUpsold=(b.callLog||[]).flatMap(c=>c.sold).reduce((s,x)=>s+(x.confirmedPrice||0),0);
  const daysToCI=b.checkIn?Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000):-1;
  return(
    <div className={"bk-card "+(tier==="hot"?"lead-hot":"lead-warm")} onClick={()=>onNav("bookings",b.id)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",align:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
            <span className={"lead-badge "+(tier==="hot"?"lead-hot-badge":"lead-warm-badge")}>{tier==="hot"?"🔥 Hot Lead":"🌡 Warm Lead"}</span>
            <span style={{fontFamily:"var(--fh)",fontSize:"1.05rem",fontWeight:600}}>{b.guestName}</span>
          </div>
          <div style={{fontSize:".72rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginBottom:6}}>{b.property} · {b.reservationId||"No ID"} · {fmtDateShort(b.checkIn)}→{fmtDateShort(b.checkOut)}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:reasons.length?6:0}}>
            <span className={"sb "+(STATUS_CLASS[b.status]||"sb-confirmed")}>{b.status}</span>
            <span className={"sb "+(UPSELL_CLASS[b.upsellStatus]||"sb-pending")}>{b.upsellStatus}</span>
            {b.rooms.length>1&&<span className="sb sb-direct">{b.rooms.length} rooms</span>}
            {totalUpsold>0&&<span className="sb sb-sold">+{fmtCur(totalUpsold)}</span>}
          </div>
          {reasons.length>0&&(
            <div className="lead-reasons">
              {reasons.map((r,i)=><span key={i} className={"reason-tag "+r.cls}>{r.t}</span>)}
            </div>
          )}
          {mealFlag&&<div className="meal-flag" style={{marginTop:6}}>🍽️ <span>{mealFlag}</span></div>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"var(--fm)",fontSize:".74rem",fontWeight:600,color:daysToCI<=3&&daysToCI>=0?"#EF4444":daysToCI<=7&&daysToCI>=0?"#F59E0B":"var(--ink3)"}}>
            {daysToCI>=0?`${daysToCI}d to CI`:"—"}
          </div>
          <div style={{fontSize:".7rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:2}}>{b.rooms.reduce((s,r)=>s+(r.adults||0),0)} adults</div>
          {b.financials?.outstanding>0&&<div style={{fontSize:".68rem",color:"#b91c1c",fontWeight:600,marginTop:2}}>Due: {fmtCur(b.financials.outstanding)}</div>}
        </div>
      </div>
    </div>
  );
}

/* ══ DASHBOARD ══════════════════════════════════════════════════ */
function Dashboard({bookings,session,onNav,setBookings,outreachOverdue=0,outreachDue=0}){
  const pending=bookings.filter(b=>b.upsellStatus==="Pending").length;
  const totalRev=bookings.flatMap(b=>(b.callLog||[]).flatMap(c=>c.sold)).reduce((s,x)=>s+(x.confirmedPrice||0),0);
  const today=todayISO();

  // Score only pre-check-in bookings — "Checked In" guests move to Upsell Pipeline
  const activeBookings=bookings.filter(b=>["Confirmed","Called"].includes(b.status));
  const scoredActive=activeBookings.map(b=>({b,hs:hotScore(b)})).filter(x=>x.hs.tier!=="done"&&x.hs.tier!=="cold");
  const hotLeads=scoredActive.filter(x=>x.hs.tier==="hot").sort((a,z)=>z.hs.score-a.hs.score);
  const warmLeads=scoredActive.filter(x=>x.hs.tier==="warm").sort((a,z)=>z.hs.score-a.hs.score);

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,paddingBottom:14,borderBottom:"1px solid var(--line)"}}>
        <img src="https://seclude.in/wp-content/themes/seclude/images/seclude-logo.png" alt="Seclude" style={{height:32,opacity:.85}} onError={e=>e.target.style.display="none"}/>
        <div>
          <div className="pg-title" style={{marginBottom:1}}>Guest Relations</div>
          <div style={{fontSize:".82rem",color:"var(--ink3)"}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})} · {session.name}</div>
        </div>
      </div>

      {(outreachOverdue>0||outreachDue>0)&&(
        <div onClick={()=>onNav("outreach")} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          borderRadius:9,marginBottom:12,cursor:"pointer",border:"1px solid",transition:".15s",
          background:outreachOverdue>0?"#FFF5F5":"#FFFDF0",
          borderColor:outreachOverdue>0?"#FECACA":"#FDE68A"}}>
          <span style={{fontSize:"1rem"}}>{outreachOverdue>0?"🔴":"🟡"}</span>
          <div style={{flex:1,fontSize:".8rem",fontWeight:600,color:outreachOverdue>0?"#B91C1C":"#92400E"}}>
            WhatsApp Outreach:
            {outreachOverdue>0&&<span style={{marginLeft:6}}>{outreachOverdue} overdue</span>}
            {outreachOverdue>0&&outreachDue>0&&<span style={{fontWeight:400,color:"var(--ink3)"}}>·</span>}
            {outreachDue>0&&<span style={{marginLeft:6,color:"#92400E"}}>{outreachDue} due now</span>}
          </div>
          <span style={{fontSize:".75rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>View Outreach →</span>
        </div>
      )}

      <div className="stat-row">
        <div className="stat"><div className="stat-l">Total Bookings</div><div className="stat-v">{bookings.length}</div><div className="stat-h">All time</div></div>
        <div className="stat"><div className="stat-l">Priority Leads</div><div className="stat-v">{hotLeads.length+warmLeads.length}</div><div className="stat-h">{hotLeads.length} hot · {warmLeads.length} warm</div></div>
        <div className="stat"><div className="stat-l">Upsell Revenue</div><div className="stat-v" style={{fontSize:"1.6rem"}}>{fmtCur(totalRev)}</div><div className="stat-h">Confirmed</div></div>
        <div className="stat"><div className="stat-l">Conversion</div><div className="stat-v">{bookings.length>0?Math.round((bookings.filter(b=>b.upsellStatus==="Sold"||b.upsellStatus==="Partial").length/bookings.length)*100):0}%</div><div className="stat-h">With upsell</div></div>
      </div>

      {/* ⚡ Urgent reminder strip — hot leads checking in ≤ 3 days */}
      {(()=>{
        const urgent=hotLeads.filter(({b})=>{const d=Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000);return d>=0&&d<=3;});
        if(!urgent.length)return null;
        return(
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",background:"var(--g3)",borderRadius:9,padding:"9px 14px",marginBottom:12}}>
            <span style={{fontSize:".64rem",fontFamily:"var(--fm)",fontWeight:700,color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap"}}>⚡ Check-in Soon</span>
            {urgent.map(({b})=>{
              const d=Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000);
              return(
                <button key={b.id} onClick={()=>onNav("bookings",b.id)} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 11px",background:"var(--g)",color:"#fff",border:"none",borderRadius:20,fontSize:".72rem",fontWeight:600,cursor:"pointer",fontFamily:"var(--fm)",transition:".13s"}}>
                  🔥 {b.guestName.split(" ").slice(0,2).join(" ")} · {d===0?"Today":d===1?"Tomorrow":`${d}d`}
                </button>
              );
            })}
          </div>
        );
      })()}

      {/* Compact priority table — hot first, then warm */}
      {(hotLeads.length>0||warmLeads.length>0)&&(
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontFamily:"var(--fh)",fontSize:"1rem",fontWeight:600,color:"var(--ink)"}}>Priority Leads</div>
            <div style={{display:"flex",gap:5}}>
              {hotLeads.length>0&&<span style={{fontSize:".65rem",fontFamily:"var(--fm)",fontWeight:700,background:"var(--gl)",color:"var(--g)",padding:"2px 8px",borderRadius:4}}>🔥 {hotLeads.length} hot</span>}
              {warmLeads.length>0&&<span style={{fontSize:".65rem",fontFamily:"var(--fm)",fontWeight:700,background:"var(--sm)",color:"var(--ink2)",padding:"2px 8px",borderRadius:4}}>⏰ {warmLeads.length} warm</span>}
            </div>
          </div>
          {/* Desktop table */}
          <div className="desk-only" style={{borderRadius:10,border:"1px solid var(--line)",overflow:"hidden"}}>
            <table className="priority-tbl" style={{minWidth:560,width:"100%"}}>
              <thead><tr>
                <th className="priority-stripe"></th>
                <th>Guest</th><th>Property</th><th>Check-in</th><th>Top Signals</th><th>Upsell</th><th>Pipeline</th>
              </tr></thead>
              <tbody>
                {[...hotLeads,...warmLeads].map(({b,hs})=>{
                  const dCI=b.checkIn?Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000):-1;
                  const stages=b.pipelineStages||{};
                  const done=PIPELINE_STAGES.filter(s=>stages[s.id]).length;
                  const isHot=hs.tier==="hot";
                  return(
                    <tr key={b.id} onClick={()=>onNav("bookings",b.id)}>
                      <td className="priority-stripe" style={{background:isHot?"var(--g)":"var(--ld)"}}></td>
                      <td>
                        <div style={{fontWeight:600,fontSize:".84rem"}}>{b.guestName}</div>
                        <div style={{fontSize:".63rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:1}}>{b.reservationId||"—"}</div>
                      </td>
                      <td style={{fontSize:".8rem",color:"var(--ink2)"}}>{b.property}</td>
                      <td>
                        <div style={{fontFamily:"var(--fm)",fontSize:".76rem",whiteSpace:"nowrap"}}>{fmtDateShort(b.checkIn)}</div>
                        <div style={{fontSize:".63rem",fontFamily:"var(--fm)",fontWeight:700,marginTop:1,color:dCI<=2&&dCI>=0?"var(--g)":dCI<=7&&dCI>=0?"var(--ink2)":"var(--ink3)"}}>
                          {dCI===0?"Today":dCI===1?"Tomorrow":dCI>=0?`${dCI}d away`:"—"}
                        </div>
                      </td>
                      <td><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{hs.reasons.slice(0,3).map((r,i)=><span key={i} className={"reason-tag "+r.cls}>{r.t}</span>)}</div></td>
                      <td><span className={"sb "+(UPSELL_CLASS[b.upsellStatus]||"sb-pending")}>{b.upsellStatus}</span></td>
                      <td>
                        <div style={{display:"flex",gap:2,alignItems:"center"}}>
                          {PIPELINE_STAGES.map(s=><div key={s.id} title={s.label} style={{width:9,height:9,borderRadius:"50%",background:stages[s.id]?"var(--g)":"var(--line)"}}/>)}
                          <span style={{fontSize:".58rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginLeft:3}}>{done}/5</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {/* Mobile card stack */}
          <div className="mob-only" style={{flexDirection:"column",gap:8}}>
            {[...hotLeads,...warmLeads].map(({b,hs})=>{
              const dCI=b.checkIn?Math.floor((new Date(b.checkIn+"T00:00:00")-new Date())/86400000):-1;
              const stages=b.pipelineStages||{};
              const done=PIPELINE_STAGES.filter(s=>stages[s.id]).length;
              const isHot=hs.tier==="hot";
              return(
                <div key={b.id} onClick={()=>onNav("bookings",b.id)} style={{background:"#fff",borderRadius:10,border:"1px solid var(--line)",borderLeft:`4px solid ${isHot?"var(--g)":"var(--ld)"}`,padding:"11px 13px",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:".9rem"}}>{b.guestName}</div>
                      <div style={{fontSize:".65rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:1}}>{b.reservationId||"—"}</div>
                    </div>
                    <span className={"sb "+(UPSELL_CLASS[b.upsellStatus]||"sb-pending")}>{b.upsellStatus}</span>
                  </div>
                  <div style={{fontSize:".78rem",color:"var(--ink2)",marginBottom:5}}>{b.property}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:"var(--fm)",fontSize:".75rem"}}>{fmtDateShort(b.checkIn)}</div>
                      <div style={{fontSize:".65rem",fontFamily:"var(--fm)",fontWeight:700,color:dCI<=2&&dCI>=0?"var(--g)":dCI<=7&&dCI>=0?"var(--ink2)":"var(--ink3)"}}>
                        {dCI===0?"Today":dCI===1?"Tomorrow":dCI>=0?`${dCI}d away`:"—"}
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"flex-end"}}>{hs.reasons.slice(0,2).map((r,i)=><span key={i} className={"reason-tag "+r.cls}>{r.t}</span>)}</div>
                      <div style={{display:"flex",gap:2,alignItems:"center"}}>
                        {PIPELINE_STAGES.map(s=><div key={s.id} style={{width:8,height:8,borderRadius:"50%",background:stages[s.id]?"var(--g)":"var(--line)"}}/>)}
                        <span style={{fontSize:".6rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginLeft:2}}>{done}/5</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {hotLeads.length===0&&warmLeads.length===0&&(
        <div style={{background:"var(--gxl)",border:"1px solid var(--gl)",borderRadius:12,padding:"22px",textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:"1.8rem",marginBottom:8}}>✓</div>
          <div style={{fontFamily:"var(--fh)",fontSize:"1.1rem",color:"var(--g)",fontWeight:600}}>All active leads are handled</div>
          <div style={{fontSize:".8rem",color:"var(--ink3)",marginTop:4}}>No pending hot or warm upsell opportunities right now</div>
        </div>
      )}

      {/* Upcoming check-ins summary */}
      <div style={{fontFamily:"var(--fh)",fontSize:"1.05rem",fontWeight:600,marginBottom:10,color:"var(--ink2)"}}>All Upcoming Check-ins</div>
      {bookings.filter(b=>b.checkIn>=today&&!["Cancelled","No Show","Checked Out"].includes(b.status)).sort((a,z)=>a.checkIn.localeCompare(z.checkIn)).slice(0,6).map(b=>{
        const{tier}=hotScore(b);
        return(
          <div key={b.id} style={{background:"var(--white)",border:"1px solid var(--line)",borderRadius:10,padding:"10px 14px",marginBottom:7,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,transition:".15s"}} onClick={()=>onNav("bookings",b.id)}>
            <div>
              <div style={{fontWeight:600,fontSize:".88rem"}}>{b.guestName}</div>
              <div style={{fontSize:".72rem",color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:2}}>{b.property} · {fmtDateShort(b.checkIn)} → {fmtDateShort(b.checkOut)}</div>
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
              {tier==="hot"&&<span className="lead-badge lead-hot-badge">🔥</span>}
              {tier==="warm"&&<span className="lead-badge lead-warm-badge">🌡</span>}
              <span className={"sb "+(UPSELL_CLASS[b.upsellStatus]||"sb-pending")}>{b.upsellStatus}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══ PRICING SETTINGS ══════════════════════════════════════════ */
function PricingSettings({expPrices,setExpPrices,roomRates,setRoomRates}){
  const[savedExp,setSavedExp]=useState(false);
  const[savedRoom,setSavedRoom]=useState(false);
  const[newRow,setNewRow]=useState({prop:"",room:"",rate:""});
  const[selProp,setSelProp]=useState(PROPERTIES[0]);

  function updExpPrice(id,field,val){
    setExpPrices(p=>({...p,[id]:{...p[id],[field]:field==="price"?Number(val)||0:val}}));
  }
  function saveExp(){setSavedExp(true);setTimeout(()=>setSavedExp(false),2000);}

  function updRoomRate(prop,room,val){
    setRoomRates(p=>({...p,[prop]:{...(p[prop]||{}),[room]:Number(val)||0}}));
  }
  function addRoomRow(){
    if(!newRow.prop||!newRow.room)return;
    setRoomRates(p=>({...p,[newRow.prop]:{...(p[newRow.prop]||{}),[newRow.room]:Number(newRow.rate)||0}}));
    setNewRow({prop:"",room:"",rate:""});
  }
  function deleteRoomRow(prop,room){
    setRoomRates(p=>{const n={...p,[prop]:{...p[prop]}};delete n[prop][room];return n;});
  }
  function saveRoom(){setSavedRoom(true);setTimeout(()=>setSavedRoom(false),2000);}

  const selRooms=roomRates[selProp]||{};

  return(
    <div>
      <div className="pg-title">Pricing</div>
      <div className="pg-sub">Update experience and room rates — changes reflect immediately across the dashboard</div>

      {/* Experience Prices */}
      <div className="form-section" style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="form-section-title" style={{marginBottom:0}}>Experience Prices</div>
          <button className="btn btn-g btn-sm" onClick={saveExp}>{savedExp?"✓ Saved":"Save"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:8}}>
          {EXPERIENCES.map(exp=>(
            <div key={exp.id} style={{border:"1px solid var(--line)",borderRadius:8,padding:"10px 12px",background:"var(--white)",display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:"1.1rem"}}>{exp.emoji}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:".84rem"}}>{exp.name}</div>
                  <div style={{fontSize:".65rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>{exp.category}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:".6rem",color:"var(--ink3)",fontFamily:"var(--fm)",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:2}}>Price (₹)</label>
                  <input className="price-inp" type="number" value={expPrices[exp.id]?.price||""} onChange={e=>updExpPrice(exp.id,"price",e.target.value)} style={{width:"100%",boxSizing:"border-box"}}/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:".6rem",color:"var(--ink3)",fontFamily:"var(--fm)",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:2}}>Display Label</label>
                  <input className="price-inp" type="text" value={expPrices[exp.id]?.label||""} onChange={e=>updExpPrice(exp.id,"label",e.target.value)} placeholder="e.g. ₹4,500" style={{width:"100%",boxSizing:"border-box",textAlign:"left"}}/>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{fontSize:".72rem",color:"var(--ink3)",marginTop:8}}>⚠ Note: These are base rates. Negotiated prices per booking are recorded in the call log.</div>
      </div>

      {/* Room Rates */}
      <div className="form-section">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="form-section-title" style={{marginBottom:0}}>Room Rates (per night)</div>
          <button className="btn btn-g btn-sm" onClick={saveRoom}>{savedRoom?"✓ Saved":"Save"}</button>
        </div>
        <div style={{fontSize:".72rem",color:"var(--ink3)",marginBottom:12}}>Room rates fluctuate — keep these updated for accurate reference during sales calls. These are not synced from seclude.in automatically; update manually when rates change.</div>

        {/* Property tabs — scrollable on mobile */}
        <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",marginBottom:14,paddingBottom:4}}>
          <div style={{display:"flex",gap:6,flexWrap:"nowrap",minWidth:"max-content"}}>
            {PROPERTIES.map(p=><button key={p} className={"prop-tab"+(selProp===p?" on":"")} onClick={()=>setSelProp(p)} style={{flexShrink:0}}>{p}</button>)}
          </div>
        </div>

        {Object.keys(selRooms).length===0&&(
          <div style={{color:"var(--ink3)",fontSize:".8rem",padding:"12px 0"}}>No rooms added yet for {selProp} — add below</div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {Object.entries(selRooms).map(([room,rate])=>(
            <div key={room} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",border:"1px solid var(--line)",borderRadius:8,background:"var(--white)"}}>
              <div style={{flex:1,fontWeight:500,fontSize:".84rem"}}>{room}</div>
              <input className="price-inp" type="number" value={rate} onChange={e=>updRoomRate(selProp,room,e.target.value)} style={{width:110}}/>
              <span style={{fontSize:".65rem",color:"var(--ink3)",fontFamily:"var(--fm)"}}>/ night</span>
              <button onClick={()=>deleteRoomRow(selProp,room)} style={{background:"none",border:"none",color:"#b91c1c",cursor:"pointer",fontSize:".9rem",padding:"2px 6px",flexShrink:0}}>✕</button>
            </div>
          ))}
        </div>

        {/* Add new room row */}
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
          <select value={newRow.prop||selProp} onChange={e=>setNewRow(p=>({...p,prop:e.target.value}))} style={{padding:"6px 10px",border:"1.5px solid var(--line)",borderRadius:7,fontSize:".78rem",background:"var(--white)",color:"var(--ink)"}}>
            {PROPERTIES.map(p=><option key={p}>{p}</option>)}
          </select>
          <input value={newRow.room} onChange={e=>setNewRow(p=>({...p,room:e.target.value}))} placeholder="Room name" style={{padding:"6px 10px",border:"1.5px solid var(--line)",borderRadius:7,fontSize:".78rem",width:140}}/>
          <input type="number" value={newRow.rate} onChange={e=>setNewRow(p=>({...p,rate:e.target.value}))} placeholder="Rate ₹" style={{padding:"6px 10px",border:"1.5px solid var(--line)",borderRadius:7,fontSize:".78rem",width:100}}/>
          <button className="btn btn-g btn-sm" onClick={addRoomRow}>+ Add Room</button>
        </div>
      </div>
    </div>
  );
}

/* ══ GUEST APP ════════════════════════════════════════════════ */
function GuestApp({session,onLogout}){
  const[bookings,setBookings]=useLS("seclude_gr_bookings_v1",INIT_BOOKINGS);
  const[expPrices,setExpPrices]=useLS("seclude_exp_prices_v1",DEFAULT_EXP_PRICES);
  const[roomRates,setRoomRates]=useLS("seclude_room_rates_v1",DEFAULT_ROOM_RATES);
  const[waTemplates,setWaTemplates]=useLS("seclude_wa_templates_v1",DEFAULT_WA_TEMPLATES);
  const[page,setPage]=useState("dashboard");
  const[selId,setSelId]=useState(null);
  const[editBooking,setEditBooking]=useState(null);
  const[addMode,setAddMode]=useState(false);

  const outreachOverdue=bookings.reduce((n,b)=>n+WA_STAGES.filter(s=>getWaStageStatus(b,s.id).status==='overdue').length,0);
  const outreachDue=bookings.reduce((n,b)=>n+WA_STAGES.filter(s=>getWaStageStatus(b,s.id).status==='due').length,0);

  const NAVS=[
    {id:"dashboard",label:"Dashboard"},
    {id:"bookings",label:"Active Leads",badge:bookings.filter(b=>["Confirmed","Called"].includes(b.status)&&b.upsellStatus==="Pending").length||null},
    {id:"outreach",label:"Outreach",badge:(outreachOverdue+outreachDue)||null,badgeRed:outreachOverdue>0},
    {id:"experiences",label:"Experiences"},
    {id:"pipeline",label:"Upsell Pipeline"},
    {id:"reports",label:"Reports"},
    {id:"pricing",label:"Pricing"},
  ];

  function nav(p,bookingId){
    setPage(p);setAddMode(false);setEditBooking(null);
    if(bookingId){setSelId(bookingId);}else if(p!=="bookings"){setSelId(null);}
  }
  function saveBooking(b){
    setBookings(prev=>{const i=prev.findIndex(x=>x.id===b.id);return i>=0?prev.map(x=>x.id===b.id?b:x):[b,...prev];});
    setAddMode(false);setEditBooking(null);setSelId(b.id);setPage("bookings");
  }
  function updateBooking(b){setBookings(prev=>prev.map(x=>x.id===b.id?b:x));}
  function deleteBooking(id){if(window.confirm("Delete this booking?"))setBookings(prev=>prev.filter(x=>x.id!==id));}

  const selBooking=selId?bookings.find(b=>b.id===selId):null;
  const pendingCount=bookings.filter(b=>b.upsellStatus==="Pending").length;

  const showForm=addMode||editBooking;

  return(
    <div id="app">
      <div id="side">
        <div className="shead">
          <div>
            <div className="slogo-text">Seclude</div>
            <div className="slogo-sub">Guest Relations</div>
          </div>
          <button className="s-logout" onClick={onLogout}>Sign out</button>
        </div>
        <div className="snav">
          <div className="snav-sect">Sales</div>
          {NAVS.map(n=>(
            <button key={n.id} className={"si"+(page===n.id&&!showForm?" on":"")} onClick={()=>nav(n.id)}>
              {n.label}
              {n.badge>0&&<span className="si-badge" style={n.badgeRed?{background:"#DC2626"}:{}}>{n.badge}</span>}
            </button>
          ))}
          <div className="snav-sect" style={{marginTop:20}}>Links</div>
          <a href="operations.html" style={{display:"block",padding:"9px 14px",color:"rgba(255,255,255,.35)",fontSize:".82rem",textDecoration:"none",borderRadius:8,transition:".15s"}} onMouseEnter={e=>e.target.style.color="rgba(255,255,255,.8)"} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.35)"}>← Operations Dashboard</a>
        </div>
        <div style={{padding:"14px 18px",borderTop:"1px solid rgba(255,255,255,.06)"}}>
          <div style={{fontSize:".7rem",color:"rgba(255,255,255,.3)",fontFamily:"var(--fm)"}}>{session.role}</div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:".84rem",fontWeight:500}}>{session.name}</div>
        </div>
      </div>
      <div id="main">
        <div id="topbar">
          <div className="crumb">
            <span className="lk" onClick={()=>nav("dashboard")}>Guest Relations</span>
            {page==="bookings"&&!selId&&!showForm&&<><span>›</span><b>Bookings</b></>}
            {page==="bookings"&&selId&&!showForm&&<><span>›</span><span className="lk" onClick={()=>setSelId(null)}>Bookings</span><span>›</span><b>{selBooking?.guestName||"Detail"}</b></>}
            {showForm&&<><span>›</span><span className="lk" onClick={()=>nav("bookings")}>Bookings</span><span>›</span><b>{editBooking?"Edit":"New Booking"}</b></>}
            {page==="experiences"&&<><span>›</span><b>Experiences</b></>}
            {page==="pipeline"&&<><span>›</span><b>Pipeline</b></>}
            {page==="reports"&&<><span>›</span><b>Reports</b></>}
            {page==="pricing"&&<><span>›</span><b>Pricing</b></>}
            {page==="outreach"&&<><span>›</span><b>Outreach</b></>}
          </div>
        </div>
        <div id="content">
          {/* Gmail sync always mounted so auto-sync fires on every app load */}
          <div style={{display:page==="dashboard"?"block":"none"}}><GmailSyncPanel bookings={bookings} setBookings={setBookings}/></div>
          {showForm&&<AddBookingForm session={session} initial={editBooking||null} onSave={saveBooking} onCancel={()=>{setAddMode(false);setEditBooking(null);}}/>}
          {!showForm&&page==="dashboard"&&<Dashboard bookings={bookings} session={session} onNav={nav} setBookings={setBookings} outreachOverdue={outreachOverdue} outreachDue={outreachDue}/>}
          {!showForm&&page==="bookings"&&!selId&&<BookingsList bookings={bookings} session={session} onSelect={id=>{setSelId(id);}} onAdd={()=>{setAddMode(true);setSelId(null);}}/>}
          {!showForm&&page==="bookings"&&selId&&selBooking&&<BookingDetail booking={selBooking} session={session} onBack={()=>setSelId(null)} onEdit={()=>{setEditBooking(selBooking);setSelId(null);}} onUpdateBooking={updateBooking} roomRates={roomRates}/>}
          {!showForm&&page==="outreach"&&<OutreachPage bookings={bookings} session={session} waTemplates={waTemplates} setWaTemplates={setWaTemplates} roomRates={roomRates} onUpdateBooking={updateBooking}/>}
          {!showForm&&page==="experiences"&&<ExperiencesCatalog expPrices={expPrices} roomRates={roomRates}/>}
          {!showForm&&page==="pipeline"&&<UpsellPipeline bookings={bookings} onSelect={id=>{setSelId(id);setPage("bookings");}}/>}
          {!showForm&&page==="reports"&&<Reports bookings={bookings}/>}
          {!showForm&&page==="pricing"&&<PricingSettings expPrices={expPrices} setExpPrices={setExpPrices} roomRates={roomRates} setRoomRates={setRoomRates}/>}
        </div>
        <BottomNav page={page} nav={nav} pendingCount={pendingCount} outreachBadge={(outreachOverdue+outreachDue)||null} outreachRed={outreachOverdue>0} onLogout={onLogout}/>
      </div>
    </div>
  );
}

/* ══ ROOT ════════════════════════════════════════════════════ */
function App(){
  const[session,setSession]=useState(()=>{
    try{const s=localStorage.getItem('seclude_session');return s?JSON.parse(s):null;}
    catch{return null;}
  });
  function handleLogin(u){
    localStorage.setItem('seclude_session',JSON.stringify(u));
    setSession(u);
  }
  function handleLogout(){
    localStorage.removeItem('seclude_session');
    setSession(null);
  }
  if(!session)return<Login onLogin={handleLogin}/>;
  return<GuestApp session={session} onLogout={handleLogout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
function __runApp(){
  var root=document.getElementById('root');
  try{
    root.innerHTML='';
    var src=document.getElementById('app-src').textContent;
    var compiled=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    eval(compiled);
  }catch(e){
    root.innerHTML='<div style="padding:24px;font-family:sans-serif;color:#B91C1C;background:#FEF2F2;min-height:100vh"><strong>App failed to load.</strong><br><br><small style="font-family:monospace">'+e.message+'</small></div>';
    console.error('Bootstrap error:',e);
  }
}
function __waitBabel(n){
  if(window.Babel){__runApp();}
  else if(n>0){setTimeout(function(){__waitBabel(n-1);},300);}
  else{document.getElementById('root').innerHTML='<div style="padding:24px;font-family:sans-serif">Could not load Babel. Check your connection and refresh.</div>';}
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){__waitBabel(20);});
}else{
  __waitBabel(20);
}
</script>
