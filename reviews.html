/* ── utils ── */
function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}catch{return typeof init==="function"?init():init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[v,key]);
  return[v,setV];
}

/* ── Firestore helpers ── */
async function fsLoad(){
  if(!window.rdb)return[];
  try{
    const snap=await window.rdb.collection("reviews").get();
    const all=[];
    snap.forEach(doc=>{all.push(...(doc.data().reviews||[]));});
    return all;
  }catch(e){console.warn("[FS reviews load]",e);return[];}
}
async function fsSave(platform,propId,newReviews){
  if(!window.rdb||!newReviews.length)return;
  try{
    const ref=window.rdb.collection("reviews").doc(`${platform}_${propId}`);
    const snap=await ref.get();
    const existing=snap.exists?(snap.data().reviews||[]):[];
    const existIds=new Set(existing.map(r=>r.id));
    const fresh=newReviews.filter(r=>!existIds.has(r.id));
    if(fresh.length)await ref.set({reviews:[...existing,...fresh],platform,propId,updatedAt:Date.now()},{merge:true});
  }catch(e){console.warn("[FS reviews save]",e);}
}

/* ── Stars ── */
function Stars({rating,size=14}){
  return(
    <span style={{display:"inline-flex",gap:1,lineHeight:1}}>
      {[1,2,3,4,5].map(i=><svg key={i} width={size} height={size} viewBox="0 0 24 24" fill={i<=Math.round(rating)?"#FBBF24":"#E5E7EB"}><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>)}
    </span>
  );
}
function fmtDate(d){if(!d)return"";try{return new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});}catch{return d;}}
function relDate(d){if(!d)return"";try{const days=Math.floor((Date.now()-new Date(d))/864e5);if(days<1)return"Today";if(days===1)return"Yesterday";if(days<7)return`${days}d ago`;if(days<30)return`${Math.floor(days/7)}w ago`;if(days<365)return`${Math.floor(days/30)}mo ago`;return`${Math.floor(days/365)}y ago`;}catch{return"";}}

/* ── API: TripAdvisor ── */
async function fetchTA(locationId,apiKey,propId,propName){
  const h={"accept":"application/json"};
  const[detRes,revRes]=await Promise.all([
    fetch(`${TA_BASE}/location/${locationId}/details?key=${apiKey}&language=en`,{headers:h}),
    fetch(`${TA_BASE}/location/${locationId}/reviews?key=${apiKey}&language=en`,{headers:h})
  ]);
  if(!detRes.ok)throw new Error(`TA API ${detRes.status}`);
  const det=await detRes.json();
  const rev=revRes.ok?await revRes.json():{data:[]};
  const reviews=(rev.data||[]).map(r=>({
    id:`ta_${r.id}`,platform:"tripadvisor",platformName:"TripAdvisor",
    propertyId:propId,propertyName:propName,
    rating:r.rating||0,title:r.title||"",text:r.text||"",
    author:r.user?.username||"Guest",authorLocation:r.user?.user_location?.name||"",
    date:r.published_date||"",tripType:(r.trip_type||"").toLowerCase().replace(/_/g," "),
    url:r.url||"",language:r.lang||"en",
  }));
  return{propId,platform:"tripadvisor",avgRating:parseFloat(det.rating)||0,reviewCount:parseInt(det.num_reviews)||0,reviews};
}

/* ── API: Booking.com ── */
async function fetchBooking(hotelId,cfg,propId,propName){
  if(!cfg.proxyUrl)throw new Error("No CORS proxy for Booking.com.");
  const auth=btoa(`${cfg.username}:${cfg.password}`);
  const target=`https://api.booking.com/v1/hotels/${hotelId}/reviews?rows=25`;
  const res=await fetch(`${cfg.proxyUrl}?url=${encodeURIComponent(target)}`,{headers:{"X-Auth":`Basic ${auth}`,"accept":"application/json"}});
  if(!res.ok)throw new Error(`Booking API ${res.status}`);
  const data=await res.json();
  const reviews=(Array.isArray(data)?data:(data.result||[])).map((r,i)=>({
    id:`bk_${hotelId}_${r.review_id||i}`,platform:"booking",platformName:"Booking.com",
    propertyId:propId,propertyName:propName,
    rating:Math.round((r.average_score||r.score||0)/2*10)/10,
    title:r.headline||"",text:[r.pros,r.cons].filter(Boolean).join("\n\nCons: "),
    author:r.author_name||"Guest",authorLocation:r.countrycode||"",
    date:r.date||r.check_out||"",tripType:(r.tags?.[0]||"").toLowerCase(),url:"",language:r.languagecode||"en",
  }));
  return{propId,platform:"booking",avgRating:0,reviewCount:0,reviews};
}

/* ── API: Google Places (v1) ── */
async function fetchGoogle(placeId,apiKey,propId,propName){
  // New Places API v1 — returns rating, userRatingCount, up to 5 reviews
  const res=await fetch(`https://places.googleapis.com/v1/places/${placeId}?languageCode=en`,{
    headers:{"X-Goog-Api-Key":apiKey,"X-Goog-FieldMask":"reviews,rating,userRatingCount,displayName","Content-Type":"application/json"}
  });
  if(!res.ok){const t=await res.text();throw new Error(`Google Places API ${res.status}: ${t.slice(0,120)}`);}
  const data=await res.json();
  const reviews=(data.reviews||[]).map((r,i)=>({
    id:`google_${placeId}_${i}_${(r.publishTime||"").slice(0,10)}`,
    platform:"google",platformName:"Google",
    propertyId:propId,propertyName:propName,
    rating:r.rating||0,
    title:"",
    text:r.text?.text||"",
    author:r.authorAttribution?.displayName||"Guest",
    authorLocation:"",
    date:r.publishTime||"",
    tripType:"",
    url:r.googleMapsUri||"",
    language:r.text?.languageCode||"en",
  }));
  return{propId,platform:"google",avgRating:data.rating||0,reviewCount:data.userRatingCount||0,reviews};
}

/* ── AI summary via Groq (Llama 3.3 70B — free) ── */
async function genSummary(reviews,propName,apiKey){
  const text=reviews.slice(0,25).map(r=>`[${r.rating}★ — ${r.platform}] ${r.title?r.title+": ":""}${r.text||""}`).join("\n\n");
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
    body:JSON.stringify({
      model:"llama-3.3-70b-versatile",max_tokens:350,
      messages:[
        {role:"system",content:"You are a hospitality analytics assistant for Seclude, a luxury boutique property brand in India."},
        {role:"user",content:`Analyze these guest reviews for "${propName}" and return a concise insight covering: (1) what guests love most, (2) main pain points or recurring complaints, (3) any notable trend. Keep it to 3–4 sentences, direct and actionable.\n\nReviews:\n${text}`}
      ]
    })
  });
  if(!res.ok){const t=await res.text();throw new Error(`Groq API ${res.status}: ${t.slice(0,120)}`);}
  const d=await res.json();
  return d.choices[0].message.content;
}

/* ── Analytics helpers ── */
function computeKeywords(revs,positive){
  const freq={};
  revs.filter(r=>positive?r.rating>=4:r.rating<=3).forEach(r=>{
    const words=(r.text||"").toLowerCase().match(/\b[a-z]{4,}\b/g)||[];
    words.forEach(w=>{if(!STOP.has(w))freq[w]=(freq[w]||0)+1;});
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12);
}
function byMonth(revs){
  const m={};
  revs.forEach(r=>{if(!r.date)return;const mk=r.date.slice(0,7);if(!m[mk])m[mk]={sum:0,cnt:0};m[mk].sum+=r.rating;m[mk].cnt++;});
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
}
function avg(arr){return arr.length?arr.reduce((s,x)=>s+x,0)/arr.length:0;}

/* ═══════════════════════ APP ═══════════════════════ */
function App(){
  const[config,setConfig]=useLS("seclude_reviews_config",INIT_CONFIG);
  // One-time migration: always merge latest default Place IDs + API key into saved config
  useEffect(()=>{
    setConfig(c=>({...c,google:{...c.google,
      apiKey:c.google?.apiKey||DEFAULT_GOOGLE_KEY,
      places:{...DEFAULT_PLACES,...(c.google?.places||{})}
    }}));
  },[]);
  const[allReviews,setAllReviews]=useState([]);
  const[stats,setStats]=useState({});
  const[loading,setLoading]=useState({});
  const[errors,setErrors]=useState({});
  const[tab,setTab]=useState("feed");
  const[fPlatform,setFPlatform]=useState("all");
  const[fRating,setFRating]=useState(0);
  const[fProp,setFProp]=useState("all");
  const[fSearch,setFSearch]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[importPlat,setImportPlat]=useState(null);
  const hasTAKey=!!(config.tripadvisor?.apiKey);

  // Load accumulated reviews from Firestore on mount
  useEffect(()=>{
    fsLoad().then(stored=>{if(stored.length)setAllReviews(stored);});
  },[]);

  const fetchAll=useCallback(async(overrideConfig)=>{
    const cfg=overrideConfig||config;
    const locs=cfg.tripadvisor?.locations||{};
    const taEntries=Object.entries(locs).filter(([,id])=>id);
    const bkHotels=cfg.booking?.hotels||{};
    const bkEntries=Object.entries(bkHotels).filter(([,id])=>id);
    // Always fall back to baked-in defaults so Google works even before migration effect settles
    const gPlaces={...DEFAULT_PLACES,...(cfg.google?.places||{})};
    const gApiKey=cfg.google?.apiKey||DEFAULT_GOOGLE_KEY;
    const gEntries=Object.entries(gPlaces).filter(([,id])=>id);
    if(!taEntries.length&&!bkEntries.length&&!gEntries.length)return;
    setErrors({});
    const jobs=[
      ...taEntries.map(([propId,locationId])=>async()=>{
        const prop=ALL_PROPS.find(p=>p.id===propId);
        const k=`ta_${propId}`;
        setLoading(l=>({...l,[k]:true}));
        try{
          const r=await fetchTA(locationId,cfg.tripadvisor.apiKey,propId,prop?.name||propId);
          setStats(s=>({...s,[k]:{avgRating:r.avgRating,reviewCount:r.reviewCount}}));
          setAllReviews(prev=>{
            const existIds=new Set(prev.map(x=>x.id));
            const fresh=r.reviews.filter(x=>!existIds.has(x.id));
            return fresh.length?[...prev,...fresh]:prev;
          });
          await fsSave("tripadvisor",propId,r.reviews);
        }catch(e){setErrors(er=>({...er,[k]:e.message}));}
        finally{setLoading(l=>({...l,[k]:false}));}
      }),
      ...bkEntries.map(([propId,hotelId])=>async()=>{
        const prop=ALL_PROPS.find(p=>p.id===propId);
        const k=`bk_${propId}`;
        setLoading(l=>({...l,[k]:true}));
        try{
          const r=await fetchBooking(hotelId,cfg.booking,propId,prop?.name||propId);
          setAllReviews(prev=>{const existIds=new Set(prev.map(x=>x.id));const fresh=r.reviews.filter(x=>!existIds.has(x.id));return fresh.length?[...prev,...fresh]:prev;});
          await fsSave("booking",propId,r.reviews);
        }catch(e){setErrors(er=>({...er,[k]:e.message}));}
        finally{setLoading(l=>({...l,[k]:false}));}
      }),
      ...gEntries.map(([propId,placeId])=>async()=>{
        const prop=ALL_PROPS.find(p=>p.id===propId);
        const k=`google_${propId}`;
        setLoading(l=>({...l,[k]:true}));
        try{
          const r=await fetchGoogle(placeId,gApiKey,propId,prop?.name||propId);
          setStats(s=>({...s,[k]:{avgRating:r.avgRating,reviewCount:r.reviewCount}}));
          setAllReviews(prev=>{const existIds=new Set(prev.map(x=>x.id));const fresh=r.reviews.filter(x=>!existIds.has(x.id));return fresh.length?[...prev,...fresh]:prev;});
          await fsSave("google",propId,r.reviews);
        }catch(e){setErrors(er=>({...er,[k]:e.message}));}
        finally{setLoading(l=>({...l,[k]:false}));}
      }),
    ];
    await Promise.all(jobs.map(fn=>fn()));
  },[config]);

  // Auto-fetch on load using baked-in defaults (bypasses config race condition)
  useEffect(()=>{fetchAll({...config,google:{apiKey:DEFAULT_GOOGLE_KEY,places:DEFAULT_PLACES}});},[]);

  // Merge manual reviews from config
  const reviews=useMemo(()=>{
    const manual=Object.values(config.manual||{}).flat();
    const manualIds=new Set(manual.map(r=>r.id));
    const base=allReviews.filter(r=>!manualIds.has(r.id));
    return[...base,...manual].sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[allReviews,config.manual]);

  const filtered=useMemo(()=>reviews.filter(r=>{
    if(fPlatform!=="all"&&r.platform!==fPlatform)return false;
    if(fRating>0&&r.rating<fRating)return false;
    if(fProp!=="all"&&r.propertyId!==fProp)return false;
    if(fSearch){const q=fSearch.toLowerCase();if(![r.title,r.text,r.author,r.propertyName].join(" ").toLowerCase().includes(q))return false;}
    return true;
  }),[reviews,fPlatform,fRating,fProp,fSearch]);

  const platCards=PLATFORMS.map(p=>{
    const myRevs=reviews.filter(r=>r.platform===p.id);
    const statKeys=Object.keys(stats).filter(k=>k.startsWith(`${p.id}_`));
    const officialAvg=statKeys.length?statKeys.reduce((s,k)=>s+(stats[k]?.avgRating||0),0)/statKeys.length:(myRevs.length?avg(myRevs.map(r=>r.rating)):0);
    const officialCount=statKeys.reduce((s,k)=>s+(stats[k]?.reviewCount||0),0)||myRevs.length;
    const errs=Object.entries(errors).filter(([k])=>k.startsWith(`${p.id}_`)).map(([,v])=>v);
    const isLoading=Object.entries(loading).some(([k,v])=>k.startsWith(`${p.id}_`)&&v);
    return{...p,avgRating:officialAvg,reviewCount:officialCount,fetchedCount:myRevs.length,errs,isLoading};
  });

  const overallAvg=reviews.length?avg(reviews.map(r=>r.rating)):0;
  const anyLoading=Object.values(loading).some(Boolean);

  return(
    <div style={{minHeight:"100vh",background:"#F7F6F3"}}>
      <TopBar onSettings={()=>setShowSettings(true)} onRefresh={fetchAll} loading={anyLoading} tab={tab} setTab={setTab}/>

      {!hasTAKey&&(
        <div style={{background:"linear-gradient(135deg,#0F5C4C,#1B7A5E)",color:"#fff",padding:"16px 28px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>Connect your review platforms</div>
            <div style={{fontSize:12,opacity:.85}}>Add your TripAdvisor API key in Settings to pull live reviews. Other platforms support manual import.</div>
          </div>
          <button onClick={()=>setShowSettings(true)} style={{padding:"8px 18px",background:"rgba(255,255,255,.18)",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}}>Open Settings →</button>
        </div>
      )}

      <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 20px"}}>
        {/* Platform cards + overall score (always visible) */}
        {reviews.length>0&&(
          <div style={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:14,padding:"18px 24px",marginBottom:20,display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:"2.8rem",fontWeight:800,color:"#111",lineHeight:1}}>{overallAvg.toFixed(1)}</div>
              <Stars rating={overallAvg} size={16}/>
              <div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>{reviews.length} reviews</div>
            </div>
            <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(125px,1fr))",gap:8}}>
              {platCards.map(p=>(
                <div key={p.id} onClick={()=>setFPlatform(fPlatform===p.id?"all":p.id)}
                  style={{background:p.bg,border:`1.5px solid ${fPlatform===p.id?p.color:p.color+"33"}`,borderRadius:10,padding:"9px 11px",cursor:"pointer",boxShadow:fPlatform===p.id?`0 0 0 3px ${p.color}22`:"none"}}>
                  <div style={{fontSize:10,fontWeight:700,color:p.dark,marginBottom:2,letterSpacing:.3}}>{p.name.toUpperCase()}</div>
                  {p.isLoading?<div style={{fontSize:11,color:p.dark+"88",animation:"pulse 1.5s infinite"}}>Fetching…</div>
                    :p.errs.length?<div style={{fontSize:10,color:"#EF4444"}} title={p.errs[0]}>⚠ Error</div>
                    :p.avgRating>0?<><div style={{fontSize:"1.4rem",fontWeight:700,color:p.dark,lineHeight:1}}>{p.avgRating.toFixed(1)}</div><div style={{fontSize:10,color:p.dark+"99",marginTop:1}}>{p.reviewCount?`${p.reviewCount.toLocaleString()} total`:`${p.fetchedCount} saved`}</div></>
                    :<div style={{fontSize:11,color:"#9CA3AF"}}>{p.hasApi?"Not configured":"No data"}</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Feed tab */}
        {tab==="feed"&&(
          <>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
              <div style={{position:"relative",flex:1,minWidth:180}}>
                <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="14" height="14" fill="none" stroke="#9CA3AF" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input value={fSearch} onChange={e=>setFSearch(e.target.value)} placeholder="Search reviews…"
                  style={{width:"100%",padding:"8px 12px 8px 32px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,outline:"none",background:"#fff"}}/>
              </div>
              <select value={fPlatform} onChange={e=>setFPlatform(e.target.value)} style={{padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,outline:"none",background:"#fff",cursor:"pointer"}}>
                <option value="all">All Platforms</option>
                {PLATFORMS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <select value={fProp} onChange={e=>setFProp(e.target.value)} style={{padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,outline:"none",background:"#fff",cursor:"pointer"}}>
                <option value="all">All Properties</option>
                {ALL_PROPS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <select value={fRating} onChange={e=>setFRating(Number(e.target.value))} style={{padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,outline:"none",background:"#fff",cursor:"pointer"}}>
                <option value={0}>All Ratings</option>
                {[5,4,3,2,1].map(n=><option key={n} value={n}>{n}★+</option>)}
              </select>
              <div style={{borderLeft:"1px solid #E5E7EB",paddingLeft:8,display:"flex",gap:6}}>
                {PLATFORMS.filter(p=>!p.hasApi).map(p=>(
                  <button key={p.id} onClick={()=>setImportPlat(p)}
                    style={{padding:"7px 10px",border:`1px solid ${p.color}55`,borderRadius:7,fontSize:11,fontWeight:600,color:p.dark,background:p.bg,cursor:"pointer"}}>
                    + {p.name}
                  </button>
                ))}
              </div>
            </div>
            {reviews.length>0&&<div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>{filtered.length} review{filtered.length!==1?"s":""}{filtered.length<reviews.length?` of ${reviews.length} total`:""}</div>}
            {!anyLoading&&reviews.length===0&&(
              <div style={{textAlign:"center",padding:"60px 24px",color:"#9CA3AF"}}>
                <div style={{fontSize:36,marginBottom:10}}>⭐</div>
                <div style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:5}}>No reviews yet</div>
                <div style={{fontSize:13}}>{hasTAKey?"Add TripAdvisor location IDs for your properties in Settings.":"Add your TripAdvisor API key in Settings to get started."}</div>
                <button onClick={()=>setShowSettings(true)} style={{marginTop:14,padding:"9px 18px",background:"#0F5C4C",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600}}>Open Settings</button>
              </div>
            )}
            {filtered.length===0&&reviews.length>0&&<div style={{textAlign:"center",padding:40,color:"#9CA3AF",fontSize:14}}>No reviews match your filters.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filtered.map(r=><ReviewCard key={r.id} r={r}/>)}
            </div>
          </>
        )}

        {/* Analytics tab */}
        {tab==="analytics"&&<AnalyticsView reviews={reviews} platCards={platCards}/>}

        {/* AI Insights tab */}
        {tab==="insights"&&<AIInsights reviews={reviews} config={config} setConfig={setConfig}/>}
      </div>

      {showSettings&&<SettingsModal config={config} setConfig={setConfig} onClose={()=>setShowSettings(false)} onFetch={fetchAll}/>}
      {importPlat&&<ImportModal platform={importPlat} config={config} setConfig={setConfig} onClose={()=>setImportPlat(null)}/>}
    </div>
  );
}

/* ── Review card ── */
function ReviewCard({r}){
  const[exp,setExp]=useState(false);
  const plat=PLATFORMS.find(p=>p.id===r.platform)||{color:"#6B7280",bg:"#F3F4F6",dark:"#374151",name:r.platform};
  const LIMIT=280;const long=r.text&&r.text.length>LIMIT;
  const displayText=long&&!exp?r.text.slice(0,LIMIT)+"…":r.text;
  return(
    <div className="review-card" style={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:12,padding:"15px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap",marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <span style={{background:plat.bg,color:plat.dark,fontSize:"10px",fontWeight:700,padding:"2px 7px",borderRadius:20,border:`1px solid ${plat.color}44`,letterSpacing:.3}}>{plat.name.toUpperCase()}</span>
          <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{r.propertyName}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <Stars rating={r.rating} size={12}/><span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{r.rating}/5</span>
          <span style={{fontSize:11,color:"#9CA3AF"}}>{relDate(r.date)}</span>
          {r.url&&<a href={r.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#0F5C4C",border:"1px solid #0F5C4C33",padding:"1px 5px",borderRadius:4,textDecoration:"none"}}>↗</a>}
        </div>
      </div>
      {r.title&&<div style={{fontWeight:600,fontSize:"13px",color:"#111",marginBottom:4}}>{r.title}</div>}
      {r.text&&<><div style={{fontSize:13,color:"#4B5563",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{displayText}</div>
        {long&&<button onClick={()=>setExp(e=>!e)} style={{marginTop:3,fontSize:11,color:"#0F5C4C",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:600}}>{exp?"Show less ↑":"Read more ↓"}</button>}</>}
      <div style={{display:"flex",gap:10,marginTop:8,fontSize:"11px",color:"#9CA3AF",flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontWeight:500,color:"#6B7280"}}>— {r.author}</span>
        {r.authorLocation&&<span>{r.authorLocation}</span>}
        {r.tripType&&<span style={{background:"#F3F4F6",padding:"1px 5px",borderRadius:4,textTransform:"capitalize"}}>{r.tripType}</span>}
        <span>{fmtDate(r.date)}</span>
      </div>
    </div>
  );
}

/* ── Chart canvas wrapper ── */
function ChartCanvas({type,data,options={},height=220}){
  const ref=useRef(null);const chart=useRef(null);
  const key=JSON.stringify({type,data});
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chart.current)chart.current.destroy();
    chart.current=new Chart(ref.current,{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:11}}}},scales:type==="bar"||type==="line"?{y:{beginAtZero:true,grid:{color:"#F3F4F6"},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}:undefined,...options}});
    return()=>{if(chart.current)chart.current.destroy();};
  },[key]);
  return<div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}

/* ── Analytics view ── */
function AnalyticsView({reviews,platCards}){
  if(!reviews.length)return(
    <div style={{textAlign:"center",padding:"60px 24px",color:"#9CA3AF"}}>
      <div style={{fontSize:36,marginBottom:10}}>📊</div>
      <div style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:5}}>No data to analyse yet</div>
      <div style={{fontSize:13}}>Add reviews via the Feed tab — refresh to fetch from TripAdvisor or import manually.</div>
    </div>
  );

  // KPIs
  const totalReviews=reviews.length;
  const overallAvg=avg(reviews.map(r=>r.rating));
  const now=new Date();
  const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const lastMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lastMonthKey=`${lastMonth.getFullYear()}-${String(lastMonth.getMonth()+1).padStart(2,"0")}`;
  const thisMonthRevs=reviews.filter(r=>r.date?.startsWith(thisMonth));
  const lastMonthRevs=reviews.filter(r=>r.date?.startsWith(lastMonthKey));
  const thisMonthAvg=thisMonthRevs.length?avg(thisMonthRevs.map(r=>r.rating)):0;
  const lastMonthAvg=lastMonthRevs.length?avg(lastMonthRevs.map(r=>r.rating)):0;
  const trend=thisMonthAvg-lastMonthAvg;
  const pct5=Math.round(reviews.filter(r=>r.rating>=4.5).length/totalReviews*100);

  // Best property
  const propAvgs=ALL_PROPS.map(p=>{const rr=reviews.filter(r=>r.propertyId===p.id);return{name:p.name,avg:rr.length?avg(rr.map(r=>r.rating)):0,cnt:rr.length};}).filter(p=>p.cnt>0).sort((a,b)=>b.avg-a.avg);
  const bestProp=propAvgs[0];
  const worstProp=propAvgs[propAvgs.length-1];

  // Monthly trend data
  const monthlyEntries=byMonth(reviews);
  const monthLabels=monthlyEntries.map(([mk])=>{const[y,m]=mk.split("-");return`${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1]} ${y.slice(2)}`;});
  const monthAvgs=monthlyEntries.map(([,v])=>+(v.sum/v.cnt).toFixed(2));
  const monthCounts=monthlyEntries.map(([,v])=>v.cnt);

  // Rating distribution
  const dist=[1,2,3,4,5].map(n=>reviews.filter(r=>Math.round(r.rating)===n).length);

  // Platform comparison
  const activePlats=platCards.filter(p=>p.avgRating>0||p.fetchedCount>0);

  // Keywords
  const posKw=computeKeywords(reviews,true);
  const negKw=computeKeywords(reviews,false);

  const GREENS=["#0F5C4C","#1B7A5E","#26926F","#31A97F","#3DC190","#48D9A0","#6FE4B4","#96EEC8"];
  const PLAT_COLORS={"tripadvisor":"#00AA6C","booking":"#003580","airbnb":"#FF5A5F","agoda":"#EB3D4D","makemytrip":"#ED1C24","goibibo":"#E73C7E"};

  return(
    <div>
      {/* KPI row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:12,marginBottom:20}}>
        {[
          {label:"Overall Rating",value:overallAvg.toFixed(2),sub:`${totalReviews} reviews`,accent:"#0F5C4C"},
          {label:"This Month Avg",value:thisMonthAvg?thisMonthAvg.toFixed(2):"—",sub:trend?`${trend>0?"▲":"▼"} ${Math.abs(trend).toFixed(2)} vs last month`:`${thisMonthRevs.length} reviews`,accent:trend>0?"#10B981":trend<0?"#EF4444":"#6B7280"},
          {label:"5★ Reviews",value:`${pct5}%`,sub:`${reviews.filter(r=>r.rating>=4.5).length} of ${totalReviews}`,accent:"#FBBF24"},
          {label:"New This Month",value:thisMonthRevs.length,sub:`vs ${lastMonthRevs.length} last month`,accent:"#3B82F6"},
          bestProp&&{label:"Best Property",value:bestProp.avg.toFixed(1)+"★",sub:bestProp.name,accent:"#10B981"},
          worstProp&&propAvgs.length>1&&{label:"Needs Attention",value:worstProp.avg.toFixed(1)+"★",sub:worstProp.name,accent:"#EF4444"},
        ].filter(Boolean).map((k,i)=>(
          <div key={i} className="kpi-card">
            <div style={{fontSize:11,fontWeight:600,color:"#9CA3AF",letterSpacing:.4,marginBottom:6}}>{k.label.toUpperCase()}</div>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:k.accent,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:11,color:"#6B7280",marginTop:4}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Charts row 1: trend + distribution */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:14,marginBottom:14}}>
        <div className="chart-card">
          <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>Avg Rating Over Time</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>Monthly average across all platforms</div>
          <ChartCanvas type="line" height={200} data={{
            labels:monthLabels,
            datasets:[{label:"Avg Rating",data:monthAvgs,borderColor:"#0F5C4C",backgroundColor:"rgba(15,92,76,.08)",borderWidth:2,pointBackgroundColor:"#0F5C4C",pointRadius:4,tension:.35,fill:true}]
          }} options={{plugins:{legend:{display:false}},scales:{y:{min:0,max:5,ticks:{stepSize:1}}}}}/>
        </div>
        <div className="chart-card">
          <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>Rating Distribution</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>All reviews by star rating</div>
          <ChartCanvas type="doughnut" height={180} data={{
            labels:["1★","2★","3★","4★","5★"],
            datasets:[{data:dist,backgroundColor:["#EF4444","#F97316","#FBBF24","#86EFAC","#0F5C4C"],borderWidth:0}]
          }} options={{cutout:"62%",plugins:{legend:{position:"right",labels:{boxWidth:10,font:{size:11}}}}}}/>
        </div>
      </div>

      {/* Charts row 2: volume + platform */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div className="chart-card">
          <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>Review Volume</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>Number of reviews per month</div>
          <ChartCanvas type="bar" height={180} data={{
            labels:monthLabels,
            datasets:[{label:"Reviews",data:monthCounts,backgroundColor:"rgba(15,92,76,.7)",borderRadius:4,borderSkipped:false}]
          }} options={{plugins:{legend:{display:false}}}}/>
        </div>
        <div className="chart-card">
          <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>Platform Comparison</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>Average rating by platform</div>
          <ChartCanvas type="bar" height={180} data={{
            labels:activePlats.map(p=>p.name),
            datasets:[{label:"Avg Rating",data:activePlats.map(p=>+p.avgRating.toFixed(2)),backgroundColor:activePlats.map(p=>PLAT_COLORS[p.id]||"#6B7280"),borderRadius:4,borderSkipped:false}]
          }} options={{plugins:{legend:{display:false}},scales:{y:{min:0,max:5}}}}/>
        </div>
      </div>

      {/* Property leaderboard */}
      {propAvgs.length>0&&(
        <div className="chart-card" style={{marginBottom:14}}>
          <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>Property Leaderboard</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>Ranked by average guest rating</div>
          <ChartCanvas type="bar" height={Math.max(140,propAvgs.length*28)} data={{
            labels:propAvgs.map(p=>p.name),
            datasets:[{label:"Avg Rating",data:propAvgs.map(p=>+p.avg.toFixed(2)),backgroundColor:propAvgs.map((_,i)=>GREENS[i%GREENS.length]),borderRadius:4,borderSkipped:false}]
          }} options={{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{min:0,max:5}}}}/>
        </div>
      )}

      {/* Keywords */}
      {(posKw.length>0||negKw.length>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          {[[posKw,"Positive Keywords (4–5★)","#0F5C4C","rgba(15,92,76,.7)"],[negKw,"Critical Keywords (1–3★)","#EF4444","rgba(239,68,68,.65)"]].map(([kws,title,col,fill])=>(
            kws.length>0&&(
              <div key={title} className="chart-card">
                <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:4}}>{title}</div>
                <div style={{fontSize:11,color:"#9CA3AF",marginBottom:12}}>Most frequent words in reviews</div>
                <ChartCanvas type="bar" height={200} data={{
                  labels:kws.map(([w])=>w),
                  datasets:[{label:"Mentions",data:kws.map(([,c])=>c),backgroundColor:fill,borderRadius:3,borderSkipped:false}]
                }} options={{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}}}/>
              </div>
            )
          ))}
        </div>
      )}

      {/* Sentiment split */}
      {reviews.length>0&&(()=>{
        const pos=reviews.filter(r=>r.rating>=4).length;
        const neu=reviews.filter(r=>r.rating===3).length;
        const neg=reviews.filter(r=>r.rating<3).length;
        const pPct=Math.round(pos/reviews.length*100);
        const nuPct=Math.round(neu/reviews.length*100);
        const nPct=Math.round(neg/reviews.length*100);
        return(
          <div className="chart-card" style={{marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:13,color:"#374151",marginBottom:12}}>Sentiment Overview</div>
            <div style={{display:"flex",gap:0,height:24,borderRadius:8,overflow:"hidden",marginBottom:10}}>
              {pPct>0&&<div style={{flex:pPct,background:"#0F5C4C",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{pPct>8?`${pPct}%`:""}</div>}
              {nuPct>0&&<div style={{flex:nuPct,background:"#FBBF24",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{nuPct>8?`${nuPct}%`:""}</div>}
              {nPct>0&&<div style={{flex:nPct,background:"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{nPct>8?`${nPct}%`:""}</div>}
            </div>
            <div style={{display:"flex",gap:20,fontSize:12,color:"#6B7280"}}>
              <span><b style={{color:"#0F5C4C"}}>{pos}</b> Positive (4–5★) {pPct}%</span>
              <span><b style={{color:"#B45309"}}>{neu}</b> Neutral (3★) {nuPct}%</span>
              <span><b style={{color:"#EF4444"}}>{neg}</b> Critical (1–2★) {nPct}%</span>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── AI Insights ── */
function AIInsights({reviews,config,setConfig}){
  const[summaries,setSummaries]=useLS("seclude_ai_summaries",{});
  const[loading,setLoading]=useState({});
  const[errors,setErrors]=useState({});
  const apiKey=config.groqKey||"";

  const propsWithReviews=ALL_PROPS.filter(p=>reviews.some(r=>r.propertyId===p.id));

  async function generate(prop){
    if(!apiKey){alert("Add your Groq API key in Settings → AI tab.");return;}
    const propRevs=reviews.filter(r=>r.propertyId===prop.id);
    if(!propRevs.length){alert("No reviews for this property yet.");return;}
    setLoading(l=>({...l,[prop.id]:true}));
    setErrors(e=>({...e,[prop.id]:null}));
    try{
      const text=await genSummary(propRevs,prop.name,apiKey);
      const entry={text,generatedAt:new Date().toISOString(),reviewCount:propRevs.length,avgRating:avg(propRevs.map(r=>r.rating))};
      setSummaries(s=>({...s,[prop.id]:entry}));
    }catch(e){setErrors(er=>({...er,[prop.id]:e.message}));}
    finally{setLoading(l=>({...l,[prop.id]:false}));}
  }

  async function generateAll(){
    if(!apiKey){alert("Add your Groq API key in Settings → AI tab.");return;}
    for(const p of propsWithReviews){
      await generate(p);
      await new Promise(r=>setTimeout(r,500));// small delay between calls
    }
  }

  if(!reviews.length)return(
    <div style={{textAlign:"center",padding:"60px 24px",color:"#9CA3AF"}}>
      <div style={{fontSize:36,marginBottom:10}}>🤖</div>
      <div style={{fontSize:14,fontWeight:600,color:"#374151",marginBottom:5}}>No reviews to analyse</div>
      <div style={{fontSize:13}}>Add reviews from the Feed tab first.</div>
    </div>
  );

  return(
    <div>
      {/* Header */}
      <div style={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:12,padding:"16px 20px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:"#111"}}>AI-Powered Property Insights</div>
          <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>Groq (Llama 3.3 70B) analyses your reviews and surfaces key themes, praise, and pain points per property</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {!apiKey&&<span style={{fontSize:12,color:"#EF4444"}}>⚠ Add Groq API key in Settings</span>}
          <button onClick={generateAll} disabled={!apiKey||propsWithReviews.length===0}
            style={{padding:"8px 16px",background:"#0F5C4C",color:"#fff",border:"none",borderRadius:8,cursor:apiKey?"pointer":"not-allowed",fontSize:13,fontWeight:600,opacity:apiKey?1:.5}}>
            ✦ Generate All
          </button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:12}}>
        {propsWithReviews.map(prop=>{
          const propRevs=reviews.filter(r=>r.propertyId===prop.id);
          const s=summaries[prop.id];
          const isLoading=loading[prop.id];
          const err=errors[prop.id];
          const propAvg=avg(propRevs.map(r=>r.rating));
          return(
            <div key={prop.id} style={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:12,padding:"16px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:"#111"}}>{prop.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                    <Stars rating={propAvg} size={11}/>
                    <span style={{fontSize:11,color:"#6B7280"}}>{propAvg.toFixed(2)} · {propRevs.length} review{propRevs.length!==1?"s":""}</span>
                  </div>
                </div>
                <button onClick={()=>generate(prop)} disabled={isLoading||!apiKey}
                  style={{padding:"6px 12px",background:s?"#F0FDF4":"#0F5C4C",color:s?"#0F5C4C":"#fff",border:s?"1px solid #86EFAC":"none",borderRadius:7,fontSize:11,cursor:apiKey?"pointer":"not-allowed",fontWeight:600,flexShrink:0,opacity:apiKey?1:.5}}>
                  {isLoading?<svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" style={{animation:"spin 1s linear infinite"}}><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>:s?"↻ Refresh":"✦ Analyse"}
                </button>
              </div>
              {isLoading&&<div style={{fontSize:13,color:"#6B7280",padding:"12px 0",animation:"pulse 1.5s infinite"}}>Groq is analysing {propRevs.length} reviews…</div>}
              {err&&!isLoading&&<div style={{fontSize:12,color:"#EF4444",background:"#FEF2F2",padding:"8px 10px",borderRadius:7}}>{err}</div>}
              {s&&!isLoading&&(
                <>
                  <div style={{fontSize:13,color:"#374151",lineHeight:1.7,borderLeft:"3px solid #0F5C4C",paddingLeft:12}}>{s.text}</div>
                  <div style={{fontSize:10,color:"#9CA3AF",marginTop:8}}>Generated {fmtDate(s.generatedAt)} · based on {s.reviewCount} reviews</div>
                </>
              )}
              {!s&&!isLoading&&!err&&(
                <div style={{fontSize:12,color:"#9CA3AF",padding:"10px 0"}}>Click Analyse to generate an AI summary of this property's reviews.</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Manual import modal ── */
function ImportModal({platform,config,setConfig,onClose}){
  const[propId,setPropId]=useState("");
  const[rows,setRows]=useState([{rating:5,title:"",text:"",author:"",date:new Date().toISOString().slice(0,10)}]);
  function upd(i,f,v){setRows(r=>r.map((x,j)=>j===i?{...x,[f]:v}:x));}
  function save(){
    if(!propId){alert("Select a property.");return;}
    const prop=ALL_PROPS.find(p=>p.id===propId);
    const newRevs=rows.filter(r=>r.text.trim()||r.title.trim()).map((r,i)=>({
      id:`${platform.id}_manual_${Date.now()}_${i}`,
      platform:platform.id,platformName:platform.name,propertyId:propId,propertyName:prop?.name||propId,
      rating:Number(r.rating),title:r.title,text:r.text,author:r.author||"Guest",authorLocation:"",date:r.date,tripType:"",url:"",language:"en",
    }));
    if(!newRevs.length){alert("Add at least one review with some text.");return;}
    const k=`${platform.id}_${propId}`;
    setConfig(c=>({...c,manual:{...(c.manual||{}),[k]:[...(c.manual?.[k]||[]),...newRevs]}}));
    // Also save to Firestore
    fsSave(platform.id,propId,newRevs).catch(()=>{});
    onClose();
  }
  const inp={padding:"6px 8px",border:"1px solid #D1D5DB",borderRadius:6,fontSize:12,outline:"none"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:560,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>

          <div><div style={{fontWeight:700,fontSize:14}}>Import {platform.name} Reviews</div><div style={{fontSize:11,color:"#6B7280",marginTop:1}}>Saved to Firestore — visible on all devices</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#9CA3AF"}}>✕</button>
        </div>
        <div style={{padding:"14px 20px",overflowY:"auto",flex:1}}>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:4,color:"#374151"}}>Property</label>
            <select value={propId} onChange={e=>setPropId(e.target.value)} style={{width:"100%",...inp,padding:"8px 10px"}}>
              <option value="">Select…</option>
              {ALL_PROPS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          {rows.map((r,i)=>(
            <div key={i} style={{border:"1px solid #E5E7EB",borderRadius:8,padding:"10px",marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
                <select value={r.rating} onChange={e=>upd(i,"rating",Number(e.target.value))} style={inp}>
                  {[5,4,3,2,1].map(n=><option key={n} value={n}>{"★".repeat(n)} {n}/5</option>)}
                </select>
                <input type="date" value={r.date} onChange={e=>upd(i,"date",e.target.value)} style={{...inp,flex:1}}/>
                <input value={r.author} onChange={e=>upd(i,"author",e.target.value)} placeholder="Guest name" style={{...inp,flex:1}}/>
                {rows.length>1&&<button onClick={()=>setRows(r=>r.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:16}}>✕</button>}
              </div>
              <input value={r.title} onChange={e=>upd(i,"title",e.target.value)} placeholder="Title (optional)" style={{...inp,width:"100%",marginBottom:5}}/>
              <textarea value={r.text} onChange={e=>upd(i,"text",e.target.value)} placeholder="Review text…" rows={3} style={{...inp,width:"100%",resize:"vertical"}}/>
            </div>
          ))}
          <button onClick={()=>setRows(r=>[...r,{rating:5,title:"",text:"",author:"",date:new Date().toISOString().slice(0,10)}])} style={{width:"100%",padding:"7px",border:"1px dashed #D1D5DB",borderRadius:7,background:"none",cursor:"pointer",fontSize:12,color:"#6B7280"}}>+ Add review</button>
        </div>
        <div style={{padding:"13px 20px",borderTop:"1px solid #E5E7EB",display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={onClose} style={{padding:"7px 14px",border:"1px solid #D1D5DB",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:13}}>Cancel</button>
          <button onClick={save} style={{padding:"7px 16px",background:platform.color,color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600}}>Save Reviews</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
function __runApp(){
  var root=document.getElementById("root");
  try{root.innerHTML="";var src=document.getElementById("app-src").textContent;var compiled=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;eval(compiled);}
  catch(e){root.innerHTML='<div style="padding:24px;font-family:sans-serif;color:#B91C1C;background:#FEF2F2;min-height:100vh"><b>App failed to load.</b><br><br><small style="font-family:monospace">'+e.message+"</small></div>";console.error("Bootstrap:",e);}
}
function __waitBabel(n){if(window.Babel){__runApp();}else if(n>0){setTimeout(function(){__waitBabel(n-1);},300);}else{document.getElementById("root").innerHTML="<div style='padding:24px;font-family:sans-serif'>Could not load Babel.</div>";}}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){__waitBabel(20);});}else{__waitBabel(20);}
</script>
</body>
</html>
